// fix18-10-hotfix30-B4 第四點：外帶／外送切換唯一入口。onModeChange()/restoreCart()/
// openCartSheet()/refreshShopStatus() 都必須透過這裡（或其安全子流程：
// saveCurrentModeFormState()/restoreModeFormState()/syncFulfillmentContext()），不得
// 各自零散修改地址/日期/時段/標籤。改為 async 並加入 render token 防護：快速連點
// 外帶/外送時，較慢的前一次呼叫在 await 之後若發現 token 已經過期（代表使用者又切了
// 一次模式），就不再繼續往下寫入畫面，避免 Case AN（快速連點）的畫面錯亂。
async function applyFulfillmentMode(mode, opts){
  const silent = !!(opts && opts.silent);
  // fix18-10-hotfix30-B5-R4 root cause fix（Bug-1 附帶發現的第二個問題）：先前這裡也會
  // ++fulfillmentRenderToken 並在 await 之後比對 myToken !== fulfillmentRenderToken——
  // 但 await 的 refreshDateSelectorForCart() 內部會呼叫 buildTimeSelector()，那裡「也」
  // 會 ++fulfillmentRenderToken（同一個全域計數器）。結果是：只要 buildTimeSelector()
  // 成功執行過一次（幾乎每次切換模式都會），這裡的 myToken 必定已經跟目前的
  // fulfillmentRenderToken 不一致，導致這個檢查永遠判斷「已過期」而提早 return，
  // buildPreorderInfo()／buildFulfillmentOptions()／Analytics／persistCart() 全部
  // 被跳過不執行——這正是購物車取餐方式按鈕（fulfillBtns）切換後一直停留在舊模式、
  // 不會反映使用者剛選的新模式的根因。改用「目前 currentMode 是否還是我被要求套用的
  // mode」來判斷是否過期：若在等待期間有更新的一次 applyFulfillmentMode() 呼叫進來，
  // 它會把 currentMode 設成「它自己的」mode，與這裡捕捉到的 mode 不同，才代表真的過期；
  // 不受 buildTimeSelector()/fetchDeliveryFee() 內部各自的 token 递增影響。
  const fromMode = currentMode;
  if(fromMode && fromMode!==mode) saveCurrentModeFormState(fromMode);
  currentMode = mode;
  const oType=document.getElementById('oType'); if(oType) oType.value=mode;
  restoreModeFormState(mode);
  renderMenu();
  refreshModeCutoffUI();
  renderFulfillmentMode(mode);
  // fix18-10-hotfix22D：改用 refreshDateSelectorForCart()（沿用既有邏輯，處理購物車內
  // 「需自動預約下個營業日」商品的特殊情況），內部會呼叫 buildDateSelector()（本輪已更新
  // 為正確處理今日/明日的 selectable 判斷）與 buildTimeSelector()（已加入 render token
  // 防護），不得改回單純的 buildDateSelector() 而漏掉這個既有分支。
  await refreshDateSelectorForCart();
  if(currentMode!==mode) return; // 使用者在等待期間又切換了模式，這次到此為止
  // fix18-10-hotfix30-B5-R4（Bug-2）：這裡不再呼叫 buildPreorderInfo()——
  // refreshDateSelectorForCart() 在一般情況下不會 await buildTimeSelector() 的
  // timeslots 請求（只有「購物車內含需強制預約明日的商品」那個分支才會 await），
  // 所以這個時間點呼叫 buildPreorderInfo() 讀到的 #pTime 常常還是「載入中…」的暫時
  // 空狀態，會誤顯示「此日暫無可預約時段」。改由 buildTimeSelector() 自己在時段真正
  // 載入完成的當下呼叫 buildPreorderInfo()（見該函式內的呼叫點），確保顯示的永遠是
  // 實際載入結果，不是呼叫當下的暫時狀態。
  buildFulfillmentOptions();
  if(!silent && fromMode && fromMode!==mode){
    _trackEvent('fulfillment_method_selected',{ from_mode:fromMode, to_mode:mode, cart_id:_getCartId(false) });
  }
  persistCart();
}
// fix18-10-hotfix30-A：頂部頁籤已移除，改由 selectFulfillmentMode() 驅動購物車內的
// 取餐方式大按鈕；onModeChange() 保留給 hidden input #oType 的邏輯進入點使用，
// 本輪起完全委派給 applyFulfillmentMode()，不再自行零散處理。
function onModeChange(){
  const oType=document.getElementById('oType');
  if(!oType) return;
  applyFulfillmentMode(oType.value);
}
// fix18-10-hotfix30-A 第二點：取餐方式大按鈕的點擊入口（取代 <select> 的 onchange）
function selectFulfillmentMode(mode){
  const oType=document.getElementById('oType');
  if(!oType || oType.value===mode) return;
  applyFulfillmentMode(mode);
}

// fix18-10-hotfix30-A：截止售完橫幅 ──────────────────────────────────────
// fix18-10-hotfix26-F2（需求文件二）：根因修正——takeoutCutoffPassed／
// deliveryCutoffPassed 這兩個旗標來自 GET /shop，永遠只代表「今天」是否已過截止
// 時間，本身完全沒有日期概念。過去所有畫面（模式頁籤、購物車取餐方式下拉、
// 這個橫幅）都直接拿這兩個旗標當「目前選擇日期」的截止狀態使用，導致使用者
// 選擇未來日期（例如明天）時，仍然被顯示「已截止」——這是本次唯一要修的 BUG。
// 修法：所有「已截止」文字，一律只在 selectedPickupDateStr()===今天 時才可能出現；
// 選到未來日期時改用「（預約）」或「（該日未營業）」，不得再出現「已截止」字樣。
// 明確使用 Date 物件（parseLocalDate／twNow）比較日期，不用字串時間（HH:mm）跨日比較。
function selectedPickupDateStr(){
  const v=document.getElementById('pDate')?.value;
  return v || fmtD(twNow());
}
function isSelectedDateToday(){
  return selectedPickupDateStr()===fmtD(twNow());
}
// 「所選日期」是否真的已過截止——只有選到今天，且今天的截止旗標為 true 時才成立。
function cutoffPassedForMode(mode){
  const raw = mode==='takeout' ? takeoutCutoffPassed : deliveryCutoffPassed;
  return !!raw && isSelectedDateToday();
}
// 目前 #pDate 選到的這個 <option> 是否被停用（休假／非營業日）。直接讀
// buildDateSelector() 已經算好的 disabled 狀態，不重複另寫一套判斷規則，
// 避免兩邊邏輯不同步、標籤與下拉選單顯示互相矛盾。
function isSelectedDateOptionDisabled(){
  const sel=document.getElementById('pDate');
  if(!sel) return false;
  const opt=Array.from(sel.options).find(o=>o.value===sel.value);
  return !!(opt && opt.disabled);
}
// 今天/明天/後天/N天後 這種相對日文案，供「（明日未營業）」這類提示使用。
function dayOffsetLabel(dateStr){
  const days=Math.round((parseLocalDate(dateStr)-parseLocalDate(fmtD(twNow())))/86400000);
  if(days<=0) return '今日';
  if(days===1) return '明日';
  if(days===2) return '後天';
  return `${days}天後`;
}
// 統一的模式標籤後綴文字，優先序：未開放 > 今日已截止 > 該日未營業 > 預約中 > 無。
// buildModeTabsUI()／購物車取餐方式下拉／截止橫幅三處共用同一套規則，避免各自維護
// 出現不一致的文字（例如頁籤說「已截止」但下拉選單卻沒有提示）。
function modeLabelSuffix(mode, enabled){
  if(!enabled) return '未開放';
  if(cutoffPassedForMode(mode)) return '今日已截止';
  if(!isSelectedDateToday() && isSelectedDateOptionDisabled()) return dayOffsetLabel(selectedPickupDateStr())+'未營業';
  if(!isSelectedDateToday()) return '預約';
  return '';
}
// fix18-10-hotfix30-A 第二、六點：購物車取餐方式改為大按鈕單選（不用 select），
// 需同時反映「店家模式開關」與「購物車商品相容性」兩層原因；不可用時仍保留該按鈕
// （維持 hotfix22-F 的可見性原則），只是變灰 + disabled + 顯示原因文字。
function buildFulfillmentOptions(){
  const holder=document.getElementById('fulfillBtns');
  const oType=document.getElementById('oType');
  if(!holder || !oType) return;
  const cur=oType.value||currentMode;
  const cartModes=getCartAvailableModes();
  // fix18-10-hotfix30-B1：這份對照表只用於「購物車商品相容性」原因（來自 getCartAvailableModes()
  // 的逐商品 reason，屬於 GET /menu 既有商品層級 reason code，與本次不得修改的商品模式判斷
  // 邏輯一致），不再用於「今天是否開放」——那一律改由 getFulfillmentStatus() 判斷與給文案。
  const REASON_TEXT={
    mode_closed:'今日未開放', product_mode_disabled:'商品不支援', calendar_closed:'休假中',
    today_closed:'今日臨時休息', weekly_closed:'固定公休', calendar_mode_closed:'今日未開放',
    cutoff_sold_out:'已截止', real_sold_out:'今日售完', product_time_ended:'今日售完',
    product_not_started:'尚未開賣', paused:'暫停販售', sold_out_today:'今日完售',
  };
  const render=(mode)=>{
    // fix18-10-hotfix30-B3 root cause fix：不得只用 .enabled（= canOrderNow）判斷按鈕
    // 是否 disabled。not_started/cutoff 但可預約時，.enabled 是 false 但 .selectable 是
    // true，按鈕必須維持可選，並用 cartLabel（「今日可預約」/「可預約」）取代原本的
    // 「尚未開始」/「今日已截止」灰色文字（那兩個字眼專屬於 #serviceStatusBar，不得混用）。
    const status=getFulfillmentStatus(mode);
    const storeSelectable=status.selectable;
    const label = mode==='delivery' ? '🛵 外送' : '🛍️ 外帶';
    let disabled=false, reason='';
    if(!storeSelectable){ disabled=true; reason=status.label; }
    else if(!cartModes[mode]){
      disabled=true;
      const rs=cartModes.reasons[mode]||[];
      const firstReason=rs[0]?.reason;
      reason = rs.length>1 ? '商品不支援' : (REASON_TEXT[firstReason]||'商品不支援');
    } else if(!status.canOrderNow){
      reason = status.cartLabel; // 「今日可預約」或「可預約」，按鈕仍是 enabled
    }
    const isActive = cur===mode && !disabled;
    const radio = isActive ? '◉' : '○';
    return `<button type="button" class="fulfill-btn${isActive?' active':''}${disabled?' disabled':''}" ${disabled?'disabled':`onclick="selectFulfillmentMode('${mode}')"`}>`
      +`<span class="fulfill-radio">${radio}</span><span class="fulfill-label">${label}</span>`
      +(reason?`<span class="fulfill-reason">${esc(reason)}</span>`:'')
      +`</button>`;
  };
  holder.innerHTML = render('takeout') + render('delivery');
  if(oType.value!==cur) oType.value=cur;
}
// fix18-10-hotfix26-F2：任何會改變「目前選擇日期」或「目前模式」的地方都呼叫這個
// 函式，統一重新計算頁籤／橫幅／購物車下拉的文字，取代過去各自零星呼叫、
// 且切換日期時完全沒有重新計算的舊行為。
function refreshModeCutoffUI(){
  buildServiceStatusBar();
  updateCutoffBanner();
  buildPreorderInfo();
  const cartOpen=document.getElementById('cartSheet')?.classList.contains('show');
  if(cartOpen) buildFulfillmentOptions();
}
function updateCutoffBanner(){
  const banner=document.getElementById('cutoffBanner');
  // fix18-10-hotfix26-F2：改用日期感知的 cutoffPassedForMode()，選到未來日期時
  // 永遠不會是 true（即使「今天」已經截止），修正核心 BUG。
  const cutoff=cutoffPassedForMode(currentMode);
  const allowNext = currentMode==='takeout'
    ? (shopData.takeout_status?.allow_next_day)
    : (shopData.delivery_status?.allow_next_day);
  if(cutoff){
    banner.style.display='block';
    const ct=shopData[currentMode==='takeout'?'takeout_cutoff_time':'delivery_cutoff_time']||'';
    banner.innerHTML=`⏰ ${currentMode==='takeout'?'外帶':'外送'}今日接單已截止（${ct||'今日'}），商品顯示今日售完。`
      + (allowNext ? `<br>💡 <strong>允許預約明日</strong>，請在購物車選擇明日取餐時間。` : '');
  }else if(!isSelectedDateToday() && isSelectedDateOptionDisabled()){
    // fix18-10-hotfix26-F2：選到的未來日期本身不營業（休假／非該模式營業日），
    // 明確提示「該日未營業」，不得誤用「已截止」字樣。
    banner.style.display='block';
    banner.innerHTML=`🚫 ${currentMode==='takeout'?'外帶':'外送'}（${dayOffsetLabel(selectedPickupDateStr())}未營業），請選擇其他日期。`;
  }else{
    banner.style.display='none';
  }
}

// hotfix22-F 補正：目前選擇的模式（外帶/外送）若被店家關閉——不清空購物車/優惠券/顧客資料，
// 只顯示「未開放」提示、擋住日期時段產生可送單選項、停用送單按鈕；使用者自行切換到另一個
// 有開放的模式後才恢復可下單（並在切換時更新、保存新的 order_mode，見 switchMode()/onModeChange()）。
function isCurrentModeAvailable(){
  // fix18-10-hotfix30-B3 root cause fix：不得只用 .enabled（= canOrderNow，只代表「現在能否
  // 立即下單」）判斷購物車能不能用這個模式。not_started 但今天稍後可預約、或允許明日預購時，
  // .enabled 是 false 但 .selectable 是 true——這裡改用 .selectable，才是「購物車取餐方式
  // 是否可選」的正確依據（此函式同時被 buildDateSelector()/updateModeAvailabilityUI() 引用，
  // 修正這裡即可讓兩處呼叫點自動得到正確答案，不必個別修改）。
  return getFulfillmentStatus(currentMode).selectable;
}
function updateModeAvailabilityUI(){
  const banner=document.getElementById('modeUnavailableBanner');
  const btn=document.getElementById('subBtn');
  if(!isCurrentModeAvailable()){
    if(banner){
      banner.style.display='block';

// ── 付款方式 ──────────────────────────────────────────
// fix18-10-hotfix22A：改為依通路（外帶/外送）獨立開關；若後端未回傳新版陣列（舊店家尚未設定），
// 自動 fallback 使用原本的全域 line_payment_*_enabled 判斷，行為與舊版完全相同。
function buildPaymentButtons(settings){
  const c=document.getElementById('payBtns');c.innerHTML='';
  const modeKey = currentMode==='delivery' ? 'delivery_payment_methods' : 'takeout_payment_methods';
  const codes = Array.isArray(settings[modeKey]) ? settings[modeKey] : null;
  const en = (codes && codes.length)
    ? PAYMENT_OPTIONS.filter(p=>codes.includes(p.code))
    : PAYMENT_OPTIONS.filter(p=>settings[p.key]==='1');
  if(!en.length){c.innerHTML='<p style="color:#e53935;font-size:13px">目前未開放付款方式</p>';selectedPay='';return;}
  en.forEach((p,i)=>{const b=document.createElement('button');b.className='pay-btn'+(i===0?' active':'');b.dataset.code=p.code;b.textContent=p.label;b.onclick=function(){selectPay(this);};c.appendChild(b);});
  selectedPay=en[0].code;
}
function selectPay(btn){selectedPay=btn.dataset.code;document.querySelectorAll('.pay-btn').forEach(b=>b.classList.toggle('active',b===btn));persistCart();}

// ── 顧客可提前預訂天數（Hotfix15 V3：line_preorder_days_limit，預設14天，0~60）──
function getPreorderDaysLimit(){
  const n=parseInt(shopData.line_preorder_days_limit,10);
  if(isNaN(n)) return 14;
  return Math.max(0, Math.min(60, n));
}

// ── 日期選擇器（依模式篩選公休日；日期範圍統一由 line_preorder_days_limit 控制）──
// fix18-10-hotfix30-B4-RC 第十三點：補齊明確 mode 參數（forceNextDay 維持第一個參數
// 不改順序，避免破壞既有呼叫點 buildDateSelector(true) 的既有語意；mode 是新增的第二個
// 參數，預設值 currentMode 在「呼叫當下」求值並鎖定，之後這個函式內都只用這個區域變數，
// 不再讀取可能於期間被改變的全域 currentMode，滿足「不得依賴 request 完成時 currentMode
// 仍是原值」的要求）。
function buildDateSelector(forceNextDay=false, mode=currentMode){
  const sel=document.getElementById('pDate');if(!sel)return;
  sel.innerHTML='';
  // hotfix22-F 補正：目前模式（外帶/外送）整個被店家關閉時，不得產生任何可送單的日期／時段選項，
  // 但商品/顧客資料仍完整保留，只是擋住送單；等使用者切到有開放的模式才恢復正常選單。
  if(mode===currentMode ? !isCurrentModeAvailable() : !getFulfillmentStatus(mode).selectable){
    const opt=document.createElement('option');opt.value='';opt.disabled=true;
    opt.textContent=(mode==='delivery'?'外送':'外帶')+'目前未開放';
    sel.appendChild(opt);
    const pTimeUnavail=document.getElementById('pTime');
    if(pTimeUnavail) pTimeUnavail.innerHTML=`<option value="" disabled>${mode==='delivery'?'外送':'外帶'}目前未開放</option>`;
    updateModeAvailabilityUI();
    return;
  }
  const now=twNow();
  // fix18-10-hotfix30-B3 第六點＋補充修正：今天要不要被排除，不能只看 forceNextDay 這個
  // 外部旗標。若今天 canOrderNow 或 canScheduleToday（今天稍後仍有排程/時段），今天必須
  // 保留為可選、且應該是預設選項——「允許明日預購」只影響明天以後，不得拿來跳過今天稍後
  // 仍可預約的時段。只有「今天完全不可能再有服務」時才跳到明天（沿用既有 forceNextDay 機制，
  // 不新增第二套日期邏輯）。
  const _fsForDate=getFulfillmentStatus(mode);
  const _skipToday = !_fsForDate.canOrderNow && !_fsForDate.canScheduleToday;
  const closedWds=(() => { try { return JSON.parse(shopData.line_closed_weekdays||'[]'); } catch { return []; } })();
  const closedDts=(() => { try { return JSON.parse(shopData.line_closed_dates||'[]'); } catch { return []; } })();
  const bizHoursKey=mode==='takeout'?'takeout_business_hours':'delivery_business_hours';
  const bizHours=(() => { try { return JSON.parse(shopData[bizHoursKey]||'{}'); } catch { return {}; } })();
  const bizEmpty=Object.keys(bizHours).length===0;
  let first=null;
  // fix18-10-hotfix30-B4 第五點：外帶／外送日期不得共用同一個值——若該模式先前保存過日期
  // （fulfillmentFormState[mode].date）且在新建立的清單中仍是合法（非 disabled）選項，
  // 優先沿用；不合法（例如切換模式後已超出可預訂範圍或變成公休日）才落回第一個合法日期。
  const _savedDate = fulfillmentFormState[mode] ? fulfillmentFormState[mode].date : '';
  let _savedDateValid=false;
  // 統一日期範圍：0（今天）～ line_preorder_days_limit 天後；forceNextDay 時排除今天（今日已售完/不可下單，從明天起選）
  const limit=getPreorderDaysLimit();
  const startOffset=(forceNextDay||_skipToday)?1:0;
  const endOffset=limit;
  const _dsListForWarning=[];
  for(let offset=startOffset;offset<=endOffset;offset++){
    const d=new Date(now);d.setDate(d.getDate()+offset);
    const ds=fmtD(d),wk=WD_KEYS[parseLocalDate(ds).getDay()];
    const mm=String(d.getMonth()+1).padStart(2,'0'),dd2=String(d.getDate()).padStart(2,'0');
    const lbl=offset===0?'今天':offset===1?'明天':offset===2?'後天':`${offset}天後`;
    const isWeeklyClosed=closedWds.includes(wk);
    const isSpecificClosed=closedDts.includes(ds);
    const dh=bizHours[wk];
    const notBizDay=!isWeeklyClosed&&!isSpecificClosed&&!bizEmpty&&dh&&!dh.enabled;
    const {suffix,disabled}=bizCalOptionSuffix(ds,isWeeklyClosed,isSpecificClosed,notBizDay);
    _dsListForWarning.push(ds);
    const opt=document.createElement('option');opt.value=ds;opt.disabled=disabled;
    opt.textContent=`${lbl} ${mm}/${dd2}(${WD_NAMES[d.getDay()]})${suffix}`;
    if(!disabled&&!first)first=ds;
    if(_savedDate && ds===_savedDate && !disabled) _savedDateValid=true;
    sel.appendChild(opt);
  }
  const warnEl=document.getElementById('pDateCalWarning');
  if(warnEl){
    const warnTxt=bizCalRangeWarning(_dsListForWarning);
    warnEl.textContent=warnTxt;
    warnEl.style.display=warnTxt?'block':'none';
  }
  if(_savedDateValid) sel.value=_savedDate;
  else if(first) sel.value=first;
  if(!forceNextDay) buildTimeSelector(mode);
}

// fix18-10-hotfix30-B1 第六點：預約資訊獨立區塊。selectedDate==today 時隱藏；
// selectedDate>today 時顯示「目前正在預約」＋日期／模式／最早時段。
// 不新增第二套預約判斷：日期標籤直接複用 #pDate 已選 option 的文字（buildDateSelector()
// 已經算好「明天 07/21(二)」這類格式），最早時段直接複用 #pTime 已由 buildTimeSelector()
// 向 /api/line-orders/timeslots 要回來、排序好的第一個可選時段，不重新呼叫 API。
function buildPreorderInfo(){
  const box=document.getElementById('preorderInfoBox');
  if(!box) return;
  const dateSel=document.getElementById('pDate');
  const sd=dateSel?.value;
  const todayStr=fmtD(twNow());
  if(!sd || sd===todayStr){ box.style.display='none'; box.innerHTML=''; return; }
  const dateLabel = dateSel?.selectedOptions?.[0]?.textContent?.trim() || sd;
  const timeSel=document.getElementById('pTime');
  const timeOpts = timeSel ? Array.from(timeSel.options).filter(o=>o.value) : [];
  const earliest = timeOpts.length ? timeOpts[0].value : null;
  const modeLabel = currentMode==='delivery' ? '外送' : '外帶';
  box.style.display='block';
  box.innerHTML = `<div class="pib-title">📅 目前正在預約</div>`
    + `預約日期：${esc(dateLabel)}<br>取餐方式：${esc(modeLabel)}<br>`
    + (earliest ? `最早時段：${esc(earliest)}` : `此日暫無可預約時段，請改選其他日期`);
}

// ── 時間選擇器（呼叫後端 API，依模式計算）────────────────
// fix18-10-hotfix30-B4-RC 第十三、十四點：明確 mode/date 參數（預設值在呼叫當下鎖定
// currentMode／#pDate 目前值，向下相容所有既有零參數呼叫點），並把時段結果寫進
// fulfillmentContext[mode].availability.timeslots——DOM 的 #pTime 只在 mode 仍是目前
// 使用中的模式時才更新，避免非目前模式的背景查詢意外覆蓋畫面。
async function buildTimeSelector(mode=currentMode, dateOverride=null){
  const dateSel=document.getElementById('pDate'),sel=document.getElementById('pTime');
  if(!sel)return;
  // fix18-10-hotfix30-B4 第四點：模式切換 race-guard——快速連點外帶/外送時，較慢的前一次
  // timeslots 請求完成時，不得覆蓋使用者已經切到的最新模式畫面（Case AN）。
  const myToken = ++fulfillmentRenderToken;
  const modeSnapshot = mode; // 明確鎖定，await 之後一律用這個，不再讀取可能已變動的 currentMode
  const isActiveMode = () => modeSnapshot===currentMode;
  if(isActiveMode()) sel.innerHTML='<option value="">載入中…</option>';
  const sd=dateOverride || dateSel?.value;
  if(!sd){ if(isActiveMode()) sel.innerHTML='<option value="">請先選擇日期</option>'; return; }
  const lbl=document.getElementById('timeLabel');
  if(lbl && isActiveMode()) lbl.childNodes[0].textContent=modeSnapshot==='delivery'?'外送時間 ':'取餐時間 ';
  const ctx = fulfillmentContext[modeSnapshot];
  try{
    const res=await apiFetch(`/api/line-orders/timeslots?mode=${modeSnapshot}&date=${sd}`).then(r=>r.json());
    // 這次請求開始後，若又有更新的一次呼叫（token 已前進），這次結果就是「已過期」，
    // Context 仍可以安全寫入（各模式互不影響），但不得再寫回 DOM。
    const stale = myToken!==fulfillmentRenderToken;
    if(!res.success||!res.slots||res.slots.length===0){
      if(ctx) ctx.availability.timeslots=[];
      if(stale || !isActiveMode()) return;
      const reasons={
        cutoff_passed:'今日接單已截止',
        no_slots_today:'今日已無可預約時段',
        closed_day:'此日為店休日',
        mode_closed:'此模式已關閉',
      };
      // 若是 no_slots_today 且是今天，提示選明天
      let msg = reasons[res.reason]||'此日無可預約時段';
      const nowDate = fmtD(twNow());
      if(res.reason==='no_slots_today'&&sd===nowDate) msg='今日時段已過，請選擇其他日期';
      sel.innerHTML=`<option value="" disabled>${msg}</option>`;
      // fix18-10-hotfix30-B5-R4 root cause fix（Bug-2）：先前 buildPreorderInfo() 是在
      // applyFulfillmentMode() 的呼叫鏈裡、buildTimeSelector() 這個 async 請求「還沒解析
      // 完成」之前就先執行一次（因為 buildDateSelector() 最後呼叫 buildTimeSelector() 時
      // 沒有 await，refreshDateSelectorForCart() 的非 forceNextDay 分支也沒有 await），
      // 讀到的是 #pTime 當下還是「載入中…」的暫時狀態（0 個有值的 option），因而誤判成
      // 「此日暫無可預約時段」；但實際上系統早就已經自動切到下一個可預約日期，稍後這裡的
      // API 回應一到，真正的時段就會出現，畫面卻沒有跟著更新，讓使用者誤以為不能預約。
      // 修正方式：在這裡（timeslots API 真正回應之後）才呼叫 buildPreorderInfo()，
      // 讓預約提示永遠反映「目前實際載入的時段」，而不是呼叫當下的暫時空狀態。
      buildPreorderInfo();
      return;
    }
    // fix18-10-hotfix30-B4-RC 第十四點：timeslots 先寫入 Context（單一模式各自的陣列），
    // 不論這次是否仍是目前使用中的模式，Context 本身的更新永遠安全（各模式互不影響）。
    if(ctx) ctx.availability.timeslots = res.slots.slice();
    if(stale || !isActiveMode()) return; // 已過期或非目前模式，不寫回 DOM
    sel.innerHTML='';
    res.slots.forEach((t,i)=>{
      const h=Number(t.split(':')[0]);
      const lbl2=h<12?`上午 ${t}`:h===12?`中午 ${t}`:`下午 ${t}`;
      const o=document.createElement('option');o.value=t;o.textContent=lbl2;sel.appendChild(o);
    });
    // fix18-10-hotfix30-B4 第五點：外帶／外送時段不得共用同一個值。若此模式先前保存過
    // 時段（fulfillmentFormState[mode].time）且仍在這次（依正確模式）取得的合法時段清單
    // 內，保留它；否則（不合法，例如切到另一模式後原本的時間點根本不存在）落回第一個
    // （最早）合法時段——沿用瀏覽器 <select> 預設行為，不需要額外程式碼。
    const _savedTime = fulfillmentFormState[modeSnapshot] ? fulfillmentFormState[modeSnapshot].time : '';
    if(_savedTime && res.slots.includes(_savedTime)) sel.value=_savedTime;
    // 提示最早時間
    if(res.earliest) toast(`最早可選 ${res.earliest}`);
    syncFulfillmentContext(modeSnapshot);
    // fix18-10-hotfix30-B5-R4（Bug-2 同一根因修正）：時段真正載入完成後才刷新預約提示，
    // 理由同上一段註解——確保「目前正在預約」顯示的最早時段，是這次真的拿到的時段，
    // 不是呼叫當下 #pTime 還沒載入完成的暫時空狀態。
    buildPreorderInfo();
  }catch{
    if(myToken!==fulfillmentRenderToken || !isActiveMode()) return;
    sel.innerHTML='<option value="" disabled>載入失敗，請重試</option>';
  }
}

// fix18-10-hotfix23-A：view_product — 商品卡真正進入視窗時記錄一次（同一 session +
// product_id 去重，用 sessionStorage 記錄已送出過的 product_id 清單）
let _viewProductObserver=null;
function _setupViewProductObserver(){
  try{
    if(!('IntersectionObserver' in window)) return;
    if(_viewProductObserver) _viewProductObserver.disconnect();
    const seenKey='line_viewed_products_'+LINE_STORE_ID;
    let seen=[];
    try{ seen=JSON.parse(sessionStorage.getItem(seenKey)||'[]'); }catch(e){}
    const seenSet=new Set(seen);
    _viewProductObserver=new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(!entry.isIntersecting) return;
        const pid=(entry.target.id||'').replace('pc-','');
        if(!pid || seenSet.has(pid)) return;
        seenSet.add(pid);
        try{ sessionStorage.setItem(seenKey, JSON.stringify([...seenSet])); }catch(e){}
        _trackEvent('view_product',{product_id:Number(pid)});
        _viewProductObserver.unobserve(entry.target);
      });
    },{threshold:0.5});
    document.querySelectorAll('.prod-card[id^="pc-"]').forEach(card=>{
      const pid=(card.id||'').replace('pc-','');
      if(!seenSet.has(pid)) _viewProductObserver.observe(card);
    });
  }catch(e){ /* 追蹤失敗不影響商品渲染 */ }
}

// ── 商品卡片（fix18-10-hotfix30-A：任一模式可買即顯示可買，不再要求先選外帶/外送）──
function buildCard(p){
  const name=p.effective_line_name||p.line_name||p.name;
  const price=p.effective_line_price||p.price;
  const img=p.line_image_url||p.image||'';
  const desc=p.line_description||'';
  const spec=p.line_spec||''; // fix18-10-hotfix19：LINE 通路獨立規格（例：200g）
  const isHot=Number(p.line_hot)===1, isPromo=Number(p.line_promo)===1;
  const ss=p.sale_status||'available';
  // Hotfix16 BUG-002：尚未開賣但允許預購今天稍後時段（後端已判斷，前台不重複判斷）
  const preSaleAvailable=!!p.pre_sale_available;

  // fix18-10-hotfix30-A：先算出兩種模式各自的可購買狀態，商品卡「任一模式可買」即視為可買，
  // 不再單獨依賴 currentMode，避免「目前模式今日停用」時商品卡誤判為全部不可購買。
  const modeAvail=getProductAvailableModes(p);
  const anyModeEnabled = modeAvail.takeout.enabled || modeAvail.delivery.enabled;
  const onlyTakeout = modeAvail.takeout.enabled && !modeAvail.delivery.enabled;
  const onlyDelivery = modeAvail.delivery.enabled && !modeAvail.takeout.enabled;
  // fix18-10-hotfix30-B5 root cause fix（第六項）：「任一模式現在就能立即下單」與「任一模式
  // 只能透過預約明日才 enabled」必須分開判斷，否則像「外帶現在開放、外送要靠 Business
  // Calendar 的預約明日才 enabled」這種情境，會被誤判成「今日售完、可預購」，明明外帶現在
  // 就能正常買。reason===null 代表該模式沒有任何售完/關閉原因，是「現在就能買」的唯一判斷式。
  const anyImmediate = (modeAvail.takeout.enabled && !modeAvail.takeout.reason)
    || (modeAvail.delivery.enabled && !modeAvail.delivery.reason);
  const mode=_representativeMode(modeAvail);

  // ══════════════════════════════════════════════════════
  // LINE 接單規則優先順序（前台顯示層，與後端 /api/line-menu 一致）
  //   第一位階：今日休假 → calendar_closed / today_closed / weekly_closed（只限今日）
  //   第二位階：今日截止時間 → cutoff_sold_out（只限今日）
  //   第三位階：商品販售時段 → product_time_ended / product_not_started（只限今日）
  //   第四位階：LINE 份數     → real_sold_out（只限今日）
  //   canNextDay=true 時，任何今日限制都顯示「預約明日／預約下個營業日」按鈕
  // ══════════════════════════════════════════════════════

  const soldOutReason=mode==='delivery'?p.delivery_sold_out_reason:p.takeout_sold_out_reason;
  const canNextDay=mode==='delivery'?p.delivery_can_next_day:p.takeout_can_next_day;
  // fix18-10-hotfix30-A：只有兩種模式都不可買時，商品才算「不可購買」；
  // 任一模式可買，即便 currentMode 本身不可用，也不得整卡灰掉。
  const isSoldOut = anyModeEnabled ? false : (!!soldOutReason || Number(p.line_sold_out)===1 || ss!=='available');
  const isDayClosed = soldOutReason==='calendar_closed' || soldOutReason==='today_closed' || soldOutReason==='weekly_closed';

  // LINE quota 優先（食材控管不適用 LINE 點餐，ingredient_available 不影響前台顯示）
  const quota=p.line_quota||{hasQuota:false};

  // canPreorderNextDay：今日售完（任何位階）且允許預約明日
  // fix18-10-hotfix30-B5 root cause fix（第六項）：加上 !anyImmediate——只要還有任何模式
  // 「現在」就能買，商品卡一律顯示正常販售，不得同時冒出「今日售完」＋「可預購」徽章
  // （這正是 Business Calendar 只關閉單一模式時，商品卡被誤判成「今日售完 可預購」的根因）。
  const canPreorderNextDay = !anyImmediate && (isSoldOut || !!soldOutReason) && !!canNextDay && soldOutReason !== 'mode_closed';
  const quotaRealSoldOut = quota.hasQuota && Number(quota.remaining??0) <= 0;
  const unavailFully = (isSoldOut && !canPreorderNextDay) || (quotaRealSoldOut && !canPreorderNextDay);

  // Hotfix16 BUG-006：今日狀態文字與顏色重新設計，避免全部顯示灰色造成誤解
  let soldLbl='今日售完', soldCls='badge-sold';
  if(soldOutReason==='mode_closed'){          soldLbl='未開放';       soldCls='badge-sold'; }
  else if(isDayClosed){                       soldLbl='休假中';       soldCls='badge-holiday'; }
  // fix18-10-hotfix30-B5 第七項：Business Calendar 造成的單一模式關閉，永遠不得顯示
  // 「今日售完」字樣（那個字眼只能用於庫存售完／商品停售），改顯示「暫停販售」。
  else if(soldOutReason==='calendar_mode_closed'){ soldLbl='暫停販售';   soldCls='badge-sold'; }
  else if(soldOutReason==='product_not_started'){ soldLbl='尚未開始販售'; soldCls='badge-orange'; }
  else if(soldOutReason==='product_time_ended'){  soldLbl='今日售完';   soldCls='badge-soldout-today'; }
  else if(soldOutReason==='real_sold_out'){       soldLbl='今日售完';   soldCls='badge-soldout-today'; }
  else if(soldOutReason==='cutoff_sold_out'){     soldLbl='今日售完';   soldCls='badge-soldout-today'; }
  else if(ss==='sold_out_today'){             soldLbl='今日完售';     soldCls='badge-soldout-today'; }
  else if(ss==='paused'){                     soldLbl='暫停販售';     soldCls='badge-sold'; }

  // 份數狀態標籤（第四位階）
  // 今日：用 line_quota；預購（hasNextDayMode=true 或購物車選的是明日）：用 line_preorder
  const preorderInfo=p.line_preorder||{hasPreorder:false};
  const isInPreorderMode=!!preorderInfo.hasPreorder;  // 後端已判斷
  let stockBadge='';
  if(!isSoldOut){
    if(quota.hasQuota && !isInPreorderMode){
      const r=Number(quota.remaining??0);
      if(r<=0)               stockBadge='<div class="prod-stock-badge stock-zero">🔴 今日售完</div>';
      else if(r<=quota.low)  stockBadge=`<div class="prod-stock-badge stock-low">🟠 即將售完（剩${r}份）</div>`;
      else if(r>=quota.high) stockBadge='<div class="prod-stock-badge stock-ok">🟢 供應充足</div>';
      else                   stockBadge=`<div class="prod-stock-badge stock-ok">🟢 剩 ${r} 份</div>`;
    }
  }
  // fix18-10-hotfix22D：canPreorderNextDay 商品不再顯示「預約明日/預約下個營業日」按鈕，
  // 改為直接顯示 [-] qty [+]，故只需保留「預購是否已滿」的判斷。
  const preorderFullBlocked = canPreorderNextDay && preorderInfo.hasPreorder && Number(preorderInfo.remaining??0)<=0;

  // Hotfix16 BUG-002/006：🟢 可預約（尚未開賣但允許預購今天稍後時段）— 不灰掉、可直接加入購物車
  const preSaleBadge = (!isSoldOut && preSaleAvailable)
    ? '<span class="badge badge-green">🟢 可預約</span>' : '';

  const qty=cart[p.id]?.qty||0;
  // fix18-10-hotfix22D：canPreorderNextDay 且份數未滿時，商品卡永遠顯示 [-] qty [+]（不再需要先按預約按鈕）
  let footer='';
  if(!isSoldOut || (canPreorderNextDay && !preorderFullBlocked)){
    // pre_sale_available 商品同樣可直接加入購物車（不受尚未開賣影響）
    footer=qty>0
      ?`<div class="qty-ctrl"><button class="minus" onclick="chgQty(${p.id},-1)">−</button><span class="qnum">${qty}</span><button class="plus" onclick="chgQty(${p.id},1)">+</button></div>`
      :`<button class="add-btn" id="ab-${p.id}" onclick="addCart(${p.id},event)">+</button>`;
  }

  // Hotfix16 BUG-006：商品遮罩 — 只有休假／售完／停售才灰掉，pre_sale_available 一律不灰掉
  // fix18-10-hotfix22D：canPreorderNextDay 商品「不再」顯示遮罩／預約按鈕，只有「預購已滿」或
  // 完全不可預購（unavailFully）時才灰掉。
  // hotfix22-F 第九點：不可立即購買時，只讓圖片變暗，商品名稱/說明/價格仍正常顯示；
  // 不再用整卡覆蓋式 mask（舊版 .sold-mask 會蓋住名稱與價格）。
  const imgDimmed = unavailFully || preorderFullBlocked;

  const imgHtml=img?`<img class="prod-img" src="${img}" alt="${esc(name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'';
  // fix18-10-hotfix22D：canPreorderNextDay（且未預購額滿）時，改為兩個徽章「🔴{狀態}」＋「🟢可預購」，
  // 取代舊版「可預約明日／預約下個營業日」單一徽章；其餘不可預購狀態維持原本單一徽章。
  // hotfix22-F：這些「今日售完／休假中／可預購」屬於狀態標籤，固定顯示在照片下方（status-row），
  // 不參與行銷標籤排序、不佔用照片上的行銷標籤版位。
  let statusRowHtml='';
  if(preorderFullBlocked){
    statusRowHtml=`<span class="badge ${soldCls}">預購已滿</span>`;
  } else if(canPreorderNextDay){
    statusRowHtml=`<span class="badge ${soldCls}">🔴 ${soldLbl}</span><span class="badge badge-green">🟢 可預購</span>`;
  } else if(isSoldOut){
    statusRowHtml=`<span class="badge ${soldCls}">${soldLbl}</span>`;
  } else if(preSaleBadge){
    statusRowHtml=preSaleBadge;
  }

  // hotfix22-F 第九點：行銷標籤（左上主緞帶／右上小膠囊，最多顯示 2 個）。
  // 本版維持預設優先順序：優惠 > 新品 > 店長推薦 > 熱銷；「新品」「店長推薦」需要商品資料表
  // 新欄位才能支援，本輪不修改商品資料表，故暫不提供，僅先支援既有「優惠」「熱銷」欄位。
  // 商家可調整名稱/排序/開關/數量的後台設定延後至下一版。
  const marketingTags=[];
  if(isPromo) marketingTags.push({cls:'tag-ribbon-promo',label:'🎁 優惠'});
  if(isHot)   marketingTags.push({cls:'tag-ribbon-hot',label:'🔥 熱銷'});
  const ribbonHtml  = marketingTags[0] ? `<div class="tag-ribbon ${marketingTags[0].cls}">${marketingTags[0].label}</div>` : '';
  const capsuleHtml = marketingTags[1] ? `<div class="tag-capsule ${marketingTags[1].cls}">${marketingTags[1].label}</div>` : '';
  // fix18-10-hotfix30-A 第十一點：兩種模式皆可買時不顯示模式標籤；只有一種可買時，
  // 照片右下角顯示小膠囊「僅外送」/「僅外帶」，讓客人在還沒選取餐方式前就知道限制。
  const modeOnlyCapsuleHtml = (!isSoldOut && (onlyTakeout || onlyDelivery))
    ? `<div class="tag-capsule" style="bottom:6px;right:6px;top:auto;background:#607d8b">${onlyTakeout?'僅外帶':'僅外送'}</div>` : '';

  return `<div class="prod-card" id="pc-${p.id}"><div class="prod-img-wrap${imgDimmed?' img-dimmed':''}">${imgHtml}<div class="prod-ph" ${img?'style="display:none"':''}>🍽️</div>${ribbonHtml}${capsuleHtml}${modeOnlyCapsuleHtml}</div><div class="prod-body"><div class="prod-name">${esc(name)}</div>${spec?`<div class="prod-spec">${esc(spec)}</div>`:''}<div class="status-row">${statusRowHtml}</div>${stockBadge}<div class="prod-desc">${esc(desc)}</div><div class="prod-footer"><span class="prod-price">$${price}</span>${footer}</div></div></div>`;
}

// ── 購物車操作 ─────────────────────────────────────────
function addCart(id,evt){
  const p=allProducts.find(x=>x.id==id);if(!p)return;
  // fix18-10-hotfix30-A：不再要求顧客先選外帶/外送才能加入購物車。
  // 只要「任一模式」可買，就用該模式的規則放行；currentMode 本身不可用時，
  // 改用另一個可用模式的判斷依據（並在加入後由 reconcileFulfillmentMode() 決定
  // 是否需要提示切換購物車目前的取餐方式）。兩種模式都不可用才擋下。
  const modeAvail=getProductAvailableModes(p);
  if(!modeAvail.takeout.enabled && !modeAvail.delivery.enabled){
    // fix18-10-hotfix30-B1：不得自行再判斷 takeoutEnabled/deliveryEnabled，一律經由 getFulfillmentStatus()。
    const bothClosed = !getFulfillmentStatus('takeout').enabled && !getFulfillmentStatus('delivery').enabled;
    alert(bothClosed ? '今日暫停接單，無法加入購物車' : '此商品今日不可購買');
    return;
  }
  const mode=_representativeMode(modeAvail);
  const soldOutReason=mode==='delivery'?p.delivery_sold_out_reason:p.takeout_sold_out_reason;
  const canNextDay=mode==='delivery'?p.delivery_can_next_day:p.takeout_can_next_day;
  // 任何售完原因：若允許預約則直接加入購物車（不再要求先按預約按鈕）；否則拒絕
  if(soldOutReason){
    if(canNextDay){ addPreorderToCart(id,evt,p); return; }
    const msgs={
      cutoff_sold_out:'已超過今日接單截止時間，無法加入購物車',
      real_sold_out:(p.effective_line_name||p.name)+' LINE 今日份數已售完',
      product_time_ended:(p.effective_line_name||p.name)+' 今日販售時段已結束',
      product_not_started:(p.effective_line_name||p.name)+`尚未開始販售（${p.line_sell_start||''} 開賣）`,
      calendar_closed:'今日休假中，無法加入購物車，請選擇其他營業日期',
      today_closed:'今日臨時休息，無法加入購物車，請選擇其他營業日期',
      weekly_closed:'今日固定公休，無法加入購物車，請選擇其他營業日期',
    };
    alert(msgs[soldOutReason]||'此商品目前無法加入購物車');return;
  }
  if(Number(p.line_sold_out)===1){
    if(canNextDay){ addPreorderToCart(id,evt,p); return; }
    alert((p.effective_line_name||p.name)+' 今日已售完');return;
  }
  // BUG-002 修正：依目前購物車選擇的日期，決定用今日 quota 還是預購 preorder 判斷
  const _selectedDate = document.getElementById('pDate')?.value || '';
  const _todayStr = fmtD(twNow());
  const _isPreorderCart = _selectedDate && _selectedDate > _todayStr;
  if(_isPreorderCart){
    // 預購日期：只用 line_preorder_* 判斷，完全不看 line_quota_*
    const preorderInfo=p.line_preorder||{hasPreorder:false};
    if(preorderInfo.hasPreorder && Number(preorderInfo.remaining??0)<=0){
      alert((p.effective_line_name||p.name)+' 預購已滿');return;
    }
    const inCart=cart[id]?.qty||0;
    if(preorderInfo.hasPreorder && inCart>=(Number(preorderInfo.remaining??0))){
      alert((p.effective_line_name||p.name)+` 預購剩餘份數不足（剩 ${preorderInfo.remaining} 份）`);return;
    }
  } else {
    // 今日訂單：用 line_quota_*
    if(p.line_quota?.hasQuota&&Number(p.line_quota?.remaining)<=0){
      if(canNextDay){ addPreorderToCart(id,evt,p); return; }
      alert((p.effective_line_name||p.name)+' LINE 今日份數已售完');return;
    }
    if(p.line_quota?.hasQuota){
      const inCart=cart[id]?.qty||0;
      if(inCart>=(p.line_quota.remaining||0)){alert((p.effective_line_name||p.name)+` LINE 剩餘份數不足（剩 ${p.line_quota.remaining} 份）`);return;}
    }
  }
  if(!cart[id])cart[id]={product:p,qty:0};
  cart[id].qty++;
  _trackAddToCart(id,1);
  if(evt){const fly=document.createElement('div');fly.className='fly-item';fly.textContent='🛒';fly.style.cssText=`left:${evt.clientX}px;top:${evt.clientY}px`;document.body.appendChild(fly);setTimeout(()=>fly.remove(),700);}
  updateBar();updateProductCard(id);
  reconcileFulfillmentMode();
  persistCart();
}

// ── B: 預約明日 — 完整流程 ────────────────────────────────
// 1. 找下一個可訂日 2. 加商品進購物車 3. 載入明日時段 4. 打開購物車
// hotfix22-B：找出某模式（takeout/delivery）下一個可訂日（排除今日、公休日、非營業日）
// preorderNextDay() 與「今日截止後導向下一可營業日」共用同一套邏輯，避免各自維護不同判斷
function findNextAvailableDate(mode){
  const now=twNow();
  const closedWds=(() => { try { return JSON.parse(shopData.line_closed_weekdays||'[]'); } catch { return []; } })();
  const closedDts=(() => { try { return JSON.parse(shopData.line_closed_dates||'[]'); } catch { return []; } })();
  const bizHoursKey=mode==='takeout'?'takeout_business_hours':'delivery_business_hours';
  const bizHours=(() => { try { return JSON.parse(shopData[bizHoursKey]||'{}'); } catch { return {}; } })();
  const bizHoursEmpty=Object.keys(bizHours).length===0;
  const WD_KEYS_LOCAL=['sun','mon','tue','wed','thu','fri','sat'];
  for(let offset=1;offset<=14;offset++){
    const d=new Date(now); d.setDate(d.getDate()+offset);
    const ds=fmtD(d),wk=WD_KEYS_LOCAL[parseLocalDate(ds).getDay()];
    if(closedWds.includes(wk)||closedDts.includes(ds)) continue;
    if(!bizHoursEmpty){ const dh=bizHours[wk]; if(dh&&!dh.enabled) continue; }
    return ds;
  }
  return null;
}
function addPreorderToCart(id,evt,p){
  // fix18-10-hotfix22D：取代舊版「preorderNextDay()」的按鈕流程——不再另外打開購物車、
  // 不再強制設定日期／時段（改由 openCartSheet()/switchMode()/onModeChange() 在購物車實際
  // 開啟時，依 preorderRequiredIds 統一重新計算下個營業日與時段，避免背景預先寫入之後又被
  // 使用者切換模式或店家異動設定弄成過期資料）。這裡只負責：驗證預購份數 → 加入購物車 → 標記。
  if(evt){evt.stopPropagation();}
  const preorderInfo=p.line_preorder||{hasPreorder:false};
  if(preorderInfo.hasPreorder && Number(preorderInfo.remaining??0)<=0){
    alert((p.effective_line_name||p.name)+' 預購已滿');return;
  }
  const inCart=cart[id]?.qty||0;
  if(preorderInfo.hasPreorder && inCart>=(Number(preorderInfo.remaining??0))){
    alert((p.effective_line_name||p.name)+` 預購剩餘份數不足（剩 ${preorderInfo.remaining} 份）`);return;
  }
  if(!cart[id])cart[id]={product:p,qty:0};
  cart[id].qty++;
  _trackAddToCart(id,1);
  preorderRequiredIds.add(Number(id));
  if(evt){const fly=document.createElement('div');fly.className='fly-item';fly.textContent='🛒';fly.style.cssText=`left:${evt.clientX}px;top:${evt.clientY}px`;document.body.appendChild(fly);setTimeout(()=>fly.remove(),700);}
  updateBar();updateProductCard(id);
  persistCart();
  toast('✅ 已加入購物車，將自動預約下個營業日');
}

// ── 依購物車內容重新計算日期選擇器：若購物車內有任何商品需要自動預約下個營業日，
//    forceNextDay=true（從明天起算），並自動選中下個可訂日；否則維持原本今天起算的選單。
//    hotfix22-B 既有慣例：每次開啟/切換都即時重算，避免使用頁面載入當下的快取狀態。
async function refreshDateSelectorForCart(){
  const mode=currentMode; // 明確鎖定，往下都用這個區域變數，不再散落讀取可能變動的 currentMode
  const needsNextDay=Object.keys(cart).some(id=>preorderRequiredIds.has(Number(id)));
  if(needsNextDay){
    buildDateSelector(true, mode); // forceNextDay=true：從明天起算，範圍到 line_preorder_days_limit
    const nextDate=findNextAvailableDate(mode);
    const pDate=document.getElementById('pDate');
    if(pDate&&nextDate){
      const targetOpt=Array.from(pDate.options).find(o=>o.value===nextDate&&!o.disabled);
      if(targetOpt) pDate.value=nextDate;
    }
    await buildTimeSelector(mode); // forceNextDay=true 時 buildDateSelector 不會自動呼叫，這裡手動載入時段
  } else {
    buildDateSelector(false, mode);
  }
  refreshModeCutoffUI();
  persistCart();
}
// fix18-10-hotfix22D：取代舊版 openCartSheetWithDate()——僅用於「送單當下才發現今日已截止」
// 的救援導向（購物車 sheet 此時已經是開啟狀態，只需要把日期/時段改成下一個可營業日）。
function applyDateTimeToCartSheet(dateStr, slots){
  buildDateSelector(true); // forceNextDay=true：從明天起算
  const pDate=document.getElementById('pDate');
  if(pDate){
    const targetOpt=Array.from(pDate.options).find(o=>o.value===dateStr&&!o.disabled);
    pDate.value = targetOpt ? dateStr : (pDate.querySelector('option:not([disabled])')?.value||dateStr);
  }
  const pTime=document.getElementById('pTime');
  if(pTime){
    if(slots&&slots.length>0){
      pTime.innerHTML='';
      slots.forEach(t=>{
        const h=Number(t.split(':')[0]);
        const lbl=h<12?`上午 ${t}`:h===12?`中午 ${t}`:`下午 ${t}`;
        const o=document.createElement('option');o.value=t;o.textContent=lbl;
        pTime.appendChild(o);
      });
      pTime.value=slots[0];
    } else {
      pTime.innerHTML='<option value="" disabled>此日無可選時段，請選其他日期</option>';
    }
  }
  refreshModeCutoffUI();
  persistCart();
}
function chgQty(id,d){
  if(!cart[id])return;
  if(d>0){
    const p=allProducts.find(x=>x.id==id);
    // fix18-10-hotfix22D：商品已被 addPreorderToCart() 標記為「需自動預約下個營業日」時，
    // 一律用 line_preorder_* 判斷，不再依賴購物車 pDate 目前的值（此時 pDate 可能還沒被
    // refreshDateSelectorForCart() 同步過，例如購物車尚未開啟過）。
    const isPreorderItem=preorderRequiredIds.has(Number(id));
    if(isPreorderItem){
      const preorderInfo=p?.line_preorder||{hasPreorder:false};
      if(preorderInfo.hasPreorder && cart[id].qty>=(Number(preorderInfo.remaining??0))){
        alert('預購剩餘份數不足');return;
      }
    } else {
      // BUG-002 修正：依目前購物車選擇的日期，決定用今日 quota 還是預購 preorder 判斷
      const _selectedDate = document.getElementById('pDate')?.value || '';
      const _todayStr = fmtD(twNow());
      const _isPreorderCart = _selectedDate && _selectedDate > _todayStr;
      if(_isPreorderCart){
        // 預購日期：只用 line_preorder_*，完全不看 line_quota_*
        const preorderInfo=p?.line_preorder||{hasPreorder:false};
        if(preorderInfo.hasPreorder && cart[id].qty>=(Number(preorderInfo.remaining??0))){
          alert('預購剩餘份數不足');return;
        }
      } else {
        // 今日訂單：用 line_quota_*
        if(p&&p.line_quota?.hasQuota&&cart[id].qty>=(p.line_quota.remaining||0)){alert('LINE 份數不足');return;}
      }
    }
  }
  const _qtyBefore=cart[id].qty;
  cart[id].qty+=d;
  if(d>0){ _trackAddToCart(id, d); }
  if(cart[id].qty<=0){
    if(_qtyBefore>0) _trackRemoveFromCart(id, _qtyBefore);
    delete cart[id]; preorderRequiredIds.delete(Number(id));
  }
  updateBar();updateProductCard(id);
  reconcileFulfillmentMode();
  if(document.getElementById('cartSheet').classList.contains('show'))renderCartItems();
  persistCart();
}
function updateProductCard(id){
  const p=allProducts.find(x=>x.id==id);if(!p)return;
  const card=document.getElementById(`pc-${id}`);if(!card)return;
  const modeAvail=getProductAvailableModes(p);
  const anyModeEnabled=modeAvail.takeout.enabled||modeAvail.delivery.enabled;
  // fix18-10-hotfix30-B5 root cause fix（第六項）：與 buildCard() 一致，任一模式現在就能
  // 立即下單時，不得顯示「今日售完/可預購」。
  const anyImmediate = (modeAvail.takeout.enabled && !modeAvail.takeout.reason)
    || (modeAvail.delivery.enabled && !modeAvail.delivery.reason);
  const mode=_representativeMode(modeAvail);
  const soldOutReason=mode==='delivery'?p.delivery_sold_out_reason:p.takeout_sold_out_reason;
  const canNextDay=mode==='delivery'?p.delivery_can_next_day:p.takeout_can_next_day;
  const isSoldOutFlag=anyModeEnabled?false:(!!soldOutReason||Number(p.line_sold_out)===1||(p.sale_status||'available')!=='available');
  // fix18-10-hotfix22D：canPreorderNextDay 商品現在footer照樣顯示 [-] qty [+]，
  // 故只有「真的完全不可預購」時才提早 return（維持遮罩，不更新 footer）。
  const canPreorderNextDay=!anyImmediate && (isSoldOutFlag||!!soldOutReason) && !!canNextDay && soldOutReason!=='mode_closed';
  const preorderInfo=p.line_preorder||{hasPreorder:false};
  const preorderFullBlocked=canPreorderNextDay && preorderInfo.hasPreorder && Number(preorderInfo.remaining??0)<=0;
  if(isSoldOutFlag && !(canPreorderNextDay && !preorderFullBlocked)) return;
  const qty=cart[id]?.qty||0;
  const footer=card.querySelector('.prod-footer');if(!footer)return;
  const last=footer.lastElementChild;if(!last)return;
  if(qty>0) last.outerHTML=`<div class="qty-ctrl"><button class="minus" onclick="chgQty(${id},-1)">−</button><span class="qnum">${qty}</span><button class="plus" onclick="chgQty(${id},1)">+</button></div>`;
  else last.outerHTML=`<button class="add-btn" id="ab-${id}" onclick="addCart(${id},event)">+</button>`;
}
function updateBar(){
  const subtotal=Object.values(cart).reduce((s,{product:p,qty})=>s+(p.effective_line_price||p.price)*qty,0);
  const cnt=Object.values(cart).reduce((s,{qty})=>s+qty,0);
  document.getElementById('cartCnt').textContent=cnt;
  // fix18-05: 套用優惠折扣
  const discAmt=appliedCoupon?appliedCoupon.discount_amount:0;
  document.getElementById('cartBar').classList.toggle('hidden',cnt===0);
  // 金額明細
  const subtotalEl=document.getElementById('subtotalDisplay');
  const orderTotalEl=document.getElementById('orderTotal');
  const discRowEl=document.getElementById('discountRow');
  const discEl=document.getElementById('discountDisplay');
  if(subtotalEl) subtotalEl.textContent=`$${subtotal}`;
  if(discRowEl) discRowEl.style.display=discAmt>0?'flex':'none';
  if(discEl) discEl.textContent=`-$${discAmt}`;
  // fix18-06: 外送費納入應付金額
  const cartDelivRow=document.getElementById('cartDelivFeeRow');
  const cartDelivEl=document.getElementById('cartDelivFeeDisplay');
  const isDelivMode=currentMode==='delivery';
  const shownDelivFee=isDelivMode&&deliveryFeeCalculated?calcDeliveryFee:0;
  if(cartDelivRow) cartDelivRow.style.display=shownDelivFee>0?'flex':'none';
  if(cartDelivEl) cartDelivEl.textContent=`$${shownDelivFee}`;
  const payable=subtotal-discAmt+shownDelivFee;
  if(orderTotalEl) orderTotalEl.textContent=`$${payable}`;
  document.getElementById('cartBarTotal').textContent=`$${subtotal-discAmt}`; // bar 只顯示商品合計（外送費確認後才納入）
  // 若購物車清空，清除優惠券
  if(cnt===0&&appliedCoupon){ clearCoupon(); }
}
// fix18-06: 共用 updateCartTotals（供外送費確認後刷新）
function updateCartTotals(){ updateBar(); }
// ── fix18-05：優惠券相關函式 ──────────────────────────────
async function applyCoupon(){
  const code=(document.getElementById('couponInput')?.value||'').trim().toUpperCase();
  const msgEl=document.getElementById('couponMsg');
  if(!code){if(msgEl)msgEl.innerHTML='<span style="color:#e53935">請輸入優惠券代碼</span>';return;}
  // 計算目前小計
  const subtotal=Object.values(cart).reduce((s,{product:p,qty})=>s+(p.effective_line_price||p.price)*qty,0);
  if(!subtotal){if(msgEl)msgEl.innerHTML='<span style="color:#e53935">購物車是空的，無法套用優惠券</span>';return;}
  // 取得目前電話（可能尚未填寫，validate 後端允許空值但受 max_usage_per_phone 限制）
  const phone=(document.getElementById('cPhone')?.value||'').trim();
  const btn=document.getElementById('couponApplyBtn');
  if(btn){btn.disabled=true;btn.textContent='驗證中…';}
  try{
    const res=await apiFetch('/api/coupons/validate',{
      method:'POST',
      body:JSON.stringify({code,subtotal,customer_phone:phone})
    }).then(r=>r.json());
    if(res.success){
      appliedCoupon={code:res.coupon.code,discount_amount:res.discount_amount,final_total:res.final_total,coupon:res.coupon};
      if(msgEl)msgEl.innerHTML=`<span style="color:#06C755">✅ ${res.coupon.name}：折扣 -$${res.discount_amount}</span>`;
      updateBar();
      persistCart();
    }else{
      appliedCoupon=null;
      // fix18-05: 若優惠券功能被停用，隱藏整個輸入區
      if(res.error==='COUPON_FEATURE_DISABLED'){
        const area=document.getElementById('couponArea');
        if(area) area.style.display='none';
      }
      if(msgEl)msgEl.innerHTML=`<span style="color:#e53935">❌ ${res.message||'優惠券無效'}</span>`;
      updateBar();
    }
  }catch(e){
    if(msgEl)msgEl.innerHTML='<span style="color:#e53935">❌ 網路錯誤，請稍後再試</span>';
  }finally{
    if(btn){btn.disabled=false;btn.textContent='套用';}
  }
}
function clearCoupon(){
  appliedCoupon=null;
  const inp=document.getElementById('couponInput');if(inp)inp.value='';
  const msg=document.getElementById('couponMsg');if(msg)msg.innerHTML='';
  const dr=document.getElementById('discountRow');if(dr)dr.style.display='none';
  persistCart();
}

// ── hotfix22-F：購物車 localStorage 永久保留（不設 expires_at / 24hr 判斷，
//    與冷藏宅配 line-shipping.html 使用統一資料格式，但各用獨立 key）────────
// 清空條件只有：①訂單成立 ②LINE Pay 付款成功 ③使用者按「清空購物車」
//              ④商品已下架（只移除該商品）⑤商家手動清除
function persistCart(){
  try{
    const cartQtyMap={};
    Object.entries(cart).forEach(([pid,c])=>{ cartQtyMap[pid]=c.qty; });
    let _existingCreatedAt=null;
    try{ const _prev=JSON.parse(localStorage.getItem(ORDER_CART_KEY)||'null'); _existingCreatedAt=_prev?.cart_created_at||null; }catch(e){}
    const data={
      version:1,
      store_id:LINE_STORE_ID,
      // 預留：未來 Conversion Analytics（AddToCart/BeginCheckout/Purchase）用，目前只存不分析
      session_id:_getSessionId(),
      visitor_id:_getVisitorId(),
      cart_created_at:_existingCreatedAt||Date.now(),
      cart_updated_at:Date.now(),
      cart:cartQtyMap,
      order_mode:currentMode, // 'takeout' | 'delivery'
      customer:{
        name:document.getElementById('cName')?.value||'',
        phone:document.getElementById('cPhone')?.value||'',
        delivery_address:document.getElementById('deliveryAddress')?.value||'',
        delivery_address_note:document.getElementById('deliveryAddressNote')?.value||'',
        // fix18-10-hotfix30-B4 第十二點：一併保存外送座標/距離/運費，F5 後才能完整還原
        // delivery Context（舊版只存地址文字，座標/距離/運費遺失，重開後需要重新計算）。
        delivery_lat: deliveryLatLng.lat,
        delivery_lng: deliveryLatLng.lng,
        delivery_distance_km: deliveryFeeCalculated ? deliveryDistKm : null,
        delivery_fee: deliveryFeeCalculated ? calcDeliveryFee : null,
      },
      coupon_code:appliedCoupon?.code||'', // 只存 code，還原時一律重新驗證
      pickup_date:document.getElementById('pDate')?.value||'',
      pickup_time:document.getElementById('pTime')?.value||'',
      payment_method:selectedPay||'',
      order_note:document.getElementById('oNote')?.value||'',
    };
    localStorage.setItem(ORDER_CART_KEY,JSON.stringify(data));
  }catch(e){ /* localStorage 不可用時安靜略過，不影響下單流程 */ }
}
function _debounce(fn,ms){ let t=null; return function(...args){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args),ms); }; }
// 文字輸入框（姓名/電話/地址/備註）用 debounce，避免每個按鍵都寫入 localStorage；
// 其餘互動（加減商品、切換模式、選日期/時段、套用優惠券…）一律立即呼叫 persistCart()。
const debouncedPersistCart=_debounce(persistCart,400);
function clearCartStorage(){
  try{ localStorage.removeItem(ORDER_CART_KEY); }catch(e){}
  _resetCartId(); // fix18-10-hotfix23-A：訂單成立/清空後，下一個購物車要用新的 cart_id
}
// 使用者主動按「清空購物車」──────────────────────────────
function clearCartByUser(){
  if(!Object.keys(cart).length && !appliedCoupon){ closeSheet('cartSheet'); return; }
  if(!confirm('確定要清空購物車嗎？')) return;
  // fix18-10-hotfix23-A：使用者主動清空購物車 → 記一筆 remove_from_cart（metadata.reason=
  // clear_cart），而不是逐項送出，避免事件洪水；不得與「下單成功」混淆（那邊不觸發此事件）
  try{
    const items=Object.entries(cart).map(([pid,c])=>({product_id:Number(pid),qty:c.qty}));
    if(items.length){
      _trackEvent('remove_from_cart',{
        quantity: items.reduce((s,i)=>s+i.qty,0),
        metadata:{reason:'clear_cart', items},
      });
    }
  }catch(e){}
  cart={};preorderRequiredIds.clear();
  clearCoupon();
  clearCartStorage();
  updateBar();renderMenu();renderCartItems();
  closeSheet('cartSheet');
  toast('🗑️ 已清空購物車');
}
// 頁面載入時還原購物車（不設任何到期時間；商品不存在/已下架時只跳過該項，
// 不清空整台購物車；日期/時段失效時自動落回目前模式下一個可預約日期/時段，
// 沿用既有 buildDateSelector()/buildTimeSelector() 的營業規則判斷，不另寫新規則）───
async function restoreCart(){
  let data;
  try{
    const raw=localStorage.getItem(ORDER_CART_KEY);
    if(!raw) return;
    data=JSON.parse(raw);
  }catch(e){ clearCartStorage(); return; }
  if(!data) return;

  // 還原購物車商品：一律先用「最新一次 API 回來的 allProducts」查找 —— 名稱/價格/圖片/
  // 描述全部採最新資料，localStorage 只提供「id → 數量」，絕不信任舊的價格與總額。
  // 商品不存在／已下架／已停用／LINE 未上架時，allProducts 裡就已經沒有這個 id，
  // 直接跳過該項即可，其餘商品全部保留（不清空整台購物車）。
  cart={};
  const savedCartMap=data.cart||{};
  Object.entries(savedCartMap).forEach(([pid,qty])=>{
    const p=allProducts.find(x=>String(x.id)===String(pid));
    const q=Number(qty);
    if(p && q>0) cart[pid]={product:p,qty:q};
  });
  const _droppedCount=Object.keys(savedCartMap).length-Object.keys(cart).length;
  if(_droppedCount>0) toast(`⚠️ 有 ${_droppedCount} 件商品已下架，已自動從購物車移除`);

  // 還原外帶/外送模式：一律沿用 order_mode（即使目前該模式被關閉，也不得自動切回另一個
  // 開放中的模式——已在 init() 內的 _peekSavedOrderMode() 提前套用並設定 modeForcedVisible，
  // 這裡只是保險再套用一次，確保 restoreCart() 單獨被呼叫時行為一致）。
  const savedMode=data.order_mode;
  if(savedMode==='takeout' || savedMode==='delivery') currentMode=savedMode;
  const oTypeSel=document.getElementById('oType');
  if(oTypeSel) oTypeSel.value=currentMode;
  updateDeliveryAddressVisibility();
  updatePickupAddressVisibility();
  buildPaymentButtons(shopData);
  updateModeAvailabilityUI();

  // 還原顧客資料/備註/外送地址
  const ci=data.customer||{};
  const setV=(id,v)=>{ const el=document.getElementById(id); if(el && v!=null) el.value=v; };
  setV('cName',ci.name);
  setV('cPhone',ci.phone);
  setV('oNote',data.order_note);
  setV('deliveryAddress',ci.delivery_address);
  setV('deliveryAddressNote',ci.delivery_address_note);

  // 還原取餐日期/時間：先依「今天」重新產生整份日期選單（沿用既有今日臨時休息／
  // 今日最後接單／Business Calendar／每週營業時間判斷，不另寫規則）。
  // 若舊日期仍是選單中未 disabled 的選項才套用；否則自動落在目前模式下一個可預約日期，
  // 不清空購物車商品，只提示已自動更新。
  let _dateChanged=false, _timeChanged=false;
  buildDateSelector();
  const pDateSel=document.getElementById('pDate');
  if(pDateSel && data.pickup_date){
    const opt=Array.from(pDateSel.options).find(o=>o.value===data.pickup_date && !o.disabled);
    if(opt) pDateSel.value=data.pickup_date;
    else if(Object.keys(cart).length) _dateChanged=true;
  }
  await buildTimeSelector();
  const pTimeSel=document.getElementById('pTime');
  if(pTimeSel && data.pickup_time){
    const topt=Array.from(pTimeSel.options).find(o=>o.value===data.pickup_time && !o.disabled);
    if(topt) pTimeSel.value=data.pickup_time;
    else if(Object.keys(cart).length) _timeChanged=true;
  }
  if((_dateChanged||_timeChanged) && isCurrentModeAvailable()) toast('⏰ 原預約日期或時段已失效，已更新為下一個可用時段');
  // fix18-10-hotfix30-B4 第十二點：localStorage 向下相容 migration——舊格式只有單一
  // date/time/address（綁在 order_mode 那一個模式），這裡把還原出來的值放進
  // fulfillmentFormState[savedMode]，不複製到另一個模式（另一個模式維持空白，等使用者
  // 切過去時自然是全新輸入，不會被舊資料污染）。lat/lng/distance/fee 是本輪新增欄位，
  // 舊資料沒有這些欄位時自然是 undefined/null，不影響還原流程。
  if(currentMode==='delivery'){
    deliveryLatLng = { lat: ci.delivery_lat||null, lng: ci.delivery_lng||null };
    if(deliveryLatLng.lat && deliveryLatLng.lng){
      // 重新計算而非直接沿用快取金額——重開頁面期間購物車金額可能已經不同，免運門檻需要重算。
      fetchDeliveryFee();
    }
  }
  saveCurrentModeFormState(currentMode); // 把剛還原好的值收進 fulfillmentFormState[currentMode]
  syncFulfillmentContext(currentMode);
  // fix18-10-hotfix30-B1 第六點：還原購物車後，依還原出來的日期同步顯示/隱藏預約資訊區塊。
  buildPreorderInfo();

  // 還原付款方式（若還原代碼目前仍在開放清單內）
  const savedPayMethod=data.payment_method;
  if(savedPayMethod){
    let matched=false;
    document.querySelectorAll('#payBtns .pay-btn').forEach(b=>{
      const isMatch=b.dataset.code===savedPayMethod;
      b.classList.toggle('active',isMatch);
      if(isMatch) matched=true;
    });
    if(matched) selectedPay=savedPayMethod;
  }

  // 還原優惠券：只保存過 code，一律重新呼叫 /api/coupons/validate 驗證，絕不直接信任
  // localStorage 存的折扣金額；優惠券已失效/停用/不再達門檻時只清除優惠券，購物車商品保留。
  appliedCoupon=null;
  const restoredCode=data.coupon_code?String(data.coupon_code).trim().toUpperCase():'';
  if(restoredCode && Object.keys(cart).length){
    try{
      const subtotal=Object.values(cart).reduce((s,{product:p,qty})=>s+(p.effective_line_price||p.price)*qty,0);
      const phone=document.getElementById('cPhone')?.value||'';
      const res=await apiFetch('/api/coupons/validate',{
        method:'POST',
        body:JSON.stringify({code:restoredCode,subtotal,customer_phone:phone})
      }).then(r=>r.json());
      if(res.success){
        appliedCoupon={code:res.coupon.code,discount_amount:res.discount_amount,final_total:res.final_total,coupon:res.coupon};
        const inp=document.getElementById('couponInput'); if(inp) inp.value=res.coupon.code;
        const msgEl=document.getElementById('couponMsg');
        if(msgEl) msgEl.innerHTML=`<span style="color:#06C755">✅ ${res.coupon.name}：折扣 -$${res.discount_amount}</span>`;
      }else{
        toast('原優惠券目前已失效，購物車商品已保留');
      }
    }catch(e){ /* 網路錯誤：安全起見不恢復優惠券顯示，客人可自行重新套用 */ }
  }

  updateBar();renderMenu();
  if(document.getElementById('cartSheet')?.classList.contains('show')) renderCartItems();
  // 還原過程中可能捨棄了失效優惠券/下架商品，寫回一份乾淨的狀態，避免下次整頁重整又嘗試恢復同一批失效資料
  persistCart();
}

function openCartSheet(){
  if(!Object.keys(cart).length)return;
  // fix18-10-hotfix23-A：begin_checkout — 第一次打開購物車時記錄，同一 cart_id 去重一次
  try{
    const cid=_getCartId(true);
    const bcKey='line_bc_sent_'+LINE_STORE_ID;
    let sentFor=null;
    try{ sentFor=sessionStorage.getItem(bcKey); }catch(e){}
    if(cid && sentFor!==cid){
      _trackEvent('begin_checkout');
      try{ sessionStorage.setItem(bcKey,cid); }catch(e){}
    }
  }catch(e){}
  // 移除舊的預約提示
  const hint=document.getElementById('preorder-hint');
  if(hint) hint.remove();
  // fix18-10-hotfix30-A 第七、九點：打開購物車時，先依「店家模式開關 × 購物車商品相容性」
  // 重新計算一次，若目前模式已不可用且只剩一種模式可用，自動切換並提示；
  // 兩種都不可用則停用送出訂單。
  reconcileFulfillmentMode();
  // fix18-10-hotfix30-B4（Context 隔離補強）第十一點：確保購物車開啟當下，目前模式的
  // Context（availability/ui）是最新的，不需要等到下次切換模式才更新——只同步當前模式，
  // 不觸碰另一個模式的 Context，也不重設地址/外送費。
  syncFulfillmentContext(currentMode);
  // 同步購物車 sheet 模式（含 disabled/原因文字，需求文件第六點）
  buildFulfillmentOptions();
  // fix18-10-hotfix30-B1 第六點：purchases 開啟時若日期仍停留在先前選過的未來日期，
  // 同步顯示/隱藏預約資訊區塊（不得等到使用者手動切換日期才出現）。
  buildPreorderInfo();
  _trackEvent('fulfillment_method_view',{ cart_id:_getCartId(false) });
  renderCartItems();openSheet('cartSheet');
  // hotfix22-B：開啟購物車時重新查詢日期/時段（即時打 API，避免使用頁面載入當下的快取狀態；
  // 例如店家在顧客瀏覽期間才設定「今日臨時最後接單時間」，此時應立即反映，而非等下次整頁重整）
  // fix18-10-hotfix22D：改用 refreshDateSelectorForCart()——若購物車內含休假/售完但允許預購的商品，
  // 自動預設下個營業日＋第一個可預約時段，不再需要客人自己按「預約下個營業日」。
  refreshDateSelectorForCart();
}
function renderCartItems(){
  const el=document.getElementById('cartItems');
  const items=Object.values(cart);
  if(!items.length){el.innerHTML='<div class="cart-empty">購物車是空的</div>';return;}
  el.innerHTML=items.map(({product:p,qty})=>{const pr=p.effective_line_price||p.price;return`<div class="ci"><div class="ci-name">${esc(p.effective_line_name||p.name)} × ${qty}</div><div class="ci-price">$${pr*qty}</div><div class="qty-ctrl" style="margin-left:8px"><button class="minus" onclick="chgQty(${p.id},-1)">−</button><span class="qnum">${qty}</span><button class="plus" onclick="chgQty(${p.id},1)">+</button></div></div>`;}).join('');
}

// ── 送單（結帳前再次驗證）────────────────────────────────
async function submitOrder(){
  const name=document.getElementById('cName').value.trim();
  const phone=document.getElementById('cPhone').value.trim();
  const note=document.getElementById('oNote').value.trim();
  const time=document.getElementById('pTime').value.trim();
  const type=document.getElementById('oType').value;
  const pickupDate=document.getElementById('pDate')?.value;

  if(!name){toast('請填寫姓名');return;}
  if(!phone){toast('請填寫電話');return;}
  if(!Object.keys(cart).length){toast('購物車是空的');return;}
  if(!type){toast('請選擇取餐方式');return;}
  // hotfix22-F 補正：目前模式被店家關閉時一律擋下送單（不清空購物車），
  // 与 updateModeAvailabilityUI()/buildDateSelector() 的 UI 層限制互為保險。
  // fix18-10-hotfix30-B3 root cause fix：這裡改用 .selectable（= canOrderNow || canPreorder），
  // 不再只看 .enabled（= canOrderNow）——否則今天稍後可預約、或明日預購的合法訂單，會在
  // 送出的最後一步被誤擋下來（cutoff 檢查仍在下面用 .state==='cutoff'，只針對「今天訂單」
  // 生效，不受這裡影響）。
  const _submitToStatus=getFulfillmentStatus('takeout');
  const _submitDlStatus=getFulfillmentStatus('delivery');
  if((type==='takeout' && !_submitToStatus.selectable) || (type==='delivery' && !_submitDlStatus.selectable)){
    toast((type==='delivery'?'外送':'外帶')+'目前未開放，請切換模式或稍後再試');return;
  }
  // fix18-10-hotfix30-A 第九點：購物車商品相容性——即使模式本身開放，若購物車內有商品
  // 不支援目前選擇的模式，也要擋下並指出哪些商品衝突，不得直接刪除商品或悄悄送單。
  const _cartModes=getCartAvailableModes();
  if(!_cartModes[type]){
    const conflictNames=(_cartModes.reasons[type]||[]).map(r=>r.product_name).join('、');
    toast(`購物車內「${conflictNames}」不支援${type==='delivery'?'外送':'外帶'}，請移除該商品或切換取餐方式`);
    return;
  }
  if(!selectedPay){toast('請選擇付款方式');return;}
  if(!pickupDate){toast('請選擇日期');return;}
  if(!time){toast('請選擇時間');return;}

  // fix18-06: 外送模式驗證地址與費用
  const isDelivery = type === 'delivery';
  if(isDelivery){
    const addrVal=(document.getElementById('deliveryAddress')?.value||'').trim();
    if(!addrVal){toast('外送訂單請填寫外送地址');return;}
    if(!deliveryLatLng.lat||!deliveryLatLng.lng){toast('請重新選擇外送地址（需取得座標）');return;}
    if(!deliveryFeeCalculated){toast('請稍候，外送費計算中…');return;}
  }

  // 送單前雙重驗證：呼叫後端重新確認
  const now=twNow(),nowStr=fmtD(now);
  const isNextDayOrder = pickupDate > nowStr;
  if(!isNextDayOrder){
    if(type==='takeout'&&_submitToStatus.state==='cutoff'){toast('外帶今日接單已截止');return;}
    if(type==='delivery'&&_submitDlStatus.state==='cutoff'){toast('外送今日接單已截止');return;}
  }

  const items=Object.values(cart).map(({product:p,qty})=>({
    product_id:p.id, name:p.effective_line_name||p.name, qty,
    price:p.effective_line_price||p.price, subtotal:(p.effective_line_price||p.price)*qty
  }));
  const subtotal=items.reduce((s,i)=>s+i.subtotal,0);
  const couponCode=appliedCoupon?appliedCoupon.code:'';

  // fix18-06: 組裝外送欄位（後端不信任 delivery_fee，但 preview 值供後端 log 比對）
  const delivPayload = isDelivery ? {
    delivery_address:      (document.getElementById('deliveryAddress')?.value||'').trim(),
    delivery_address_note: (document.getElementById('deliveryAddressNote')?.value||'').trim(),
    delivery_lat:          deliveryLatLng.lat,
    delivery_lng:          deliveryLatLng.lng,
    delivery_fee_preview:      calcDeliveryFee,       // 前端預估，後端重算為準
    delivery_distance_km_preview: deliveryDistKm,     // 前端預估，後端重算為準
  } : {};

  const btn=document.getElementById('subBtn');btn.disabled=true;btn.textContent='送出中…';
  // fix18-10-hotfix23-E：checkout 模式在送單前要求登入（entry 模式已經在進站時擋過）
  if(_lineMemberGateConfig && _lineMemberGateConfig.gate_enabled && _lineMemberGateConfig.gate_mode==='checkout'){
    const gateResult=await LineMemberGate.requireMemberBeforeCheckout(LINE_STORE_ID,_lineMemberGateConfig,_gateIds(),_trackEvent);
    if(!gateResult.ok){ btn.disabled=false;btn.textContent='送出訂單'; return; }
  }
  // fix18-10-hotfix23-A：payment_started — 非 LINE Pay（無跳轉）選擇付款方式並送出時記錄；
  // LINE Pay 改在跳轉前記錄（見下方 lpRes.payment_url 導轉處）
  if(selectedPay!=='linepay'){ _trackEvent('payment_started'); }
  try{
    const orderRes=await apiFetch('/api/line-orders',{
      method:'POST',
      body:JSON.stringify({
        customer_name:name, customer_phone:phone, order_type:type,
        pickup_date:pickupDate, pickup_time:time,
        payment_method:selectedPay, note, items, subtotal,
        coupon_code:couponCode,
        total:subtotal,
        ...delivPayload,
        analytics:_analyticsPayloadForOrder(),
        member_session:_currentMemberSession(),
        cart_token:_activeCartHandoffToken||undefined,
      })
    }).then(r=>r.json());
    if(orderRes.success){ _activeCartHandoffToken=''; }
    if(!orderRes.success){
      toast(orderRes.message||'送出失敗');
      // hotfix22-B：外帶/外送「今日最後接單時間」在送單當下才過期（例如顧客瀏覽期間店家臨時調整截止時間），
      // 後端已擋下（見 routes/line-orders.js validateOrderConditions）。前台若該模式允許預約明日，
      // 直接帶去下一個可營業日，而不是單純重整頁面讓顧客自己重新摸索。
      if(orderRes.reason==='cutoff_sold_out'){
        const allowNext = currentMode==='takeout'
          ? (shopData.takeout_status?.allow_next_day)
          : (shopData.delivery_status?.allow_next_day);
        if(allowNext){
          const nextDate=findNextAvailableDate(currentMode);
          if(nextDate){
            try{
              const tsRes=await apiFetch(`/api/line-orders/timeslots?mode=${currentMode}&date=${nextDate}`).then(r=>r.json());
              const slots=(tsRes.success&&tsRes.slots)?tsRes.slots:[];
              toast(`⏰ 今日已截止，已為您帶到下一個可營業日（${nextDate}）`);
              applyDateTimeToCartSheet(nextDate, slots);
              btn.disabled=false;btn.textContent='送出訂單';
              return;
            }catch(e){ console.warn('cutoff next-day redirect failed',e); }
          }
        }
        setTimeout(()=>location.reload(),2000);
      }
      if(orderRes.reason==='real_sold_out') setTimeout(()=>location.reload(),2000);
      if(orderRes.reason==='maps_unavailable'||orderRes.reason==='out_of_range'){
        resetDeliveryFee();
      }
      return;
    }
    const orderData=orderRes.data;
    localStorage.setItem('last_line_order_number',orderData.order_number);
    localStorage.setItem('last_line_order_phone',phone);

    // ── LINE Pay 付款流程 ──────────────────────────────
    if(selectedPay==='linepay'){
      btn.textContent='前往 LINE Pay…';
      try{
        const baseUrl=`${location.protocol}//${location.host}`;
        const lpRes=await apiFetch('/api/linepay/request',{
          method:'POST',
          body:JSON.stringify({
            order_uuid:orderData.uuid||orderData.order_number,
            order_number:orderData.order_number,
            total:orderData.total||subtotal,
            items, customer_name:name,
            redirect_url:`${baseUrl}/api/linepay/confirm?store_id=${LINE_STORE_ID}`,
            cancel_url:`${baseUrl}/line-order.html?store_id=${LINE_STORE_ID}&linepay=cancel`,
          })
        }).then(r=>r.json());
        if(lpRes.success&&lpRes.payment_url){
          _trackEvent('payment_started');
          // hotfix22-F：LINE Pay 導轉付款前不得清空購物車／優惠券 —— 只有「付款成功」導回時
          // （linepay=success，見 init()）才真正 clearCartStorage()。若使用者取消或付款失敗，
          // 購物車（含 localStorage）維持原樣，讓顧客回來後仍能繼續結帳。
          persistCart();
          window.location.href=lpRes.payment_url;
          return;
        }else{
          toast((lpRes.message)||'LINE Pay 建立付款失敗，請改選其他付款方式');
        }
      }catch(lpErr){
        toast('LINE Pay 連線失敗：'+lpErr.message);
      }
      return;
    }

    // ── 現金 / 其他付款 → 直接顯示成功頁 ─────────────
    const finalDiscAmt=appliedCoupon?appliedCoupon.discount_amount:0;
    const finalDelivFee=orderData.delivery_fee||0;
    clearCoupon();
    resetDeliveryFee();
    closeSheet('cartSheet');cart={};preorderRequiredIds.clear();updateBar();renderMenu();
    // hotfix22-F：訂單成功建立才清空購物車（含 localStorage）
    clearCartStorage();
    document.getElementById('sucNo').textContent=`訂單編號：${orderData.order_number}`;
    document.getElementById('sucDetail').innerHTML=buildDetailRows({
      status:'pending',status_label:'待確認',
      customer_name:name, phone_last3:phone.slice(-3),
      order_type_label:type==='delivery'?'🛵 外送':'🛍️ 外帶',
      pickup_time:`${pickupDate} ${time}`, items, subtotal,
      discount_amount:finalDiscAmt,
      delivery_fee:finalDelivFee,
      delivery_address:delivPayload.delivery_address||'',
      distance_km:orderData.distance_km||0,
      total:orderData.total,
      // fix18-10-hotfix26-F4：外帶訂單顯示後端剛寫入 snapshot 解析出的取餐門市/地址；
      // 外送訂單 orderData.pickup_location 後端固定回傳 null，不會誤顯示。
      pickup_location:orderData.pickup_location||null,
      payment_label:PLABELS[selectedPay]||selectedPay, note
    });
    document.getElementById('successScreen').classList.add('show');
    // fix18-10-hotfix23-D：非 LINE Pay 訂單在這裡就是後端已確認成立的成交（與後端
    // routes/line-orders.js 的 purchase 事件寫入時機一致），value 用 orderData.total
    // （後端回傳金額，不是前端 subtotal 自算值）。
    _firePurchaseOnce(orderData.order_number, orderData.total, items);
  }catch{toast('網路錯誤，請重試');}
  finally{btn.disabled=false;btn.textContent='確認送出訂單';}
}

// ── 定時刷新店家狀態 ──────────────────────────────────
async function refreshShopStatus(){
  try{
    const res=await apiFetch('/api/line-shop',{cache:'no-store'}).then(r=>r.json());
    if(!res.success)return;
    shopData=res.data;
    const ts=res.data.takeout_status||{};
    const ds2=res.data.delivery_status||{};
    const prevToCP=takeoutCutoffPassed, prevDlCP=deliveryCutoffPassed;
    const prevToEn=takeoutEnabled, prevDlEn=deliveryEnabled;
    takeoutCutoffPassed=!!ts.cutoff_passed;
    deliveryCutoffPassed=!!ds2.cutoff_passed;
    // fix18-10-hotfix30-B1：與初始載入一致，使用後端 today_open（已含 Business Calendar／
    // 全域開關／排班／截止時間），不是純粹的全域功能開關 .enabled。
    takeoutEnabled  = ts.today_open  !== undefined ? !!ts.today_open  : !!ts.enabled;
    deliveryEnabled = ds2.today_open !== undefined ? !!ds2.today_open : !!ds2.enabled;
    // fix18-10-hotfix30-B4 第十三點：只更新兩個模式各自的 availability（不觸碰 form/ui 的
    // 地址/日期/時段——那些只能透過 saveCurrentModeFormState()/restoreModeFormState() 改變）。
    syncFulfillmentContext('takeout');
    syncFulfillmentContext('delivery');
    // Hotfix16 BUG-004：休假 Banner 隨定時刷新自動更新／消失（恢復營業日到達後自動不再顯示）
    const prevTodayClosed=todayClosed;
    const holidayBanner=res.data.holiday_banner||{active:false};
    todayClosed=!!holidayBanner.active;
    // Hotfix17：商家公告中心跟著定時刷新更新（例如公告有效期間結束、或後台更新了公告內容）
    const announcement=res.data.announcement||{enabled:false,active:false,source:'none'};
    renderAnnouncement(announcement);
    if(shouldSkipHolidayBannerForAnnouncement(announcement)) hideHolidayBanner();
    else renderHolidayBanner(holidayBanner);
    if(prevToCP!==takeoutCutoffPassed||prevDlCP!==deliveryCutoffPassed||prevTodayClosed!==todayClosed||prevToEn!==takeoutEnabled||prevDlEn!==deliveryEnabled){
      // fix18-10-hotfix30-B5：店家狀態改變時，一併重新評估首頁 Gate 的「今日不能下單但
      // 可預約未來日期」banner（不觸發整頁 showClosed()，只是更新提示文字/顯示與否）。
      try{ renderHolidayPreorderBanner(evaluateHomepageFulfillmentGate(true)); }catch(e){}
      // 重新載入菜單（休假狀態改變會影響商品卡的售完原因/預約明日等顯示）
      try{
        const mr=await apiFetch('/api/line-menu').then(r=>r.json());
        if(mr.success){categories=mr.data.categories||[];allProducts=mr.data.products||[];buildCats();}
      }catch{}
      // hotfix22-F 補正：enabled 狀態改變時，若目前選擇的模式（currentMode）變成關閉，
      // 一律維持在原模式並顯示「未開放」，不自動切換；只重建頁籤/日期時段/送單按鈕的顯示狀態。
      if(prevToEn!==takeoutEnabled||prevDlEn!==deliveryEnabled){
        if((currentMode==='takeout'&&!takeoutEnabled)||(currentMode==='delivery'&&!deliveryEnabled)) modeForcedVisible=true;
        buildDateSelector();
      }
      renderMenu();refreshModeCutoffUI();updateModeAvailabilityUI();
    }
  }catch{}
}
