<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#06C755">
<title>LINE 點餐</title>
<style>
:root{--g:#06C755;--gd:#00A344;--bg:#f5f5f5;--card:#fff;--text:#222;--sub:#888;--bd:#eee;--shadow:0 2px 10px rgba(0,0,0,.10);--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:-apple-system,'Noto Sans TC',sans-serif;color:var(--text);min-height:100vh}
button{border:none;cursor:pointer;font-family:inherit}
img{max-width:100%;display:block}
.hdr{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;padding:20px 16px 64px}
.hdr h1{font-size:22px;font-weight:700}
.hdr-btns{display:flex;gap:8px;margin-top:10px}
.hdr-btn{background:rgba(255,255,255,.22);color:#fff;border:1.5px solid rgba(255,255,255,.5);padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hdr-btn:active{background:rgba(255,255,255,.35)}
.shop-card{background:#fff;border-radius:var(--r);margin:0 12px;margin-top:-52px;padding:16px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:center}
.shop-logo{width:56px;height:56px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;flex-shrink:0;overflow:hidden}
.shop-logo img{width:100%;height:100%;object-fit:cover}
.shop-info h2{font-size:17px;font-weight:700}
.shop-info p{font-size:12px;color:var(--sub);margin-top:3px}
.announce{background:#fff9e6;border-left:3px solid #f5a623;padding:8px 12px;font-size:13px;color:#7a5c00;border-radius:4px;margin:10px 12px 0;white-space:pre-line;display:none}
.last-order-card{background:#fff;border-radius:var(--r);margin:10px 12px 0;padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent}
.last-order-card:active{opacity:.88}
.loc-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.loc-no{font-size:13px;font-weight:700;color:#333}
.loc-time{font-size:12px;color:var(--sub)}
.loc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.loc-amount{font-size:13px;font-weight:700;color:var(--g)}
.loc-hint{font-size:11px;color:var(--sub)}
.loc-ready-hint{font-size:12px;font-weight:600;color:#2e7d32;margin-top:6px;background:#e8f5e9;padding:6px 10px;border-radius:8px;text-align:center}
.cat-bar{display:flex;overflow-x:auto;padding:10px 8px 4px;gap:8px;scrollbar-width:none;position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid var(--bd)}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;background:var(--bg);color:var(--sub);border:1px solid var(--bd);transition:.15s}
.cat-btn.active{background:var(--g);color:#fff;border-color:var(--g)}
.sec-title{font-size:15px;font-weight:700;padding:14px 12px 6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
.prod-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;position:relative;display:flex;flex-direction:column}
.prod-img{width:100%;height:110px;object-fit:cover;display:block;background:#f0f0f0}
.prod-ph{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#f0faf4,#dff0e7)}
.prod-body{padding:10px;flex:1;display:flex;flex-direction:column}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;color:#fff}
.badge-hot{background:#e53935}.badge-promo{background:#9c27b0}.badge-sold{background:#9e9e9e}
.prod-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:3px}
.prod-desc{font-size:11px;color:var(--sub);margin-bottom:6px;line-height:1.4;flex:1}
.prod-price{font-size:16px;font-weight:700;color:var(--g)}
.prod-orig{font-size:11px;color:var(--sub);text-decoration:line-through;margin-left:4px}
.prod-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.add-btn{width:30px;height:30px;border-radius:50%;background:var(--g);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;transition:.1s;-webkit-tap-highlight-color:transparent}
.add-btn:active{transform:scale(.9)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-ctrl button{width:26px;height:26px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
.qty-ctrl .minus{background:#f5f5f5;color:#333}
.qty-ctrl .plus{background:var(--g);color:#fff}
.qty-ctrl .qnum{font-size:14px;font-weight:700;min-width:20px;text-align:center}
.sold-mask{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;border-radius:var(--r);z-index:2}
.sold-mask span{background:#fff;color:#555;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.prod-stock-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:4px}
.stock-zero{background:#fce8e8;color:#c62828}.stock-low{background:#fff3e0;color:#e65100}.stock-ok{background:#e8f5e9;color:#2e7d32}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--g);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:100;cursor:pointer;box-shadow:0 -2px 12px rgba(0,0,0,.18);-webkit-tap-highlight-color:transparent}
.cart-bar.hidden{display:none}
.cart-cnt{background:rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:13px;font-weight:700;min-width:28px;text-align:center}
.cart-lbl{flex:1;font-size:15px;font-weight:700}
.cart-ttl{font-size:15px;font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;max-height:90vh;overflow-y:auto;z-index:201;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sheet.show{transform:translateY(0)}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:#fff;z-index:1}
.sheet-hd h3{font-size:17px;font-weight:700}
.close-btn{width:30px;height:30px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:18px;color:#555;flex-shrink:0}
.ci{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd)}
.ci-name{flex:1;font-size:14px;font-weight:500}
.ci-price{font-size:13px;color:var(--sub);min-width:50px;text-align:right}
.cart-empty{text-align:center;padding:40px;color:var(--sub);font-size:15px}
.cf{padding:16px;border-top:1px solid var(--bd)}
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:#555;margin-bottom:5px;display:block}
.fl .req{color:#e53935}
.fi{width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:15px;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--g)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-btns{display:flex;gap:8px;flex-wrap:wrap}
.pay-btn{padding:8px 16px;border-radius:20px;font-size:13px;border:1.5px solid var(--bd);background:#fff;color:#555;transition:.15s;cursor:pointer}
.pay-btn.active{border-color:var(--g);background:#f0faf4;color:var(--g);font-weight:600}
.ot{display:flex;justify-content:space-between;padding:12px 0;font-size:17px;font-weight:700;border-top:1px solid var(--bd);margin-top:8px}
.sub-btn{width:100%;padding:14px;background:var(--g);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;margin-top:12px;transition:.1s;cursor:pointer}
.sub-btn:active{opacity:.88}
.sub-btn:disabled{background:#ccc;cursor:not-allowed}
.pb{padding-bottom:80px}
@keyframes fly{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.4) translate(100px,200px)}}
.fly-item{position:fixed;pointer-events:none;z-index:999;font-size:22px;animation:fly .6s ease forwards}
.loading{text-align:center;padding:60px 20px;color:var(--sub)}
.spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.success-screen{position:fixed;inset:0;background:#fff;z-index:300;display:none;flex-direction:column;align-items:center;overflow-y:auto;padding:24px 20px 40px;text-align:center}
.success-screen.show{display:flex}
.suc-icon{font-size:72px;margin-top:24px}
.suc-title{font-size:24px;font-weight:700;color:var(--g);margin-top:8px}
.suc-no{font-size:20px;font-weight:700;margin-top:4px;color:#333}
.suc-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px;margin-top:20px}
.suc-btn{padding:14px;background:var(--g);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer}
.suc-btn-outline{padding:12px;background:#fff;color:var(--g);border:2px solid var(--g);border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer}
.status-badge{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700}
.s-pending{background:#fff9c4;color:#f57f17}.s-accepted{background:#e3f2fd;color:#1565c0}
.s-preparing{background:#f3e5f5;color:#6a1b9a}.s-ready{background:#e8f5e9;color:#1b5e20}
.s-completed{background:#f5f5f5;color:#555}.s-cancelled{background:#fce8e8;color:#b71c1c}
.order-card{background:#fff;border-radius:var(--r);margin:10px 12px 0;padding:14px 16px;box-shadow:var(--shadow)}
.oc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.oc-no{font-size:13px;font-weight:700;color:#333}
.oc-time{font-size:12px;color:var(--sub);margin-top:2px}
.oc-summary{font-size:13px;color:#555;margin-bottom:10px;line-height:1.5}
.oc-bottom{display:flex;align-items:center;justify-content:space-between}
.oc-amount{font-size:14px;font-weight:700;color:var(--g)}
.oc-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn-detail{padding:6px 14px;border-radius:20px;background:var(--g);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.btn-reorder{padding:6px 12px;border-radius:20px;background:#fff;color:var(--g);border:1.5px solid var(--g);font-size:12px;font-weight:600;cursor:pointer}
.order-detail{padding:16px}
.od-section{background:#f8f8f8;border-radius:var(--r);padding:14px;margin-bottom:14px}
.od-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--bd)}
.od-row:last-child{border-bottom:none}
.od-label{font-size:13px;color:var(--sub);flex-shrink:0;margin-right:8px}
.od-val{font-size:13px;font-weight:600;text-align:right;word-break:break-all}
.od-total{font-size:16px;color:var(--g);font-weight:700}
.od-ready-hint{background:#e8f5e9;border-left:3px solid var(--g);padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;color:#1b5e20;margin-bottom:14px}
.od-pickup-hint{background:#fff9e6;border-left:3px solid #f5a623;padding:10px 14px;border-radius:8px;font-size:12px;color:#7a5c00;margin-top:14px;text-align:center}
.qf-hint{font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.6;background:#f0faf4;padding:10px 12px;border-radius:8px}
.empty-hint{text-align:center;padding:50px 20px;color:var(--sub)}
.empty-hint .ei{font-size:48px;margin-bottom:12px}
.empty-hint p{font-size:14px;line-height:1.7}
.back-btn{display:flex;align-items:center;gap:4px;padding:4px 0;font-size:14px;color:var(--g);font-weight:600;cursor:pointer;background:none;border:none}
</style>
</head>
<body>

<div id="loading" class="loading"><div class="spinner"></div><p>載入中…</p></div>

<div id="content" style="display:none">
  <div class="hdr">
    <h1 id="shopName">點餐中</h1>
    <p id="shopHours"></p>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="openQuerySheet()">🔍 查詢訂單</button>
      <button class="hdr-btn" onclick="openMyOrders()">📜 我的訂單</button>
    </div>
  </div>
  <div class="shop-card">
    <div class="shop-logo" id="logoWrap">🍱</div>
    <div class="shop-info"><h2 id="shopName2"></h2><p id="shopAddr"></p></div>
  </div>
  <div class="announce" id="announce"></div>
  <div id="lastOrderCard" style="display:none"></div>
  <div class="cat-bar" id="catBar"></div>
  <div id="menuArea" class="pb"></div>
</div>

<div class="cart-bar hidden" id="cartBar" onclick="openCartSheet()">
  <div class="cart-cnt" id="cartCnt">0</div>
  <div class="cart-lbl">查看購物車</div>
  <div class="cart-ttl" id="cartBarTotal">$0</div>
</div>

<div class="overlay" id="overlay" onclick="closeTopSheet()"></div>

<!-- 購物車 Sheet -->
<div class="sheet" id="cartSheet">
  <div class="sheet-hd"><h3>🛒 購物車</h3><button class="close-btn" onclick="closeSheet('cartSheet')">✕</button></div>
  <div id="cartItems"></div>
  <div class="cf">
    <div class="ot"><span>合計</span><span id="orderTotal">$0</span></div>
    <div class="fg"><label class="fl">姓名 <span class="req">*</span></label><input class="fi" id="cName" placeholder="您的姓名" type="text"></div>
    <div class="fr">
      <div class="fg"><label class="fl">電話 <span class="req">*</span></label><input class="fi" id="cPhone" placeholder="聯絡電話" type="tel"></div>
      <div class="fg"><label class="fl">取餐方式</label><select class="fi" id="oType"></select></div>
    </div>
    <div class="fg"><label class="fl">取餐日期 <span class="req">*</span></label><select class="fi" id="pDate" onchange="onDateChange()"></select></div>
    <div class="fg"><label class="fl">取餐時間 <span class="req">*</span></label><select class="fi" id="pTime"><option value="">請先選擇日期</option></select></div>
    <div class="fg"><label class="fl">付款方式</label><div class="pay-btns" id="payBtns"></div></div>
    <div class="fg"><label class="fl">備註</label><input class="fi" id="oNote" placeholder="特殊需求…"></div>
    <button class="sub-btn" id="subBtn" onclick="submitOrder()">確認送出訂單</button>
  </div>
</div>

<!-- 查詢訂單 Sheet -->
<div class="sheet" id="querySheet">
  <div class="sheet-hd"><h3>🔍 查詢訂單</h3><button class="close-btn" onclick="closeSheet('querySheet')">✕</button></div>
  <div style="padding:16px">
    <div class="qf-hint">💡 忘記訂單編號也沒關係！只輸入<b>電話後三碼</b>可查今日訂單；後三碼＋姓名查最近3天；輸入<b>完整電話</b>可查全部歷史紀錄。</div>
    <div class="fg"><label class="fl">訂單編號（選填）</label><input class="fi" id="qOrderNo" placeholder="LINE-20260526-135854" type="text"></div>
    <div class="fg"><label class="fl">電話 / 後三碼 <span class="req">*</span></label><input class="fi" id="qPhone" placeholder="輸入完整電話或後三碼" type="tel"></div>
    <div class="fg"><label class="fl">姓名（選填，後三碼查3天需填）</label><input class="fi" id="qName" placeholder="您的姓名" type="text"></div>
    <button class="sub-btn" id="qSubmitBtn" onclick="doQuery()">查詢</button>
    <div id="queryResult" style="margin-top:16px"></div>
  </div>
</div>

<!-- 我的訂單 Sheet -->
<div class="sheet" id="myOrdersSheet">
  <div class="sheet-hd"><h3>📜 我的訂單</h3><button class="close-btn" onclick="closeSheet('myOrdersSheet')">✕</button></div>
  <div id="myOrdersBody" style="padding-bottom:20px"></div>
</div>

<!-- 訂單詳情 Sheet -->
<div class="sheet" id="detailSheet">
  <div class="sheet-hd">
    <button class="back-btn" onclick="closeSheet('detailSheet')">← 返回</button>
    <button class="close-btn" onclick="closeSheet('detailSheet')">✕</button>
  </div>
  <div id="detailBody"></div>
</div>

<!-- 成功頁 -->
<div class="success-screen" id="successScreen">
  <div class="suc-icon">🎉</div>
  <div class="suc-title">訂單已送出！</div>
  <div class="suc-no" id="sucNo"></div>
  <div id="sucDetail" style="width:100%;max-width:380px;background:#f8f8f8;border-radius:var(--r);padding:16px;margin-top:16px;font-size:14px;line-height:1.8;text-align:left"></div>
  <div class="suc-btns">
    <button class="suc-btn" onclick="location.reload()">繼續點餐</button>
    <button class="suc-btn-outline" onclick="openSuccessQuery()">🔍 查看訂單詳情</button>
    <button class="suc-btn-outline" onclick="openSuccessMyOrders()">📜 我的訂單</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
let allProducts=[], categories=[];
let cart={};
let selectedPay='';
let currentCat='all';
let _topSheet=null;

const PAYMENT_OPTIONS=[
  {code:'cash',label:'💵 現金',key:'line_payment_cash_enabled'},
  {code:'linepay',label:'💚 LINE Pay',key:'line_payment_linepay_enabled'},
  {code:'transfer',label:'🏦 轉帳',key:'line_payment_transfer_enabled'},
  {code:'platform',label:'📱 平台付款',key:'line_payment_platform_enabled'},
  {code:'credit_card',label:'💳 信用卡',key:'line_payment_credit_card_enabled'},
];
const PLABELS={cash:'現金',linepay:'LINE Pay',transfer:'轉帳',platform:'平台付款',credit_card:'信用卡'};
const SICON={pending:'🟡',accepted:'🔵',preparing:'🟠',ready:'🟢',completed:'✅',cancelled:'❌'};
const SLABEL={pending:'待確認',accepted:'已接單',preparing:'製作中',ready:'可取餐',completed:'已完成',cancelled:'已取消'};
const SCLASS={pending:'s-pending',accepted:'s-accepted',preparing:'s-preparing',ready:'s-ready',completed:'s-completed',cancelled:'s-cancelled'};

/* ── init ── */
async function init(){
  try{
    const[sr,mr]=await Promise.all([
      fetch('/api/line-shop').then(r=>r.json()),
      fetch('/api/line-menu').then(r=>r.json())
    ]);
    if(sr.success){
      const d=sr.data;
      document.getElementById('shopName').textContent=d.shop_name||'點餐';
      document.getElementById('shopName2').textContent=d.shop_name||'點餐';
      document.getElementById('shopAddr').textContent=d.shop_address||'';
      document.getElementById('shopHours').textContent=d.shop_hours||'';
      if(d.shop_logo)document.getElementById('logoWrap').innerHTML=`<img src="${d.shop_logo}" alt="logo">`;
      const ann=document.getElementById('announce');
      if(d.shop_announcement){ann.textContent=d.shop_announcement;ann.style.display='block';}
      const twNow=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
      const twDS=fmtD(twNow);
      const isClosed=d.line_today_closed==='1'&&d.line_today_closed_date===twDS;
      if(d.line_ordering_enabled==='0'||d.line_ordering_enabled===0){showClosed('🔴 LINE 點餐暫停營業','目前 LINE 點餐暫停營業，請稍後再試。');return;}
      if(isClosed){showClosed('🌙 今日休息','今日 LINE 點餐休息，明天再見！');return;}
      window._bizHoursEnabled=d.line_business_hours_enabled==='1';
      try{window._bizHours=JSON.parse(d.line_business_hours||'{}');}catch{window._bizHours={};}
      window._pickupEnabled=d.pickup_enabled!=='0';
      window._deliveryEnabled=d.delivery_enabled!=='0';
      window._sameDayMins=Number(d.same_day_preorder_minutes||30);
      try{window._closedWds=JSON.parse(d.line_closed_weekdays||'[]');}catch{window._closedWds=[];}
      try{window._closedDts=JSON.parse(d.line_closed_dates||'[]');}catch{window._closedDts=[];}
      buildOrderTypeSelect();
      buildPaymentButtons(d);
      buildDateSelector();
    }
    if(mr.success){categories=mr.data.categories||[];allProducts=mr.data.products||[];}
    buildCats();renderMenu();
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    renderLastOrderCard();

/* ── 工具 ── */
function fmtD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function twNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

function buildDateSelector(){
  const sel=document.getElementById('pDate');sel.innerHTML='';
  const now=twNow();
  const WD=['sun','mon','tue','wed','thu','fri','sat'],WEEK=['日','一','二','三','四','五','六'];
  let first=null;
  ['今天','明天','後天'].forEach((lbl,offset)=>{
    const d=new Date(now);d.setDate(d.getDate()+offset);
    const ds=fmtD(d),wk=WD[d.getDay()];
    const mm=String(d.getMonth()+1).padStart(2,'0'),dd2=String(d.getDate()).padStart(2,'0');
    const closed=(window._closedWds||[]).includes(wk)||(window._closedDts||[]).includes(ds);
    const opt=document.createElement('option');opt.value=ds;opt.disabled=closed;
    opt.textContent=`${lbl}（${mm}/${dd2} 週${WEEK[d.getDay()]}）${closed?' — 店休':''}`;
    if(!closed&&!first)first=ds;sel.appendChild(opt);
  });
  if(first)sel.value=first;buildTimeSelector();
}
function onDateChange(){buildTimeSelector();}
function buildTimeSelector(){
  const dateSel=document.getElementById('pDate'),sel=document.getElementById('pTime');sel.innerHTML='';
  const sd=dateSel?.value;if(!sd){sel.innerHTML='<option value="">請先選擇日期</option>';return;}
  const now=twNow(),todayStr=fmtD(now),isToday=sd===todayStr;
  const WD=['sun','mon','tue','wed','thu','fri','sat'];
  const td=new Date(sd+'T00:00:00+08:00'),wk=WD[td.getDay()];
  const mins=window._sameDayMins||30,nowTot=now.getHours()*60+now.getMinutes();
  let open=9*60,close=21*60,closedDay=false;
  if(window._bizHoursEnabled&&window._bizHours){
    const dh=window._bizHours[wk];
    if(dh&&dh.enabled){const[oh,om]=(dh.open||'09:00').split(':').map(Number);const[ch,cm]=(dh.close||'21:00').split(':').map(Number);open=oh*60+om;close=ch*60+cm;}
    else{closedDay=true;}
  }
  if(closedDay){sel.innerHTML='<option value="" disabled>此日非營業日</option>';return;}
  let earliest=isToday?Math.max(Math.ceil((nowTot+mins)/30)*30,open):open;
  let added=0;
  for(let t=earliest;t<close;t+=30){
    const h=Math.floor(t/60),m=t%60;
    const hhmm=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const lbl=h<12?`上午 ${hhmm}`:h===12?`中午 ${hhmm}`:`下午 ${hhmm}`;
    const o=document.createElement('option');o.value=hhmm;o.textContent=lbl;sel.appendChild(o);added++;
  }
  if(!added)sel.innerHTML=isToday?'<option value="" disabled>今日已無可預約時段</option>':'<option value="" disabled>此日無可預約時段</option>';
}

function buildCard(p){
  const name=p.effective_line_name||p.line_name||p.name;
  const price=p.effective_line_price||p.price;
  const origP=(p.line_price>0&&p.line_price<p.price)?p.price:null;
  const img=p.line_image_url||p.image||'';
  const desc=p.line_description||'';
  const isHot=Number(p.line_hot)===1,isPromo=Number(p.line_promo)===1;
  const ss=p.sale_status||'available',soldOut=Number(p.line_sold_out)===1;
  const ingOk=p.ingredient_available!==false;
  const unavail=soldOut||ss!=='available'||!ingOk;
  const av=p.available_units,hasSM=av!==null&&av!==undefined;
  const soldLbl=!ingOk?(av!==null&&av<=0?'🔴 售完':'備料不足'):{sold_out_today:'今日完售',paused:'暫停販售',sold_out_indefinitely:'暫不供應'}[ss]||(soldOut?'已售完':'');
  const imgHtml=img?`<img class="prod-img" src="${img}" alt="${esc(name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'';
  const qty=cart[p.id]?.qty||0;
  const footer=unavail?'':qty>0?`<div class="qty-ctrl"><button class="minus" onclick="chgQty(${p.id},-1)">−</button><span class="qnum">${qty}</span><button class="plus" onclick="chgQty(${p.id},1)">+</button></div>`:`<button class="add-btn" id="ab-${p.id}" onclick="addCart(${p.id},event)">+</button>`;
  const mask=unavail?`<div class="sold-mask"><span>${soldLbl||'已售完'}</span></div>`:'';
  let sb='';if(hasSM){if(av<=0)sb='<div class="prod-stock-badge stock-zero">🔴 已售完</div>';else if(av<=3)sb='<div class="prod-stock-badge stock-low">🟠 即將售完</div>';else sb='<div class="prod-stock-badge stock-ok">🟢 供應中</div>';}
  return `<div class="prod-card" id="pc-${p.id}">${mask}${imgHtml}<div class="prod-ph" ${img?'style="display:none"':''}>🍽️</div><div class="prod-body"><div class="badges">${isHot?'<span class="badge badge-hot">🔥 熱銷</span>':''}${isPromo?'<span class="badge badge-promo">🎁 優惠</span>':''}${unavail?`<span class="badge badge-sold">${soldLbl||'售完'}</span>`:''}</div><div class="prod-name">${esc(name)}</div>${sb}<div class="prod-desc">${esc(desc)}</div><div class="prod-footer"><div><span class="prod-price">$${price}</span>${origP?`<span class="prod-orig">$${origP}</span>`:''}</div>${footer}</div></div></div>`;
}

/* ── 購物車操作 ── */
function addCart(id,evt){
  const p=allProducts.find(x=>x.id==id);if(!p)return;
  if(p.available_units!==null&&p.available_units!==undefined){
    const inCart=cart[id]?.qty||0;
    if(p.available_units<=0){alert((p.effective_line_name||p.name)+' 已售完');return;}
    if(inCart>=p.available_units){alert((p.effective_line_name||p.name)+' 庫存不足（最多 '+p.available_units+' 份）');return;}
  }
  if(!cart[id])cart[id]={product:p,qty:0};
  cart[id].qty++;
  if(evt){const fly=document.createElement('div');fly.className='fly-item';fly.textContent='🛒';fly.style.cssText=`left:${evt.clientX}px;top:${evt.clientY}px`;document.body.appendChild(fly);setTimeout(()=>fly.remove(),700);}
  updateBar();updateProductCard(id);
}
function chgQty(id,d){
  if(!cart[id])return;
  if(d>0){const p=allProducts.find(x=>x.id==id);if(p&&p.available_units!==null&&p.available_units!==undefined&&cart[id].qty>=p.available_units){alert((p.effective_line_name||p.name)+' 庫存不足');return;}}
  cart[id].qty+=d;if(cart[id].qty<=0)delete cart[id];
  updateBar();updateProductCard(id);
  if(document.getElementById('cartSheet').classList.contains('show'))renderCartItems();
}
function updateProductCard(id){
  const p=allProducts.find(x=>x.id==id);if(!p)return;
  const card=document.getElementById(`pc-${id}`);if(!card)return;
  const qty=cart[id]?.qty||0;
  if(Number(p.line_sold_out)===1||(p.sale_status||'available')!=='available'||p.ingredient_available===false)return;
  const footer=card.querySelector('.prod-footer');if(!footer)return;
  const last=footer.lastElementChild;if(!last)return;
  if(qty>0)last.outerHTML=`<div class="qty-ctrl"><button class="minus" onclick="chgQty(${id},-1)">−</button><span class="qnum">${qty}</span><button class="plus" onclick="chgQty(${id},1)">+</button></div>`;
  else last.outerHTML=`<button class="add-btn" id="ab-${id}" onclick="addCart(${id},event)">+</button>`;
}
function updateBar(){
  const total=Object.values(cart).reduce((s,{product:p,qty})=>s+(p.effective_line_price||p.price)*qty,0);
  const cnt=Object.values(cart).reduce((s,{qty})=>s+qty,0);
  document.getElementById('cartCnt').textContent=cnt;
  document.getElementById('cartBarTotal').textContent=`$${total}`;
  document.getElementById('cartBar').classList.toggle('hidden',cnt===0);
  document.getElementById('orderTotal').textContent=`$${total}`;
}
function renderCartItems(){
  const el=document.getElementById('cartItems');
  const items=Object.values(cart);
  if(!items.length){el.innerHTML='<div class="cart-empty">購物車是空的</div>';return;}
  el.innerHTML=items.map(({product:p,qty})=>{const pr=p.effective_line_price||p.price;return`<div class="ci"><div class="ci-name">${esc(p.effective_line_name||p.name)} × ${qty}</div><div class="ci-price">$${pr*qty}</div><div class="qty-ctrl" style="margin-left:8px"><button class="minus" onclick="chgQty(${p.id},-1)">−</button><span class="qnum">${qty}</span><button class="plus" onclick="chgQty(${p.id},1)">+</button></div></div>`;}).join('');
}

async function submitOrder(){
  const name=document.getElementById('cName').value.trim();
  const phone=document.getElementById('cPhone').value.trim();
  const note=document.getElementById('oNote').value.trim();
  const time=document.getElementById('pTime').value.trim();
  const type=document.getElementById('oType').value;
  if(!name){toast('請填寫姓名');return;}if(!phone){toast('請填寫電話');return;}
  if(!Object.keys(cart).length){toast('購物車是空的');return;}
  if(!type||type===''){toast('目前暫停接單，無法送出訂單');return;}
  if(!selectedPay){toast('目前無可用付款方式');return;}
  const pickupDate=document.getElementById('pDate')?.value;
  if(!pickupDate){toast('請選擇取餐日期');return;}if(!time){toast('請選擇取餐時間');return;}
  const WD=['sun','mon','tue','wed','thu','fri','sat'];
  const tD=new Date(pickupDate+'T00:00:00+08:00'),wk=WD[tD.getDay()];
  if((window._closedWds||[]).includes(wk)){toast(`${pickupDate} 為公休日`);return;}
  if((window._closedDts||[]).includes(pickupDate)){toast(`${pickupDate} 為店休日`);return;}
  const now=twNow(),nowDS=fmtD(now);
  if(pickupDate===nowDS&&time){const[ph,pm]=time.split(':').map(Number);if(ph*60+pm<now.getHours()*60+now.getMinutes()+(window._sameDayMins||30)){toast('此時段距離現在太近，請選擇稍後時段');return;}}
  if(window._bizHoursEnabled&&window._bizHours){const dh=window._bizHours[wk];if(!dh||!dh.enabled){toast(`${pickupDate} 非 LINE 點餐營業日`);return;}if(time<dh.open||time>=dh.close){toast(`取餐時間 ${time} 不在營業時間內（${dh.open}～${dh.close}）`);return;}}
  const items=Object.values(cart).map(({product:p,qty})=>({product_id:p.id,name:p.effective_line_name||p.name,qty,price:p.effective_line_price||p.price,subtotal:(p.effective_line_price||p.price)*qty}));
  const subtotal=items.reduce((s,i)=>s+i.subtotal,0);
  const btn=document.getElementById('subBtn');btn.disabled=true;btn.textContent='送出中…';
  try{
    const res=await fetch('/api/line-orders',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({customer_name:name,customer_phone:phone,order_type:type,pickup_date:pickupDate,pickup_time:time,payment_method:selectedPay,note,items,subtotal,total:subtotal})
    }).then(r=>r.json());
    if(res.success){
      localStorage.setItem('last_line_order_number',res.data.order_number);
      localStorage.setItem('last_line_order_phone',phone);
      closeSheet('cartSheet');cart={};updateBar();renderMenu();
      document.getElementById('sucNo').textContent=`訂單編號：${res.data.order_number}`;
      document.getElementById('sucDetail').innerHTML=buildDetailRows({status:'pending',status_label:'待確認',
        customer_name:name,phone_last3:phone.slice(-3),
        order_type_label:type==='delivery'?'外送':'自取',
        pickup_time:`${pickupDate} ${time}`,items,subtotal,total:res.data.total,
        payment_label:PLABELS[selectedPay]||selectedPay,note});
      document.getElementById('successScreen').classList.add('show');
    }else{toast(res.message||'送出失敗');}
  }catch{toast('網路錯誤，請重試');}
  finally{btn.disabled=false;btn.textContent='確認送出訂單';}
}

async function renderLastOrderCard(){

    if(!res.success){card.style.display='none';return;}
    const d=res.data;
    const si=SICON[d.order_status]||'📦',sl=SLABEL[d.order_status]||d.order_status;
    const sc=SCLASS[d.order_status]||'';
    const isReady=d.order_status==='ready';
    card.className='last-order-card';
    card.setAttribute('data-order-no', no);  // v18: WSS update target
    card.innerHTML=`<div class="loc-row"><span class="loc-no">📦 ${esc(no)}</span><span class="status-badge ${sc}" data-status="${d.order_status||''}">${si} ${esc(sl)}</span></div><div class="loc-time">🕒 ${esc(d.pickup_time||d.created_at||'')}</div><div class="loc-bottom"><span class="loc-amount">$${d.total||0}</span><span class="loc-hint">點此查看詳情 →</span></div>${isReady?'<div class="loc-ready-hint">🎉 餐點已備妥，請至現場出示訂單編號取餐</div>':''}`;
    card.style.display='block';
    card.onclick=()=>fetchAndShowDetail(no,ph);
    // v18：卡片顯示後啟動 polling 持續更新狀態
    if(typeof window._startStatusPolling==='function') window._startStatusPolling(no);
  }catch{card.style.display='none';}
}

async function fetchAndShowDetail(no,ph){
  try{
    // v18修正：phone 可能未定義，此時僅用 order_number 查詢
    const body = ph ? {order_number:no,phone:ph} : {order_number:no};
    const res=await fetch('/api/line-orders/query',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)}).then(r=>r.json());
    if(res.success&&res.orders?.length)openOrderDetail(res.orders[0]);
    else{
      // fallback：直接用 /status/:orderNo 取得基本資料
      const sr=await fetch('/api/line-orders/status/'+encodeURIComponent(no)).then(r=>r.json());
      if(sr.success&&sr.data)openOrderDetail({...sr.data,order_number:no,status:sr.data.order_status});
      else toast('無法取得訂單詳情');
    }
  }catch(e){
    console.error('[fetchAndShowDetail]',e);
    toast('查詢失敗，請重試');
  }
}

  const body=document.getElementById('myOrdersBody');
  body.innerHTML='<div style="text-align:center;padding:40px;color:#888"><div class="spinner" style="margin:0 auto 8px"></div>載入中…</div>';
  try{
    const b={phone};if(name)b.customer_name=name;
    const res=await fetch('/api/line-orders/history',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());
    if(!res.success){
      body.innerHTML=`<div class="empty-hint"><div class="ei">📭</div><p>${esc(res.message||'查無訂單')}</p><button class="sub-btn" style="margin-top:16px;max-width:240px" onclick="clearMyOrdersLogin()">重新輸入</button></div>`;return;
    }
    if(save){localStorage.setItem('line_customer_phone',phone);if(name)localStorage.setItem('line_customer_name',name);}
    body.innerHTML=`<div style="padding:10px 16px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:#888">共 ${res.orders.length} 筆訂單</span><button onclick="clearMyOrdersLogin()" style="font-size:12px;color:var(--sub);background:none;border:none;cursor:pointer">切換帳號</button></div>`
      +res.orders.map(o=>buildOrderCardHTML(o,'history')).join('')
      +'<div style="height:20px"></div>';
  }catch{body.innerHTML='<p style="color:#e53935;text-align:center;padding:40px">載入失敗，請重試</p>';}
}
function clearMyOrdersLogin(){
  localStorage.removeItem('line_customer_phone');
  localStorage.removeItem('line_customer_name');
  showMyOrdersLogin();
}

/* ── 訂單卡片 HTML ── */
function buildOrderCardHTML(o,mode){
  const si=SICON[o.status]||'📦',sl=SLABEL[o.status]||o.status,sc=SCLASS[o.status]||'';
  const summary=(o.items||[]).slice(0,2).map(i=>`${esc(i.name||'')}×${i.qty||1}`).join('、')+((o.items||[]).length>2?`…等${o.items.length}項`:'');
  const pt=o.pickup_time?`🕒 ${esc(o.pickup_time)}`:`🕒 ${esc((o.created_at||'').slice(0,16))}`;
  // 序列化訂單供 onclick 使用（安全）
  const oJson=JSON.stringify(o).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const detailClick=`openOrderDetail(JSON.parse(this.dataset.order))`;
  const reorderClick=`reorder(JSON.parse(this.dataset.order))`;
  return `<div class="order-card">
    <div class="oc-head"><div><div class="oc-no">📦 ${esc(o.order_number)}</div><div class="oc-time">${pt}</div></div><span class="status-badge ${sc}" data-status="${o.status||''}">${si} ${esc(sl)}</span></div>
    <div class="oc-summary">${summary||'（無商品摘要）'}</div>
    <div class="oc-bottom">
      <span class="oc-amount">💰 $${o.total||0}</span>
      <div class="oc-btns">
        ${mode==='history'?`<button class="btn-reorder" data-order="${oJson.replace(/&quot;/g,'&quot;')}" onclick="reorder(JSON.parse(decodeURIComponent(this.dataset.order)))">🔄 再購</button>`:''}
        <button class="btn-detail" data-order="${oJson}" onclick="openOrderDetail(JSON.parse(decodeURIComponent(this.dataset.order)))">查看詳情</button>
      </div>
    </div>
  </div>`.replace(/data-order="[^"]*"/g, (m)=>m);
}

/* ── 訂單詳情 ── */
function openOrderDetail(o){
  // v18：標記目前顯示的訂單，啟動 polling
  const sucDetail=document.getElementById('sucDetail');
  if(sucDetail) sucDetail.setAttribute('data-order-no', o.order_number||'');
  // 啟動狀態 polling（10秒）
  if(typeof window._startStatusPolling==='function') window._startStatusPolling(o.order_number||'');
  const si=SICON[o.status]||'📦',sl=SLABEL[o.status]||o.status,sc=SCLASS[o.status]||'';
  const isReady=o.status==='ready';
  const itemRows=(o.items||[]).map(i=>`<div class="od-row"><span class="od-label">${esc(i.name||'')} × ${i.qty||1}</span><span class="od-val">$${i.subtotal||0}</span></div>`).join('');
  // 安全序列化
  const oStr=encodeURIComponent(JSON.stringify(o));
  document.getElementById('detailBody').innerHTML=`<div class="order-detail">
    ${isReady?'<div class="od-ready-hint">🎉 餐點已備妥，請至現場出示訂單編號取餐</div>':''}
    <div class="od-section">
      <div class="od-row"><span class="od-label">訂單狀態</span><span class="od-val"><span class="status-badge ${sc}" data-status="${o.status||''}">${si} ${esc(sl)}</span></span></div>
      <div class="od-row"><span class="od-label">訂單編號</span><span class="od-val" style="font-size:11px">${esc(o.order_number)}</span></div>
      <div class="od-row"><span class="od-label">顧客姓名</span><span class="od-val">${esc(o.customer_name||'')}</span></div>
      <div class="od-row"><span class="od-label">電話</span><span class="od-val">***${esc(o.phone_last3||'')}</span></div>
      <div class="od-row"><span class="od-label">取餐方式</span><span class="od-val">${esc(o.order_type_label||o.order_type||'')}</span></div>
      <div class="od-row"><span class="od-label">取餐時間</span><span class="od-val">${esc(o.pickup_time||'—')}</span></div>
      <div class="od-row"><span class="od-label">付款方式</span><span class="od-val">${esc(o.payment_label||o.payment_method||'')}</span></div>
    </div>
    <div class="od-section">
      <p style="font-size:13px;font-weight:700;margin-bottom:8px;color:#555">商品明細</p>
      ${itemRows}
      <div class="od-row" style="margin-top:4px"><span class="od-label" style="font-weight:700">合計金額</span><span class="od-val od-total">$${o.total||0}</span></div>
    </div>
    ${o.note?`<div class="od-section"><div class="od-row"><span class="od-label">備註</span><span class="od-val">${esc(o.note)}</span></div></div>`:''}
    <div class="od-pickup-hint">📋 取餐時請出示此畫面，供店員核對訂單</div>
    <div style="padding:16px 0 8px">
      <button class="sub-btn" style="background:#fff;color:var(--g);border:2px solid var(--g)" onclick="reorder(JSON.parse(decodeURIComponent('${oStr}')))">🔄 再次購買</button>
    </div>
  </div>`;
  openSheet('detailSheet');
}

/* ── 成功頁詳情列 ── */
function buildDetailRows(d){
  const rows=[['訂單狀態',`<span class="status-badge s-pending">🟡 待確認</span>`],['取餐方式',esc(d.order_type_label)],['取餐時間',esc(d.pickup_time)],['顧客姓名',esc(d.customer_name)],['電話',`***${esc(d.phone_last3)}`],['付款方式',esc(d.payment_label)]];
  if(d.note)rows.push(['備註',esc(d.note)]);
  const ir=(d.items||[]).map(i=>`<div class="od-row"><span class="od-label">${esc(i.name)}×${i.qty}</span><span class="od-val">$${i.subtotal}</span></div>`).join('');
  return rows.map(([l,v])=>`<div class="od-row"><span class="od-label">${l}</span><span class="od-val">${v}</span></div>`).join('')+ir+`<div class="od-row"><span class="od-label" style="font-weight:700">合計金額</span><span class="od-val" style="color:var(--g);font-size:15px;font-weight:700">$${d.total}</span></div>`;
}

/* ── 再次購買 ── */
function reorder(o){
  const items=o.items||[];
  if(!items.length){toast('此訂單沒有商品紀錄');return;}
  let added=0,skipped=0;
  items.forEach(item=>{
    const pid=item.product_id||item.id;
    const p=allProducts.find(x=>x.id==pid||(x.name===(item.name||'')&&!pid));
    if(!p||!p.show_on_line||(p.sale_status||'available')!=='available'||Number(p.line_sold_out)===1){skipped++;return;}
    if(!cart[p.id])cart[p.id]={product:p,qty:0};
    cart[p.id].qty+=(item.qty||1);added++;
  });
  if(added===0){toast('此訂單商品目前皆無法再次購買');return;}
  updateBar();renderMenu();
  closeTopSheet();
  toast(skipped>0?`已加入購物車，${skipped} 項停售商品已略過`:`${added} 項商品已加入購物車`);
  setTimeout(()=>openCartSheet(),400);
}

/* ── 庫存定時刷新（30秒，局部更新）── */
async function refreshInventory(){
  if(document.getElementById('cartSheet').classList.contains('show'))return;
  if(document.getElementById('successScreen').classList.contains('show'))return;
  try{
    const res=await fetch('/api/inventory').then(r=>r.json());if(!res.success)return;
    const imap={};(res.data||[]).forEach(iv=>{imap[iv.id]=iv;});
    let changed=false;
    allProducts=allProducts.map(p=>{
      const iv=imap[p.id];if(!iv)return p;
      const av=iv.available_units,wasOk=p.ingredient_available!==false,nowOk=av===null||av>0;
      if(wasOk!==nowOk)changed=true;
      return{...p,available_units:av,ingredient_available:nowOk,is_orderable:!p.line_sold_out&&(p.sale_status||'available')==='available'&&nowOk};
    });
    if(changed)renderMenu();
    else allProducts.forEach(p=>{
      const b=document.querySelector(`#pc-${p.id} .prod-stock-badge`);if(!b)return;
      const av=p.available_units;
      if(av===null||av===undefined){b.className='prod-stock-badge stock-ok';b.textContent='🟢 供應中';return;}
      if(av<=0){b.className='prod-stock-badge stock-zero';b.textContent='🔴 已售完';}
      else if(av<=3){b.className='prod-stock-badge stock-low';b.textContent='🟠 即將售完';}
      else{b.className='prod-stock-badge stock-ok';b.textContent='🟢 供應中';}
    });
  }catch{}
}
setInterval(refreshInventory,30000);

init();
</script>

<script>
// v18：WSS Client — 收到 order_status_changed 後更新已顯示的訂單狀態
// v18：LINE 訂單狀態 polling — 每 10 秒刷新，確保 WSS 失效時也能同步
(function initLineOrderPolling() {
  let _pollTimer = null;
  // 當詳情頁打開時啟動 polling
  window._startStatusPolling = function(orderNo) {
    if (_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(async () => {
      if (!orderNo) return;
      try {
        const r = await fetch('/api/line-orders/status/' + encodeURIComponent(orderNo)).then(x=>x.json());
        if (!r.success || !r.data) return;
        const d = r.data;
        const newStatus = d.order_status || '';
        const si = (window.SICON||{})[newStatus]||'📦';
        const sl = (window.SLABEL||{})[newStatus]||newStatus;
        const sc = (window.SCLASS||{})[newStatus]||'';
        // 更新詳情頁 badge
        const sucDetail = document.getElementById('sucDetail');
        if (sucDetail && sucDetail.getAttribute('data-order-no') === orderNo) {
          const badge = sucDetail.querySelector('.status-badge[data-status]');
          if (badge) { badge.className='status-badge '+sc; badge.textContent=si+' '+sl; badge.setAttribute('data-status',newStatus); }
        }
        // 更新首頁卡片
        const card = document.querySelector('[data-order-no="'+orderNo+'"]');
        if (card) {
          const b = card.querySelector('.status-badge'); 
          if (b) { b.className='status-badge '+sc; b.textContent=si+' '+sl; }
        }
      } catch {}
    }, 10000);
  };
  window._stopStatusPolling = function() {
    if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  };
})();

(function initLineOrderWss() {
  let _retry = 0;
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = proto + '//' + location.host + '/orders';
    let ws;
    try { ws = new WebSocket(url); } catch { return; }

    ws.onopen = () => { _retry = 0; };

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }
      if (msg.type !== 'order_status_changed') return;

      const o = msg.order;
      if (!o) return;
      const newStatus      = o.order_status || '';
      const orderNumber    = o.order_number || '';
      const si = (window.SICON  || {})[newStatus] || '📦';
      const sl = (window.SLABEL || {})[newStatus] || newStatus;
      const sc = (window.SCLASS || {})[newStatus] || '';

      // 若目前詳情頁顯示的是這筆訂單 → 更新狀態 badge
      // 找到目前顯示的訂單詳情容器
      const sucDetail = document.getElementById('sucDetail');
      const shownOrderNo = sucDetail ? sucDetail.getAttribute('data-order-no') : '';
      if (shownOrderNo && shownOrderNo === orderNumber) {
        const badge = sucDetail.querySelector('.status-badge[data-status]');
        if (badge) {
          badge.className = 'status-badge ' + sc;
          badge.textContent = si + ' ' + sl;
          badge.setAttribute('data-status', newStatus);
        }
        // 若是 ready → 顯示取餐提醒
        const readyBanner = document.getElementById('_ready_banner');
        if (readyBanner) {
          readyBanner.style.display = newStatus === 'ready' ? 'block' : 'none';
        }
      }

      // 更新訂單列表中的狀態（若有渲染）
      const card = document.querySelector('[data-order-no="' + orderNumber + '"]');
      if (card) {
        const b = card.querySelector('.status-badge');
        if (b) { b.className='status-badge '+sc; b.textContent=si+' '+sl; }
      }
    };

    ws.onclose = () => {
      const d = Math.min(1000 * Math.pow(2, _retry++), 30000);
      setTimeout(connect, d);
    };
    ws.onerror = () => ws.close();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', connect);
  } else {
    connect();
  }
})();
</script>
