<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#06C755">
<title>LINE 點餐</title>
<style>
:root{--g:#06C755;--gd:#00A344;--bg:#f5f5f5;--card:#fff;--text:#222;--sub:#888;--bd:#eee;--shadow:0 2px 10px rgba(0,0,0,.10);--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:-apple-system,'Noto Sans TC',sans-serif;color:var(--text);min-height:100vh}
button{border:none;cursor:pointer;font-family:inherit}
img{max-width:100%;display:block}
.hdr{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;padding:20px 16px 64px}
.hdr h1{font-size:22px;font-weight:700}
.hdr-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.hdr-btn{background:rgba(255,255,255,.22);color:#fff;border:1.5px solid rgba(255,255,255,.5);padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hdr-btn:active{background:rgba(255,255,255,.35)}
.shop-card{background:#fff;border-radius:var(--r);margin:0 12px;margin-top:-52px;padding:16px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:center}
.shop-logo{width:56px;height:56px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;flex-shrink:0;overflow:hidden}
.shop-logo img{width:100%;height:100%;object-fit:cover}
.shop-info h2{font-size:17px;font-weight:700}
.shop-info p{font-size:12px;color:var(--sub);margin-top:3px}
.announce{background:#fff9e6;border-left:3px solid #f5a623;padding:8px 12px;font-size:13px;color:#7a5c00;border-radius:4px;margin:10px 12px 0;white-space:pre-line;display:none}
/* Hotfix17：商家公告中心（modal / banner 兩種顯示方式）*/
.announce-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;align-items:center;justify-content:center}
.announce-overlay.show{display:flex}
.announce-modal{background:#fff;border-radius:16px;width:80%;max-width:360px;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.announce-modal-close{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.06);color:#666;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1}
.announce-modal-body{padding:24px 20px 20px;text-align:center}
.announce-modal-body img{border-radius:10px;margin-bottom:12px;width:100%;aspect-ratio:1200/630;object-fit:cover;display:block}
.announce-modal-icon{font-size:34px;margin-bottom:8px}
.announce-modal-title{font-size:17px;font-weight:700;margin-bottom:10px;color:#222}
.announce-modal-msg{font-size:14px;color:#555;line-height:1.7;white-space:pre-line;margin-bottom:18px;text-align:left}
.announce-modal-btn{width:100%;padding:12px;background:var(--g);color:#fff;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.announce-banner{margin:10px 12px 0;border-radius:12px;overflow:hidden;position:relative;display:none}
.announce-banner-close{position:absolute;top:8px;right:10px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.08);color:#666;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.announce-banner-body{padding:14px 16px}
.announce-banner-img{width:100%;aspect-ratio:1200/630;object-fit:cover;border-radius:12px;display:block}
.announce-banner-title{font-size:15px;font-weight:700;margin-bottom:4px}
.announce-banner-msg{font-size:13px;line-height:1.6;white-space:pre-line;margin-top:4px}
.announce-banner-btn{margin-top:10px;width:100%;padding:9px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
/* 模式標籤列 */
.mode-tabs{display:flex;gap:8px;padding:12px 12px 0;margin-bottom:4px}
.mode-tab{flex:1;padding:10px 4px;border-radius:var(--r);border:2px solid var(--bd);background:#fff;font-size:14px;font-weight:600;color:var(--sub);text-align:center;cursor:pointer;transition:.15s;position:relative}
.mode-tab.active{border-color:var(--g);color:var(--g);background:#f0faf4}
.mode-tab.disabled{opacity:.45;pointer-events:none}
.mode-tab .mode-badge{position:absolute;top:-6px;right:8px;background:#e53935;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px}
/* 售完警告橫幅 */
.cutoff-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin:0 12px;font-size:13px;color:#856404;display:none}
.cat-bar{display:flex;overflow-x:auto;padding:10px 8px 4px;gap:8px;scrollbar-width:none;position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid var(--bd)}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;background:var(--bg);color:var(--sub);border:1px solid var(--bd);transition:.15s}
.cat-btn.active{background:var(--g);color:#fff;border-color:var(--g)}
.sec-title{font-size:15px;font-weight:700;padding:14px 12px 6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
.prod-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;position:relative;display:flex;flex-direction:column}
.prod-img{width:100%;height:110px;object-fit:cover;display:block;background:#f0f0f0}
.prod-ph{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#f0faf4,#dff0e7)}
.prod-body{padding:10px;flex:1;display:flex;flex-direction:column}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;color:#fff}
.badge-hot{background:#e53935}.badge-promo{background:#9c27b0}.badge-sold{background:#9e9e9e}.badge-cutoff{background:#757575}.badge-amber{background:#e65100}
/* Hotfix16 BUG-006：商品卡狀態顏色，避免全部灰色造成誤解 */
.badge-holiday{background:#c62828}.badge-soldout-today{background:#c62828}.badge-green{background:#2e7d32}.badge-orange{background:#e65100}.badge-blue{background:#1565c0}
.sold-mask.mask-green span:first-child{color:#2e7d32}.sold-mask.mask-orange span:first-child{color:#e65100}.sold-mask.mask-red span:first-child{color:#c62828}
.prod-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:3px}
.prod-spec{font-size:11px;color:var(--g);font-weight:600;margin-bottom:2px} /* fix18-10-hotfix19 */
.prod-desc{font-size:11px;color:var(--sub);margin-bottom:6px;line-height:1.4;flex:1}
.prod-price{font-size:16px;font-weight:700;color:var(--g)}
.prod-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.add-btn{width:30px;height:30px;border-radius:50%;background:var(--g);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;transition:.1s;-webkit-tap-highlight-color:transparent}
.add-btn:active{transform:scale(.9)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-ctrl button{width:26px;height:26px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
.qty-ctrl .minus{background:#f5f5f5;color:#333}
.qty-ctrl .plus{background:var(--g);color:#fff}
.qty-ctrl .qnum{font-size:14px;font-weight:700;min-width:20px;text-align:center}
.sold-mask{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;border-radius:var(--r);z-index:2}
.sold-mask span{background:#fff;color:#555;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
/* hotfix22-F 第九點：不可購買時只讓「照片」變暗，商品名稱/說明/價格維持正常顯示（不再用整卡 mask） */
.prod-img-wrap{position:relative;width:100%;height:110px;overflow:hidden}
.prod-img-wrap .prod-img,.prod-img-wrap .prod-ph{height:110px}
.prod-img-wrap.img-dimmed .prod-img{filter:brightness(.55) saturate(.7)}
.prod-img-wrap.img-dimmed .prod-ph{filter:brightness(.7) grayscale(.4)}
/* hotfix22-F 第九點：行銷標籤——左上主緞帶／右上小膠囊，最多 2 個，疊在照片上（不佔版面） */
.tag-ribbon{position:absolute;top:0;left:0;font-size:10px;font-weight:700;color:#fff;padding:4px 10px 4px 8px;border-radius:0 0 10px 0;z-index:3;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tag-ribbon-promo{background:#9c27b0}
.tag-ribbon-hot{background:#e53935}
.tag-capsule{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;color:#fff;padding:2px 8px;border-radius:10px;z-index:3;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tag-capsule.tag-ribbon-promo{background:#9c27b0}
.tag-capsule.tag-ribbon-hot{background:#e53935}
/* hotfix22-F 第九點：照片下方固定保留一排狀態標籤（休假中/今日售完/可預購），固定高度避免商品卡錯位 */
.status-row{min-height:20px;display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;margin:2px 0 4px}
/* fix18-10-hotfix19：商品卡狀態徽章固定兩排，避免三排堆疊跑版 */
.badge-row-main{display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:center;max-width:100%}
.badge-row-action{display:flex;justify-content:center;width:100%}
.prod-stock-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:4px}
.stock-zero{background:#fce8e8;color:#c62828}.stock-low{background:#fff3e0;color:#e65100}.stock-ok{background:#e8f5e9;color:#2e7d32}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--g);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:100;cursor:pointer;box-shadow:0 -2px 12px rgba(0,0,0,.18);-webkit-tap-highlight-color:transparent}
.cart-bar.hidden{display:none}
.cart-cnt{background:rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:13px;font-weight:700;min-width:28px;text-align:center}
.cart-lbl{flex:1;font-size:15px;font-weight:700}
.cart-ttl{font-size:15px;font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;max-height:90vh;overflow-y:auto;z-index:201;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sheet.show{transform:translateY(0)}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:#fff;z-index:1}
.sheet-hd h3{font-size:17px;font-weight:700}
.close-btn{width:30px;height:30px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:18px;color:#555;flex-shrink:0}
.ci{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd)}
.ci-name{flex:1;font-size:14px;font-weight:500}
.ci-price{font-size:13px;color:var(--sub);min-width:50px;text-align:right}
.cart-empty{text-align:center;padding:40px;color:var(--sub);font-size:15px}
.cf{padding:16px;border-top:1px solid var(--bd)}
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:#555;margin-bottom:5px;display:block}
.fl .req{color:#e53935}
.fi{width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:15px;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--g)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-btns{display:flex;gap:8px;flex-wrap:wrap}
.pay-btn{padding:8px 16px;border-radius:20px;font-size:13px;border:1.5px solid var(--bd);background:#fff;color:#555;transition:.15s;cursor:pointer}
.pay-btn.active{border-color:var(--g);background:#f0faf4;color:var(--g);font-weight:600}
.ot{display:flex;justify-content:space-between;padding:12px 0;font-size:17px;font-weight:700;border-top:1px solid var(--bd);margin-top:8px}
.sub-btn{width:100%;padding:14px;background:var(--g);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;margin-top:12px;transition:.1s;cursor:pointer}
.sub-btn:active{opacity:.88}
.sub-btn:disabled{background:#ccc;cursor:not-allowed}
.pb{padding-bottom:80px}
@keyframes fly{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.4) translate(100px,200px)}}
.fly-item{position:fixed;pointer-events:none;z-index:999;font-size:22px;animation:fly .6s ease forwards}
.loading{text-align:center;padding:60px 20px;color:var(--sub)}
.spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.success-screen{position:fixed;inset:0;background:#fff;z-index:300;display:none;flex-direction:column;align-items:center;overflow-y:auto;padding:24px 20px 40px;text-align:center}
.success-screen.show{display:flex}
.suc-icon{font-size:72px;margin-top:24px}
.suc-title{font-size:24px;font-weight:700;color:var(--g);margin-top:8px}
.suc-no{font-size:20px;font-weight:700;margin-top:4px;color:#333}
.suc-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px;margin-top:20px}
.suc-btn{padding:14px;background:var(--g);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer}
.suc-btn-outline{padding:12px;background:#fff;color:var(--g);border:2px solid var(--g);border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer}
.status-badge{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700}
.s-pending{background:#fff9c4;color:#f57f17}.s-accepted{background:#e3f2fd;color:#1565c0}
.s-preparing{background:#f3e5f5;color:#6a1b9a}.s-ready{background:#e8f5e9;color:#1b5e20}
.s-completed{background:#f5f5f5;color:#555}.s-cancelled{background:#fce8e8;color:#b71c1c}
.order-card{background:#fff;border-radius:var(--r);margin:10px 12px 0;padding:14px 16px;box-shadow:var(--shadow)}
.oc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.oc-no{font-size:13px;font-weight:700;color:#333}
.oc-time{font-size:12px;color:var(--sub);margin-top:2px}
.oc-summary{font-size:13px;color:#555;margin-bottom:10px;line-height:1.5}
.oc-bottom{display:flex;align-items:center;justify-content:space-between}
.oc-amount{font-size:14px;font-weight:700;color:var(--g)}
.oc-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn-detail{padding:6px 14px;border-radius:20px;background:var(--g);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.btn-reorder{padding:6px 12px;border-radius:20px;background:#fff;color:var(--g);border:1.5px solid var(--g);font-size:12px;font-weight:600;cursor:pointer}
.order-detail{padding:16px}
.od-section{background:#f8f8f8;border-radius:var(--r);padding:14px;margin-bottom:14px}
.od-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--bd)}
.od-row:last-child{border-bottom:none}
.od-label{font-size:13px;color:var(--sub);flex-shrink:0;margin-right:8px}
.od-val{font-size:13px;font-weight:600;text-align:right;word-break:break-all}
.od-total{font-size:16px;color:var(--g);font-weight:700}
.od-pickup-hint{background:#fff9e6;border-left:3px solid #f5a623;padding:10px 14px;border-radius:8px;font-size:12px;color:#7a5c00;margin-top:14px;text-align:center}
.qf-hint{font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.6;background:#f0faf4;padding:10px 12px;border-radius:8px}
.empty-hint{text-align:center;padding:50px 20px;color:var(--sub)}
.empty-hint .ei{font-size:48px;margin-bottom:12px}
.empty-hint p{font-size:14px;line-height:1.7}
.back-btn{display:flex;align-items:center;gap:4px;padding:4px 0;font-size:14px;color:var(--g);font-weight:600;cursor:pointer;background:none;border:none}
.closed-screen{text-align:center;padding:60px 24px;color:#888;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.closed-screen .ei{font-size:64px;margin-bottom:16px}
.closed-screen h2{font-size:20px;color:#444;margin-bottom:12px}
.closed-screen p{font-size:15px;line-height:1.6;max-width:280px}
.loc-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.loc-no{font-size:13px;font-weight:700;color:#333}
.loc-time{font-size:12px;color:var(--sub)}
.loc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.loc-amount{font-size:13px;font-weight:700;color:var(--g)}
.loc-hint{font-size:11px;color:var(--sub)}
.last-order-card{background:#fff;border-radius:var(--r);margin:10px 12px 0;padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent}
.last-order-card:active{opacity:.88}
.btn-preorder{display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 10px;background:#fff3e0;color:#e65100;border:1.5px solid #ff8f00;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;-webkit-tap-highlight-color:transparent}
.btn-preorder:active{opacity:.85}
/* fix18-06: 外送地址區塊 */
.delivery-addr-wrap{display:none;margin-top:0}
.delivery-addr-wrap.visible{display:block}
.delivery-gps-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;background:#e8f5e9;color:#2e7d32;border:1.5px solid #66bb6a;border-radius:8px;font-size:13px;font-weight:600;margin-top:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.delivery-gps-btn:active{opacity:.82}
.delivery-fee-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px;font-weight:500;color:#e65100;border-top:1px dashed #ffe0b2;margin-top:6px}
.delivery-fee-label{color:#888;font-size:13px}
.delivery-distance-badge{background:#fff3e0;color:#e65100;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700;margin-left:6px}
</style>
</head>
<body>

<div id="loading" class="loading"><div class="spinner"></div><p>載入中…</p></div>
<div id="content" style="display:none">
  <div class="hdr">
    <h1 id="shopName">點餐中</h1>
    <p id="shopHours"></p>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="openQuerySheet()">🔍 查詢訂單</button>
      <button class="hdr-btn" onclick="openMyOrders()">📜 我的訂單</button>
    </div>
  </div>
  <div class="shop-card">
    <div class="shop-logo" id="logoWrap">🍱</div>
    <div class="shop-info"><h2 id="shopName2"></h2><p id="shopAddr"></p></div>
  </div>
  <div class="announce" id="announce"></div>
  <!-- Hotfix17：商家公告中心（modal / banner，取代自動休假公告時的舊 Banner 顯示）-->
  <div class="announce-banner" id="announceBanner"></div>
  <!-- Hotfix16 BUG-004：休假公告改為頁面內固定 Banner，不使用 Modal / 遮罩，不阻擋瀏覽/加入購物車 -->
  <div id="holidayBanner" style="display:none;margin:10px 12px 0;border-radius:10px;overflow:hidden;border:1px solid #ffccbc;background:#fff3e0"></div>
  <div class="announce" id="bizCalBanner" style="display:none"></div>
  <div id="lastOrderCard" style="display:none"></div>
  <!-- 外帶/外送模式分頁 -->
  <div class="mode-tabs" id="modeTabs" style="display:none">
    <button class="mode-tab active" id="tabTakeout" onclick="switchMode('takeout')">🛍️ 外帶</button>
    <button class="mode-tab" id="tabDelivery" onclick="switchMode('delivery')">🛵 外送</button>
  </div>
  <div class="cutoff-banner" id="cutoffBanner"></div>

<script>
'use strict';
// ── SaaS store_id 綁定 ──
const LINE_STORE_ID = new URLSearchParams(window.location.search).get('store_id') || 'store_001';
// hotfix22-F：購物車永久保留（不做 24 小時到期判斷）。key 加上 target=line_order，
// 與冷藏宅配（line_shipping_cart_）完全獨立，互不干擾。
const ORDER_CART_KEY = 'line_order_cart_' + LINE_STORE_ID;
// hotfix22-F 第九點：預留 Conversion Analytics 用欄位；hotfix23-A 起正式串接
// analytics_events。key 加上 store_id，避免同一瀏覽器逛多家店時 visitor/session 互相污染。
function _getVisitorId(){
  try{
    const key='line_visitor_id_'+LINE_STORE_ID;
    let v=localStorage.getItem(key);
    if(!v){ v='v_'+Date.now()+'_'+Math.random().toString(36).slice(2,10); localStorage.setItem(key,v); }
    return v;
  }catch(e){ return ''; }
}
function _getSessionId(){
  try{
    const key='line_session_id_'+LINE_STORE_ID;
    let s=sessionStorage.getItem(key);
    if(!s){ s='s_'+Date.now()+'_'+Math.random().toString(36).slice(2,10); sessionStorage.setItem(key,s); }
    return s;
  }catch(e){ return ''; }
}
// ── fix18-10-hotfix23-A：Analytics Foundation ──────────────────────────
// 購物車第一次有商品時建立 cart_id（UUID），購物車永久保留期間不變；
// 訂單成功並清空後，下一次購物車重新建立新的 cart_id。
function _getCartId(createIfMissing){
  try{
    const key='line_cart_id_'+LINE_STORE_ID;
    let c=sessionStorage.getItem(key)||localStorage.getItem(key);
    if(!c && createIfMissing){
      c='c_'+Date.now()+'_'+Math.random().toString(36).slice(2,10);
      localStorage.setItem(key,c);
    }
    return c||'';
  }catch(e){ return ''; }
}
function _resetCartId(){
  try{ localStorage.removeItem('line_cart_id_'+LINE_STORE_ID); }catch(e){}
}
// ── fix18-10-hotfix23-D：來源判斷／first-touch／last-touch 一律由共用模組
// public/js/analytics-attribution.js 負責，這裡只是 delegate，不得再各寫一套規則
// （需求文件二／三）。函式名稱保留，既有呼叫點（_trackEvent('page_view') 等）不必更動。
function _deriveSource(utmSource, referrer){
  return AnalyticsAttribution.normalizeTrafficSource({ get:(k)=> k==='utm_source'?(utmSource||''):'' }, referrer||'');
}
function _getAnalyticsContext(){
  try{ return AnalyticsAttribution.buildAnalyticsEventContext(LINE_STORE_ID); }catch(e){ return {}; }
}
// 前台一般事件追蹤：fire-and-forget，絕不阻塞下單/瀏覽流程；purchase/submit_order
// 由後端於訂單真正成立/付款真正成功時寫入，前端不送出這兩種事件。
// 同時把對應的 Meta Pixel／GA4 事件（purchase 除外）一併送出，兩邊失敗互不影響主要流程。
function _trackEvent(eventName, extra){
  try{
    const fields=_getAnalyticsContext();
    const body={
      visitor_id:_getVisitorId(), session_id:_getSessionId(),
      cart_id:_getCartId(false)||null,
      event_name:eventName,
      order_mode:currentMode,
      source:fields.source, medium:fields.medium, campaign:fields.campaign,
      referrer:fields.referrer, landing_page:fields.landing_page,
      fbclid:fields.fbclid, gclid:fields.gclid,
      metadata:fields.metadata,
      member_session:_currentMemberSession(),
      ...(extra||{}),
    };
    apiFetch('/api/analytics/events',{method:'POST',body:JSON.stringify(body)}).catch(()=>{});
  }catch(e){ /* 追蹤失敗不影響主要功能 */ }
  // purchase 不透過這裡送 Pixel／GA4（必須等後端確認成功才在結果頁單獨觸發，見送單/LINE Pay 成功處）
  if (eventName !== 'purchase') {
    try{
      const pp = (extra && extra.product_id) ? { content_ids:[String(extra.product_id)], content_type:'product' } : {};
      AnalyticsPlatforms.trackPlatformEvent(eventName, pp);
    }catch(e){}
  }
}
function _analyticsPayloadForOrder(){
  const fields=_getAnalyticsContext();
  const orderAttr=(function(){ try{ return AnalyticsAttribution.buildOrderAnalyticsContext(LINE_STORE_ID); }catch(e){ return {first_touch:null,last_touch:null}; } })();
  return {
    visitor_id:_getVisitorId(), session_id:_getSessionId(), cart_id:_getCartId(false)||null,
    source:fields.source, medium:fields.medium, campaign:fields.campaign,
    referrer:fields.referrer, landing_page:fields.landing_page, fbclid:fields.fbclid, gclid:fields.gclid,
    metadata:fields.metadata,
    first_touch:orderAttr.first_touch, last_touch:orderAttr.last_touch,
  };
}
// fix18-10-hotfix23-D：Meta Pixel／GA4 的 Purchase 只能在後端已確認訂單成立／付款成功
// 的結果頁觸發一次，用 order_number 當去重 key（localStorage 記錄「已觸發過」，避免使用者
// 重新整理成功頁或重複進入同一頁面時對同一張訂單重複計算 Purchase）。value 一律用呼叫端
// 傳入的「後端回傳金額」，這個函式本身不重新計算金額。
function _firePurchaseOnce(orderNumber, orderTotal, itemsForPixel){
  try{
    if(!orderNumber) return;
    const dedupKey='analytics_purchase_fired_'+LINE_STORE_ID+'_'+orderNumber;
    if(localStorage.getItem(dedupKey)) return;
    localStorage.setItem(dedupKey,'1');
    const contentIds=(itemsForPixel||[]).map(it=>String(it.product_id||it.id||'')).filter(Boolean);
    const ga4Items=(itemsForPixel||[]).map(it=>({
      item_id:String(it.product_id||it.id||''), item_name:it.name||'', price:Number(it.price||0), quantity:Number(it.qty||1),
    }));
    AnalyticsPlatforms.trackPlatformEvent('purchase', {
      transaction_id: orderNumber,
      eventId: orderNumber,
      value: Number(orderTotal||0),
      currency:'TWD',
      content_ids: contentIds,
      content_type:'product',
      items: ga4Items,
    });
  }catch(e){ /* Pixel/GA4 失敗不影響訂單，訂單本身已經成立 */ }
}
// fix18-10-hotfix23-A：加入購物車時若尚未有 cart_id（購物車原本是空的），先建立一個；
// 移除商品降到 0 時記錄 remove_from_cart。quantity 帶「這次異動」的數量，不是購物車總量。
function _trackAddToCart(id, qtyDelta){
  _getCartId(true); // 確保購物車已有 cart_id
  _trackEvent('add_to_cart',{product_id:Number(id), quantity:Math.max(1,Number(qtyDelta)||1)});
}
function _trackRemoveFromCart(id, qtyDelta){
  _trackEvent('remove_from_cart',{product_id:Number(id), quantity:Math.max(1,Number(qtyDelta)||1)});
}
function apiFetch(url, options={}) {
  const sep = url.includes('?') ? '&' : '?';
  const fullUrl = url + sep + 'store_id=' + encodeURIComponent(LINE_STORE_ID);
  return fetch(fullUrl, { ...options, headers: { 'Content-Type':'application/json', ...(options.headers||{}) } });
}

// ── fix18-10-hotfix23-E：LINE 會員入口 ──────────────────────────────────
// disabled/checkout/entry 三種模式共用同一份設定，不在這裡各寫一套規則
// （見 public/js/line-member-gate.js）。initLineMemberGate 內部若 liff_id 空白
// 會安全略過，disabled 模式完全不影響既有點餐流程。
let _lineMemberGateConfig=null;
function _buildLineMemberGateConfig(d){
  return {
    liff_id:d.line_member_liff_id||'',
    gate_enabled:d.line_member_gate_enabled==='1',
    gate_mode:d.line_member_gate_mode||'disabled',
    require_friend:d.line_member_require_friend==='1',
    allow_skip:d.line_member_allow_skip==='1',
    add_friend_url:d.line_member_add_friend_url||'',
    title:d.line_member_title||'LINE 會員登入',
    description:d.line_member_description||'登入 LINE 會員即可享有專屬服務',
    friend_button_text:d.line_member_friend_button_text||'加入官方帳號',
    login_button_text:d.line_member_login_button_text||'使用 LINE 登入',
    skip_button_text:d.line_member_skip_button_text||'略過',
  };
}
function _gateIds(){ return { visitor_id:_getVisitorId(), session_id:_getSessionId(), cart_id:_getCartId(false), order_mode:currentMode, attribution:_getAnalyticsContext() }; }
async function _initLineMemberGateFromShopData(d){
  _lineMemberGateConfig=_buildLineMemberGateConfig(d);
  if(!_lineMemberGateConfig.gate_enabled || _lineMemberGateConfig.gate_mode==='disabled') return;
  let gateState=null;
  try{ gateState=await LineMemberGate.initLineMemberGate({ store_id:LINE_STORE_ID, liff_id:_lineMemberGateConfig.liff_id }, _gateIds(), _trackEvent); }catch(e){ return; }
  if(_lineMemberGateConfig.gate_mode==='entry'){
    LineMemberGate.requireMemberOnEntry(LINE_STORE_ID, _lineMemberGateConfig, _gateIds(), _trackEvent);
  }
  // fix18-10-hotfix25：checkout 模式下，若剛從 LINE 登入導回並自動完成驗證，
  // 購物車本來就已由既有 persistCart()/還原機制保留，這裡再把結帳畫面（購物車
  // 面板）重新打開，客人不需要重新操作，只需再按一次「送出訂單」即可完成。
  const cbResult=gateState&&gateState.loginCallbackResult;
  if(_lineMemberGateConfig.gate_mode==='checkout' && cbResult && cbResult.ok && cbResult.autoVerified){
    try{ if(Object.keys(cart||{}).length) openCartSheet(); }catch(e){}
  }
}
function _currentMemberSession(){
  try{ const s=LineMemberGate.getMemberSession(LINE_STORE_ID); return s?s.member_session:null; }catch(e){ return null; }
}

// ── 全域狀態 ──
let allProducts=[], categories=[];
let cart={};
// fix18-10-hotfix22D：記錄哪些商品是「今日不可下單、但允許直接加入購物車並自動預約下個營業日」，
// 供 openCartSheet()/switchMode()/onModeChange() 判斷購物車日期是否要自動預設下個營業日。
let preorderRequiredIds=new Set();
let appliedCoupon=null; // fix18-05: { code, discount_amount, final_total, coupon: {...} }
let selectedPay='';
let currentCat='all';
let _topSheet=null;
// 目前選擇的模式（外帶/外送）
let currentMode='takeout';
// 後台回傳的 shop 設定
let shopData={};
let bizCalendarList=[]; // 營業行事曆列表（供日期選單顯示店休/特殊營業提示，UI 用途，下單仍以後端驗證為準）
let couponFeatureEnabled=false; // fix18-05: set from /api/line-shop or /api/coupons/validate response
let takeoutEnabled=false, deliveryEnabled=false;
let takeoutCutoffPassed=false, deliveryCutoffPassed=false;
let todayClosed=false;
// hotfix22-F 補正：若使用者上次選的模式（order_mode）目前被店家關閉，仍必須維持在該模式
// （不得自動退回另一個開放中的模式），並讓頁籤保持可見，好讓使用者自己切換。
let modeForcedVisible=false;
function _peekSavedOrderMode(){
  try{
    const raw=localStorage.getItem(ORDER_CART_KEY);
    if(!raw) return '';
    const d=JSON.parse(raw);
    return d?.order_mode||d?.cartMode||'';
  }catch(e){ return ''; }
}

// fix18-06: 外送地址與費用狀態
let mapsAutocomplete = null;
let deliveryLatLng = { lat: null, lng: null };
let calcDeliveryFee = 0;  // 後端核准的外送費
let deliveryFeeCalculated = false;  // 是否已成功取得外送費

const PAYMENT_OPTIONS=[
  {code:'cash',label:'💵 現金',key:'line_payment_cash_enabled'},
  {code:'linepay',label:'💚 LINE Pay',key:'line_payment_linepay_enabled'},
  {code:'transfer',label:'🏦 轉帳',key:'line_payment_transfer_enabled'},
  {code:'platform',label:'📱 平台付款',key:'line_payment_platform_enabled'},
  {code:'credit_card',label:'💳 信用卡',key:'line_payment_credit_card_enabled'},
];
const PLABELS={cash:'現金',linepay:'LINE Pay',transfer:'轉帳',platform:'平台付款',credit_card:'信用卡'};
const SICON={pending:'🟡',accepted:'🔵',preparing:'🟠',ready:'🟢',completed:'✅',cancelled:'❌'};
const SLABEL={pending:'待確認',accepted:'已接單',preparing:'製作中',ready:'可取餐',completed:'已完成',cancelled:'已取消'};
const SCLASS={pending:'s-pending',accepted:'s-accepted',preparing:'s-preparing',ready:'s-ready',completed:'s-completed',cancelled:'s-cancelled'};
const WD_KEYS=['sun','mon','tue','wed','thu','fri','sat'];
const WD_NAMES=['日','一','二','三','四','五','六'];
// 安全解析日期：避免 JS UTC midnight 時區偏移導致 getDay() 算出前一天
function parseLocalDate(ds){ const[y,m,d]=ds.split('-').map(Number); return new Date(y,m-1,d); }

function fmtD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
// YYYY-MM-DD → M/D（供營業行事曆文案顯示，如「7/5～7/8」）
function fmtMD(s){ if(!s) return ''; const p=s.split('-'); return `${Number(p[1])}/${Number(p[2])}`; }
// ── 營業行事曆：查某日是否命中（用於日期選單提示，UI 用途；實際下單仍以後端 /validate-cart 為準）──
function findBizCalEntry(ds){
  return bizCalendarList.find(e=>e.start_date<=ds && ds<=e.end_date) || null;
}
// 判斷 ds 是否為「恢復營業日」：某段 Business Calendar 店休（mode=closed）結束隔天，且 ds 本身未被其他行事曆命中
function isResumeDate(ds){
  return bizCalendarList.some(e=>{
    if(e.mode!=='closed') return false;
    const d=parseLocalDate(e.end_date); d.setDate(d.getDate()+1);
    return fmtD(d)===ds;
  });
}
// 產生日期選單的「狀態後綴」文字（含顏色 emoji），並回傳是否應停用該日期
// isWeeklyClosed：命中 line_closed_weekdays（固定公休）；isSpecificClosed：命中舊版 line_closed_dates（指定店休日）
function bizCalOptionSuffix(ds, isWeeklyClosed, isSpecificClosed, notBizDayWeekly){
  const e=findBizCalEntry(ds);
  if(e){
    if(e.mode==='closed'){
      const reasonTxt=(e.show_reason && e.reason) ? `（${e.reason}）` : '';
      return { suffix:` 🔴休假${reasonTxt}`, disabled:true };
    }
    if(e.mode==='custom_hours') return { suffix:' 🟡特殊營業', disabled:false };
    if(e.mode==='open_all_day') return { suffix:' 🟢全天營業', disabled:false };
  }
  // 沒有命中行事曆 → 完全走舊的每週公休/指定店休日/非營業日判斷
  if(isWeeklyClosed)   return { suffix:' 🔴固定公休', disabled:true };
  if(isSpecificClosed) return { suffix:' 🔴店休',     disabled:true };
  if(notBizDayWeekly)  return { suffix:' — 非營業',    disabled:true };
  if(isResumeDate(ds)) return { suffix:' 🟢恢復營業', disabled:false };
  return { suffix:'', disabled:false };
}
// 掃描一段可見日期範圍，若有連續休假（mode=closed）區間與此範圍重疊，回傳提醒文字
function bizCalRangeWarning(dateList){
  const seen=new Set();
  for(const ds of dateList){
    const e=findBizCalEntry(ds);
    if(e && e.mode==='closed' && !seen.has(e.id)){
      seen.add(e.id);
      const range=e.start_date===e.end_date ? fmtMD(e.start_date) : `${fmtMD(e.start_date)}～${fmtMD(e.end_date)}`;
      const reasonTxt=(e.show_reason && e.reason) ? e.reason : '';
      return `⚠️ ${range}${reasonTxt?(' '+reasonTxt+'休假中'):' 休假中'}`;
    }
  }
  return '';
}
function twNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function timeToMins(hhmm){const[h,m]=String(hhmm||'00:00').split(':').map(Number);return (h||0)*60+(m||0);}

// ── 初始化 ──────────────────────────────────────────────
async function init(){
  // ── LINE Pay redirect 結果處理 ──────────────────────
  const _lpP=new URLSearchParams(window.location.search);
  if(_lpP.get('linepay')==='success'){
    // hotfix22-F：LINE Pay 付款成功才是唯一清空購物車的時機之一，這裡才真正清除 localStorage
    clearCartStorage();
    document.getElementById('loading').style.display='none';
    const _lpOrderNo=_lpP.get('order')||'';
    document.getElementById('sucNo').textContent='訂單編號：'+_lpOrderNo;
    document.getElementById('sucDetail').innerHTML='<div style="color:#06C755;font-weight:700;font-size:16px;text-align:center;padding:20px">💚 LINE Pay 付款成功！訂單已建立。</div>';
    document.getElementById('successScreen').classList.add('show');
    // fix18-10-hotfix23-D：LINE Pay callback URL 只有訂單編號，沒有金額——不能用 URL
    // 上的任何數字當 Purchase value（那可以被竄改）。改用既有的 /api/line-orders/query
    // （只用 order_number 查詢，後端回傳的是訂單當下真正的 total）取得後端權威金額，
    // 才觸發 Purchase，並且用 order_number 去重，重整這個成功頁不會重複計算。
    if(_lpOrderNo){
      apiFetch('/api/line-orders/query',{method:'POST',body:JSON.stringify({order_number:_lpOrderNo})})
        .then(r=>r.json())
        .then(qr=>{
          const o=(qr&&qr.success&&qr.orders&&qr.orders[0])?qr.orders[0]:null;
          if(o) _firePurchaseOnce(_lpOrderNo, o.total, o.items||[]);
        })
        .catch(()=>{});
    }
    return;
  }
  if(_lpP.get('linepay')==='cancel'){
    // hotfix22-F：LINE Pay 取消付款，購物車必須仍保留 —— 繼續正常初始化流程，
    // 稍後 restoreCart() 會把 localStorage 內容還原回來，不做任何清除。
    setTimeout(()=>toast('LINE Pay 付款已取消，請重新選擇付款方式'),600);
  }
  if(_lpP.get('linepay')==='fail'||_lpP.get('linepay')==='error'){
    // hotfix22-F：付款失敗同樣不得清空購物車
    setTimeout(()=>toast('LINE Pay 付款失敗，請重新嘗試或選擇其他付款方式'),600);
  }
  try{
    const[sr,mr,bcr]=await Promise.all([
      apiFetch('/api/line-shop').then(r=>r.json()),
      apiFetch('/api/line-menu').then(r=>r.json()),
      apiFetch('/api/settings/business-calendar').then(r=>r.json()).catch(()=>({success:false}))
    ]);
    bizCalendarList = (bcr && bcr.success && Array.isArray(bcr.data)) ? bcr.data : [];
    if(sr.success){
      shopData=sr.data;
      // fix18-10-hotfix23-D：依店家設定初始化 Meta Pixel／GA4（沒啟用或沒有 ID 時
      // AnalyticsPlatforms.init() 內部什麼都不會載入）
      try{ AnalyticsPlatforms.init(shopData); }catch(e){}
      // fix18-10-hotfix23-E：LINE 會員入口 —— 初始化 LIFF；disabled 模式下
      // liff_id 通常也未設定，initLineMemberGate 內部會安全略過，完全不影響既有流程。
      try{ _initLineMemberGateFromShopData(shopData); }catch(e){}
      // fix18-05: 依 coupon_feature_enabled 顯示/隱藏優惠券區塊
      couponFeatureEnabled = shopData.coupon_feature_enabled === true;
      const couponAreaEl = document.getElementById('couponArea');
      if(couponAreaEl) couponAreaEl.style.display = couponFeatureEnabled ? '' : 'none';
      const d=sr.data;
      document.getElementById('shopName').textContent=d.shop_name||'點餐';
      document.getElementById('shopName2').textContent=d.shop_name||'點餐';
      document.getElementById('shopAddr').textContent=d.shop_address||'';
      document.getElementById('shopHours').textContent=d.shop_hours||'';
      if(d.shop_logo)document.getElementById('logoWrap').innerHTML=`<img src="${d.shop_logo}" alt="logo">`;
      const ann=document.getElementById('announce');
      if(d.shop_announcement){ann.textContent=d.shop_announcement;ann.style.display='block';}

      // 全域 LINE 開關
      if(d.line_ordering_enabled==='0'||d.line_ordering_enabled===0){
        showClosed('🔴 LINE 點餐暫停','目前 LINE 點餐暫停營業，請稍後再試。');return;
      }

      // Hotfix16 BUG-003/004：今日休假狀態單一資料來源 = shopData.holiday_banner
      // （後端已依優先序 Business Calendar ＞ 今日臨時休息 ＞ 固定公休算好，前台不再重複判斷）
      // 不整頁擋住、不用 Modal / 遮罩 → 改為頁面內固定 Banner，客人可直接看商品/加購物車/選日期。
      const now=twNow(), todayStr=fmtD(now);
      const calToday=d.business_calendar_today||{matched:false};
      const holidayBanner=d.holiday_banner||{active:false};

      todayClosed = !!holidayBanner.active;
      // Hotfix17：商家公告中心（manual > auto_holiday > none）。
      // 若自動休假公告已產生（涵蓋 Business Calendar 休假訊息），舊版 holidayBanner 不再重複顯示。
      const announcement=d.announcement||{enabled:false,active:false,source:'none'};
      renderAnnouncement(announcement);
      if(shouldSkipHolidayBannerForAnnouncement(announcement)) hideHolidayBanner();
      else renderHolidayBanner(holidayBanner);

      // 營業行事曆：特殊營業／全天營業（不阻擋下單，僅顯示提示 banner）
      const bizBanner=document.getElementById('bizCalBanner');
      if(calToday.matched && calToday.mode==='custom_hours'){
        const parts=[];
        if(calToday.takeout_enabled && calToday.takeout_start_time) parts.push(`外帶：${calToday.takeout_start_time}～${calToday.takeout_end_time}`);
        if(calToday.delivery_enabled && calToday.delivery_start_time) parts.push(`外送：${calToday.delivery_start_time}～${calToday.delivery_end_time}`);
        bizBanner.textContent = `🟡 今日特殊營業${parts.length?('\n'+parts.join('\n')):''}`;
        bizBanner.style.display='block';
      } else if(calToday.matched && calToday.mode==='open_all_day'){
        bizBanner.textContent = '🟢 今日全天營業';
        bizBanner.style.display='block';
      } else if(bizBanner){
        bizBanner.style.display='none';
      }

      // 外帶/外送狀態
      const ts=d.takeout_status||{};
      const ds2=d.delivery_status||{};
      takeoutEnabled  = !!ts.enabled;
      deliveryEnabled = !!ds2.enabled;
      takeoutCutoffPassed  = !!ts.cutoff_passed;
      deliveryCutoffPassed = !!ds2.cutoff_passed;

      // 兩者都關閉
      if(!takeoutEnabled && !deliveryEnabled){
        showClosed('⏰ 今日暫停接單','外帶與外送目前皆已關閉，請稍後再試。');return;
      }

      // 決定預設模式
      // hotfix22-F 補正：若 localStorage 有保存過 order_mode，一律優先沿用該模式——
      // 即使該模式目前被店家關閉，也不得自動切回另一個開放中的模式。只有使用者自己
      // 在畫面上手動切換頁籤／下拉選單，才會更新並保存新的 order_mode（見 switchMode()/onModeChange()）。
      const _savedMode=_peekSavedOrderMode();
      if(_savedMode==='takeout' || _savedMode==='delivery'){
        currentMode=_savedMode;
        if((_savedMode==='takeout' && !takeoutEnabled) || (_savedMode==='delivery' && !deliveryEnabled)){
          modeForcedVisible=true; // 該模式目前未開放，頁籤仍需保持可見，讓使用者能看到狀態並自行切換
        }
      } else if(takeoutEnabled && !takeoutCutoffPassed) currentMode='takeout';
      else if(deliveryEnabled && !deliveryCutoffPassed) currentMode='delivery';
      else currentMode=takeoutEnabled?'takeout':'delivery';
      // hotfix22-B：currentMode 決定後立即同步 oType（購物車表單的 select），
      // 避免任何尚未更新的程式碼路徑誤讀到 <select> 的 HTML 預設值。
      const _oTypeInit=document.getElementById('oType');
      if(_oTypeInit) _oTypeInit.value=currentMode;

      buildModeTabsUI();
      buildPaymentButtons(d);
      buildDateSelector();
      // fix18-08: 初始化時同步外送地址顯示狀態
      updateDeliveryAddressVisibility();
      updateModeAvailabilityUI();
    }
    if(mr.success){categories=mr.data.categories||[];allProducts=mr.data.products||[];}
    buildCats();renderMenu();
    // hotfix22-F：還原永久保留的購物車（不設 24hr 到期），需在 allProducts/日期時段/付款方式
    // 都已建立好之後執行，才能正確重新驗證商品是否仍存在、日期時段是否仍合法。
    await restoreCart();
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    renderLastOrderCard();
    updateCutoffBanner();
    // fix18-10-hotfix23-A：page_view — 頁面初始化成功後記錄一次，同一 session 不重複
    try{
      const pvKey='line_pv_sent_'+LINE_STORE_ID;
      if(!sessionStorage.getItem(pvKey)){
        _trackEvent('page_view');
        sessionStorage.setItem(pvKey,'1');
      }
    }catch(e){}
    // 定時重新整理（每60秒）
    setInterval(refreshShopStatus, 60000);
  }catch(e){
    document.getElementById('loading').innerHTML=`<p style="color:#e53935">載入失敗：${esc(e.message)}</p>`;
  }
}

// ── 店休頁面（僅用於「總開關關閉」「兩模式皆關閉」等真正需要整頁擋住的情境；

function showClosed(title,msg){
  document.getElementById('loading').style.display='none';
  const el=document.getElementById('content');el.style.display='block';
  el.innerHTML=`<div class="closed-screen"><div class="ei">${title.split(' ')[0]}</div><h2>${title.split(' ').slice(1).join(' ')}</h2><p>${msg.replace(/\n/g,'<br>')}</p></div>`;
}

// ── 🏖️ 休假公告 Banner（Hotfix16）──────────────────────
// Hotfix16 BUG-004：不整頁擋住、不用 Modal / 遮罩 → 改為頁面內固定公告 Banner。
// 客人可直接看商品、加入購物車、選日期，完全不受阻擋；休假日期本身不可送單，由後端二次驗證把關。
// 資料來源單一：shopData.holiday_banner（/api/line-shop 已依 Business Calendar > 今日臨時休息 > 固定公休 算好）
function renderHolidayBanner(banner){
  const el=document.getElementById('holidayBanner');
  if(!el) return;
  if(!banner || !banner.active){ hideHolidayBanner(); return; }

  let bodyHtml='';
  if(banner.type==='calendar'){
    const rangeTxt = banner.start_date===banner.end_date
      ? fmtMD(banner.start_date)
      : `${fmtMD(banner.start_date)}～${fmtMD(banner.end_date)}`;
    const reasonLine = (banner.show_reason && banner.reason) ? `<div style="margin-top:2px">${esc(banner.reason)}</div>` : '';
    const resumeLine = banner.resume_within_limit
      ? `<div style="margin-top:10px;color:#2e7d32;font-weight:700">🟢 ${fmtMD(banner.resume_date)} 恢復營業</div>`
      : `<div style="margin-top:10px;color:#c62828;font-weight:700">恢復營業日超出目前可預訂範圍</div>`;
    const actionBtn = banner.resume_within_limit
      ? `<button type="button" style="margin-top:10px;width:100%;padding:10px;background:#e65100;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer" onclick="selectResumeDate('${banner.resume_date}')">立即預訂</button>`
      : '';
    bodyHtml = `
      <div style="padding:12px 14px">
        <div style="font-size:15px;font-weight:700;color:#7a3b00">🏖️ 目前休假中</div>
        <div style="margin-top:4px;color:#7a5c00">${esc(rangeTxt)}</div>
        ${reasonLine}
        <div style="margin-top:8px;font-size:13px;color:#2e7d32">✅ 可以預訂</div>
        ${resumeLine}
        ${actionBtn}
      </div>`;
  } else if(banner.type==='today_closed'){
    bodyHtml = `<div style="padding:12px 14px">
      <div style="font-size:15px;font-weight:700;color:#7a3b00">🌙 今日臨時休息</div>
      <div style="margin-top:4px;color:#7a5c00">可預訂其他營業日期</div>
    </div>`;
  } else if(banner.type==='weekly'){
    bodyHtml = `<div style="padding:12px 14px">
      <div style="font-size:15px;font-weight:700;color:#7a3b00">🌙 今日固定公休</div>
      <div style="margin-top:4px;color:#7a5c00">可預訂其他營業日期</div>
    </div>`;
  } else {
    hideHolidayBanner(); return;
  }
  el.innerHTML = bodyHtml;
  el.style.display = 'block';
}
function hideHolidayBanner(){
  const el=document.getElementById('holidayBanner');
  if(el){ el.style.display='none'; el.innerHTML=''; }
}
// 捲動到商品區
function scrollToProducts(){
  document.getElementById('menuArea')?.scrollIntoView({behavior:'smooth', block:'start'});
}
// 「立即預訂」：捲動到商品區 → 開啟購物車 → 日期預設選到 resume_date → 載入該日可用時段
async function selectResumeDate(dateStr){
  if(!dateStr) return;
  const limit=getPreorderDaysLimit();
  const todayStr=fmtD(twNow());
  const daysAhead=Math.round((parseLocalDate(dateStr)-parseLocalDate(todayStr))/86400000);
  if(daysAhead>limit){ toast('恢復營業日超出可預約天數'); return; }

  scrollToProducts();
  openSheet('cartSheet');
  buildDateSelector(daysAhead>0); // 若 resume_date 不是今天，走 forceNextDay 範圍（明天起）
  const pDate=document.getElementById('pDate');
  if(pDate){
    const targetOpt=Array.from(pDate.options).find(o=>o.value===dateStr&&!o.disabled);
    if(targetOpt) pDate.value=dateStr;
  }
  await buildTimeSelector();
}

// ══════════════════════════════════════════════════════════
// Hotfix17：商家公告中心（manual > auto_holiday > none，資料來源 = shopData.announcement）
// modal：80% 彈窗，可背景/Esc/X 關閉（依 closable）；banner：頁面內公告，不遮罩不阻擋
// 公告本身只負責顯示提醒，能不能送單仍由 Business Calendar / 後端驗證把關
// ══════════════════════════════════════════════════════════
let currentAnnouncement=null;
let _announceDismissedThisSession=false; // 避免 frequency=always 的公告在同一頁面 session 內被定時刷新重新彈出
const ANNOUNCE_ICON_MAP={general:'📢',holiday:'🏖️',promo:'🎉',new_product:'🆕',delivery:'📦',member:'🎁',custom:'✨'};
const ANNOUNCE_BG_MAP={general:'#fff9e6',holiday:'#fff3e0',promo:'#fce4ec',new_product:'#e3f2fd',delivery:'#e8f5e9',member:'#f3e5f5',custom:'#fffde7'};

function renderAnnouncement(a){
  currentAnnouncement=a||null;
  hideAnnouncementUI();
  if(!a || !a.active) return;
  if(_announceDismissedThisSession) return;
  if(isAnnouncementDismissed(a)) return;
  if(a.display_mode==='modal') showAnnouncementModal(a);
  else showAnnouncementBanner(a);
}
function hideAnnouncementUI(){
  document.getElementById('announceOverlay')?.classList.remove('show');
  const bn=document.getElementById('announceBanner');
  if(bn){ bn.style.display='none'; bn.innerHTML=''; }
}
function showAnnouncementModal(a){
  const body=document.getElementById('announceModalBody');
  const closeBtn=document.getElementById('announceModalCloseBtn');
  if(!body) return;
  const icon=a.icon||ANNOUNCE_ICON_MAP[a.type]||'📢';
  // fix18-10-hotfix22D：圖片載入失敗時隱藏圖片區，不影響文字公告；沒有圖片時維持原本純文字公告
  const img=a.image_url?`<img src="${esc(a.image_url)}" alt="" onerror="this.style.display='none'">`:'';
  const showBtn=a.button_action!=='none' && a.button_text;
  const btn=showBtn?`<button class="announce-modal-btn" onclick="announceButtonClick()">${esc(a.button_text)}</button>`:'';
  body.innerHTML=`${img}<div class="announce-modal-icon">${icon}</div><div class="announce-modal-title">${esc(a.title||'')}</div><div class="announce-modal-msg">${esc(a.body||'')}</div>${btn}`;
  if(closeBtn) closeBtn.style.display=(a.closable===false)?'none':'flex';
  document.getElementById('announceOverlay')?.classList.add('show');
}
function showAnnouncementBanner(a){
  const el=document.getElementById('announceBanner');
  if(!el) return;
  const icon=a.icon||ANNOUNCE_ICON_MAP[a.type]||'📢';
  const bg=ANNOUNCE_BG_MAP[a.type]||'#fff9e6';
  const closeBtn=(a.closable===false)?'':`<div class="announce-banner-close" onclick="dismissAnnouncement()">✕</div>`;
  const showBtn=a.button_action!=='none' && a.button_text;
  const btn=showBtn?`<button class="announce-banner-btn" style="background:#06C755;color:#fff" onclick="announceButtonClick()">${esc(a.button_text)}</button>`:'';
  // fix18-10-hotfix22D：banner 模式同樣支援圖片（沒有圖片時維持原本純文字公告）；圖片載入失敗時自動隱藏
  const img=a.image_url?`<img class="announce-banner-img" src="${esc(a.image_url)}" alt="" onerror="this.style.display='none'">`:'';
  el.style.background=bg;

// fix18-10-hotfix22D：localStorage key 加上 target=line_order，避免未來與冷藏宅配公告（target=shipping）
// 共用同一把 key；新關閉動作一律寫新版 key，但讀取時仍相容舊版 key（避免已關閉過公告的老客人重新看到）。
function _announceDismissKey(suffix){ return `line_announcement_dismissed_${LINE_STORE_ID}_line_order_${suffix}`; }
function _announceDismissKeyLegacy(suffix){ return `line_announcement_dismissed_${LINE_STORE_ID}_${suffix}`; }
function isAnnouncementDismissed(a){
  const freq=a.frequency||'version';
  try{
    if(freq==='always') return false; // 每次都顯示，不記錄
    if(freq==='once')  return localStorage.getItem(_announceDismissKey('once'))==='1' || localStorage.getItem(_announceDismissKeyLegacy('once'))==='1';
    if(freq==='daily'){ const today=fmtD(twNow()); return localStorage.getItem(_announceDismissKey('daily'))===today || localStorage.getItem(_announceDismissKeyLegacy('daily'))===today; }
    const v=String(a.version||'1');
    return localStorage.getItem(_announceDismissKey(v))==='1' || localStorage.getItem(_announceDismissKeyLegacy(v))==='1'; // version（預設）
  }catch{ return false; }
}
function recordAnnouncementDismiss(a){
  const freq=a.frequency||'version';
  try{
    if(freq==='always') return;
    if(freq==='once'){ localStorage.setItem(_announceDismissKey('once'),'1'); return; }
    if(freq==='daily'){ localStorage.setItem(_announceDismissKey('daily'),fmtD(twNow())); return; }
    localStorage.setItem(_announceDismissKey(String(a.version||'1')),'1');
  }catch{}
}

}

function getPreorderDaysLimit(){

// ── 日期選擇器（依模式篩選公休日；日期範圍統一由 line_preorder_days_limit 控制）──
function buildDateSelector(forceNextDay=false){
  const sel=document.getElementById('pDate');if(!sel)return;
  sel.innerHTML='';
  // hotfix22-F 補正：目前模式（外帶/外送）整個被店家關閉時，不得產生任何可送單的日期／時段選項，
  // 但商品/顧客資料仍完整保留，只是擋住送單；等使用者切到有開放的模式才恢復正常選單。
  if(!isCurrentModeAvailable()){
    const opt=document.createElement('option');opt.value='';opt.disabled=true;
    opt.textContent=(currentMode==='delivery'?'外送':'外帶')+'目前未開放';
    sel.appendChild(opt);
    const pTimeUnavail=document.getElementById('pTime');
    if(pTimeUnavail) pTimeUnavail.innerHTML=`<option value="" disabled>${currentMode==='delivery'?'外送':'外帶'}目前未開放</option>`;
    updateModeAvailabilityUI();
    return;
  }
  const now=twNow();
  // hotfix22-B ROOT CAUSE FIX：外帶/外送模式必須只有 currentMode 這一個單一來源。
  // 舊版讀取 oType.value 作為主要依據，但 oType 這個 <select> 只有在使用者手動切換
  // 或購物車開啟時才會被同步；頁面剛載入、或行事曆/今日截止讓某模式被關閉時，
  // oType 仍停留在 HTML 預設值（'外帶'），導致用「錯誤的模式」去查時段，
  // 出現「外送已關閉」「今日截止」等錯誤訊息（即使該模式其實是開啟的）。
  const mode=currentMode;
  const closedWds=(() => { try { return JSON.parse(shopData.line_closed_weekdays||'[]'); } catch { return []; } })();
  const closedDts=(() => { try { return JSON.parse(shopData.line_closed_dates||'[]'); } catch { return []; } })();
  const bizHoursKey=mode==='takeout'?'takeout_business_hours':'delivery_business_hours';
  const bizHours=(() => { try { return JSON.parse(shopData[bizHoursKey]||'{}'); } catch { return {}; } })();
  const bizEmpty=Object.keys(bizHours).length===0;
  let first=null;
  // 統一日期範圍：0（今天）～ line_preorder_days_limit 天後；forceNextDay 時排除今天（今日已售完/不可下單，從明天起選）
  const limit=getPreorderDaysLimit();
  const startOffset=forceNextDay?1:0;
  const endOffset=limit;
  const _dsListForWarning=[];
  for(let offset=startOffset;offset<=endOffset;offset++){
    const d=new Date(now);d.setDate(d.getDate()+offset);
    const ds=fmtD(d),wk=WD_KEYS[parseLocalDate(ds).getDay()];
    const mm=String(d.getMonth()+1).padStart(2,'0'),dd2=String(d.getDate()).padStart(2,'0');
    const lbl=offset===0?'今天':offset===1?'明天':offset===2?'後天':`${offset}天後`;
    const isWeeklyClosed=closedWds.includes(wk);
    const isSpecificClosed=closedDts.includes(ds);
    const dh=bizHours[wk];
    const notBizDay=!isWeeklyClosed&&!isSpecificClosed&&!bizEmpty&&dh&&!dh.enabled;
    const {suffix,disabled}=bizCalOptionSuffix(ds,isWeeklyClosed,isSpecificClosed,notBizDay);
    _dsListForWarning.push(ds);
    const opt=document.createElement('option');opt.value=ds;opt.disabled=disabled;
    opt.textContent=`${lbl} ${mm}/${dd2}(${WD_NAMES[d.getDay()]})${suffix}`;
    if(!disabled&&!first)first=ds;
    sel.appendChild(opt);
  }
  const warnEl=document.getElementById('pDateCalWarning');
  if(warnEl){
    const warnTxt=bizCalRangeWarning(_dsListForWarning);
    warnEl.textContent=warnTxt;
    warnEl.style.display=warnTxt?'block':'none';
  }
  if(first)sel.value=first;
  if(!forceNextDay) buildTimeSelector();
}

// ── 時間選擇器（呼叫後端 API，依模式計算）────────────────
async function buildTimeSelector(){
  const dateSel=document.getElementById('pDate'),sel=document.getElementById('pTime');
  if(!sel)return;
  sel.innerHTML='<option value="">載入中…</option>';
  const sd=dateSel?.value;if(!sd){sel.innerHTML='<option value="">請先選擇日期</option>';return;}
  // hotfix22-B ROOT CAUSE FIX：同上，改用單一來源 currentMode，避免用到未同步的 oType.value
  const mode=currentMode;
  const lbl=document.getElementById('timeLabel');
  if(lbl) lbl.childNodes[0].textContent=mode==='delivery'?'外送時間 ':'取餐時間 ';
  try{
    const res=await apiFetch(`/api/line-orders/timeslots?mode=${mode}&date=${sd}`).then(r=>r.json());
    if(!res.success||!res.slots||res.slots.length===0){
      const reasons={
        cutoff_passed:'今日接單已截止',
        no_slots_today:'今日已無可預約時段',
        closed_day:'此日為店休日',
        mode_closed:'此模式已關閉',
      };
      // 若是 no_slots_today 且是今天，提示選明天
      let msg = reasons[res.reason]||'此日無可預約時段';
      const nowDate = fmtD(twNow());
      if(res.reason==='no_slots_today'&&sd===nowDate) msg='今日時段已過，請選擇其他日期';
      sel.innerHTML=`<option value="" disabled>${msg}</option>`;
      return;
    }
    sel.innerHTML='';
    res.slots.forEach((t,i)=>{
      const h=Number(t.split(':')[0]);
      const lbl2=h<12?`上午 ${t}`:h===12?`中午 ${t}`:`下午 ${t}`;
      const o=document.createElement('option');o.value=t;o.textContent=lbl2;sel.appendChild(o);
    });
    // 提示最早時間
    if(res.earliest) toast(`最早可選 ${res.earliest}`);
  }catch{
    sel.innerHTML='<option value="" disabled>載入失敗，請重試</option>';
  }
}

// fix18-10-hotfix23-A：view_product — 商品卡真正進入視窗時記錄一次（同一 session +
// product_id 去重，用 sessionStorage 記錄已送出過的 product_id 清單）
let _viewProductObserver=null;
function _setupViewProductObserver(){
  try{
    if(!('IntersectionObserver' in window)) return;
    if(_viewProductObserver) _viewProductObserver.disconnect();
    const seenKey='line_viewed_products_'+LINE_STORE_ID;
    let seen=[];
    try{ seen=JSON.parse(sessionStorage.getItem(seenKey)||'[]'); }catch(e){}
    const seenSet=new Set(seen);
    _viewProductObserver=new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(!entry.isIntersecting) return;
        const pid=(entry.target.id||'').replace('pc-','');
        if(!pid || seenSet.has(pid)) return;
        seenSet.add(pid);
        try{ sessionStorage.setItem(seenKey, JSON.stringify([...seenSet])); }catch(e){}
        _trackEvent('view_product',{product_id:Number(pid)});
        _viewProductObserver.unobserve(entry.target);
      });
    },{threshold:0.5});
    document.querySelectorAll('.prod-card[id^="pc-"]').forEach(card=>{
      const pid=(card.id||'').replace('pc-','');
      if(!seenSet.has(pid)) _viewProductObserver.observe(card);
    });
  }catch(e){ /* 追蹤失敗不影響商品渲染 */ }
}

// ── 商品卡片（外帶/外送獨立售完判斷）──────────────────
function buildCard(p, mode){
  const name=p.effective_line_name||p.line_name||p.name;
  const price=p.effective_line_price||p.price;
  const img=p.line_image_url||p.image||'';
  const desc=p.line_description||'';
  const spec=p.line_spec||''; // fix18-10-hotfix19：LINE 通路獨立規格（例：200g）
  const isHot=Number(p.line_hot)===1, isPromo=Number(p.line_promo)===1;
  const ss=p.sale_status||'available';
  // Hotfix16 BUG-002：尚未開賣但允許預購今天稍後時段（後端已判斷，前台不重複判斷）
  const preSaleAvailable=!!p.pre_sale_available;

  // ══════════════════════════════════════════════════════
  // LINE 接單規則優先順序（前台顯示層，與後端 /api/line-menu 一致）
  //   第一位階：今日休假 → calendar_closed / today_closed / weekly_closed（只限今日）
  //   第二位階：今日截止時間 → cutoff_sold_out（只限今日）
  //   第三位階：商品販售時段 → product_time_ended / product_not_started（只限今日）
  //   第四位階：LINE 份數     → real_sold_out（只限今日）
  //   canNextDay=true 時，任何今日限制都顯示「預約明日／預約下個營業日」按鈕
  // ══════════════════════════════════════════════════════

  const soldOutReason=mode==='delivery'?p.delivery_sold_out_reason:p.takeout_sold_out_reason;
  const canNextDay=mode==='delivery'?p.delivery_can_next_day:p.takeout_can_next_day;
  const isSoldOut=!!soldOutReason || Number(p.line_sold_out)===1 || ss!=='available';
  const isDayClosed = soldOutReason==='calendar_closed' || soldOutReason==='today_closed' || soldOutReason==='weekly_closed';

  // LINE quota 優先（食材控管不適用 LINE 點餐，ingredient_available 不影響前台顯示）
  const quota=p.line_quota||{hasQuota:false};

  // canPreorderNextDay：今日售完（任何位階）且允許預約明日
  const canPreorderNextDay = isSoldOut && !!canNextDay && soldOutReason !== 'mode_closed';
  const quotaRealSoldOut = quota.hasQuota && Number(quota.remaining??0) <= 0;
  const unavailFully = (isSoldOut && !canPreorderNextDay) || (quotaRealSoldOut && !canPreorderNextDay);

  // Hotfix16 BUG-006：今日狀態文字與顏色重新設計，避免全部顯示灰色造成誤解
  let soldLbl='今日售完', soldCls='badge-sold';
  if(soldOutReason==='mode_closed'){          soldLbl='未開放';       soldCls='badge-sold'; }
  else if(isDayClosed){                       soldLbl='休假中';       soldCls='badge-holiday'; }
  else if(soldOutReason==='product_not_started'){ soldLbl='尚未開始販售'; soldCls='badge-orange'; }
  else if(soldOutReason==='product_time_ended'){  soldLbl='今日售完';   soldCls='badge-soldout-today'; }
  else if(soldOutReason==='real_sold_out'){       soldLbl='今日售完';   soldCls='badge-soldout-today'; }
  else if(soldOutReason==='cutoff_sold_out'){     soldLbl='今日售完';   soldCls='badge-soldout-today'; }
  else if(ss==='sold_out_today'){             soldLbl='今日完售';     soldCls='badge-soldout-today'; }
  else if(ss==='paused'){                     soldLbl='暫停販售';     soldCls='badge-sold'; }

  // 份數狀態標籤（第四位階）
  // 今日：用 line_quota；預購（hasNextDayMode=true 或購物車選的是明日）：用 line_preorder
  const preorderInfo=p.line_preorder||{hasPreorder:false};
  const isInPreorderMode=!!preorderInfo.hasPreorder;  // 後端已判斷
  let stockBadge='';
  if(!isSoldOut){
    if(quota.hasQuota && !isInPreorderMode){
      const r=Number(quota.remaining??0);
      if(r<=0)               stockBadge='<div class="prod-stock-badge stock-zero">🔴 今日售完</div>';
      else if(r<=quota.low)  stockBadge=`<div class="prod-stock-badge stock-low">🟠 即將售完（剩${r}份）</div>`;
      else if(r>=quota.high) stockBadge='<div class="prod-stock-badge stock-ok">🟢 供應充足</div>';
      else                   stockBadge=`<div class="prod-stock-badge stock-ok">🟢 剩 ${r} 份</div>`;
    }
  }
  // fix18-10-hotfix22D：canPreorderNextDay 商品不再顯示「預約明日/預約下個營業日」按鈕，
  // 改為直接顯示 [-] qty [+]，故只需保留「預購是否已滿」的判斷。
  const preorderFullBlocked = canPreorderNextDay && preorderInfo.hasPreorder && Number(preorderInfo.remaining??0)<=0;

  // Hotfix16 BUG-002/006：🟢 可預約（尚未開賣但允許預購今天稍後時段）— 不灰掉、可直接加入購物車
  const preSaleBadge = (!isSoldOut && preSaleAvailable)
    ? '<span class="badge badge-green">🟢 可預約</span>' : '';

  const qty=cart[p.id]?.qty||0;
  // fix18-10-hotfix22D：canPreorderNextDay 且份數未滿時，商品卡永遠顯示 [-] qty [+]（不再需要先按預約按鈕）
  let footer='';
  if(!isSoldOut || (canPreorderNextDay && !preorderFullBlocked)){
    // pre_sale_available 商品同樣可直接加入購物車（不受尚未開賣影響）
    footer=qty>0
      ?`<div class="qty-ctrl"><button class="minus" onclick="chgQty(${p.id},-1)">−</button><span class="qnum">${qty}</span><button class="plus" onclick="chgQty(${p.id},1)">+</button></div>`
      :`<button class="add-btn" id="ab-${p.id}" onclick="addCart(${p.id},event)">+</button>`;
  }

  // Hotfix16 BUG-006：商品遮罩 — 只有休假／售完／停售才灰掉，pre_sale_available 一律不灰掉
  // fix18-10-hotfix22D：canPreorderNextDay 商品「不再」顯示遮罩／預約按鈕，只有「預購已滿」或
  // 完全不可預購（unavailFully）時才灰掉。
  // hotfix22-F 第九點：不可立即購買時，只讓圖片變暗，商品名稱/說明/價格仍正常顯示；
  // 不再用整卡覆蓋式 mask（舊版 .sold-mask 會蓋住名稱與價格）。
  const imgDimmed = unavailFully || preorderFullBlocked;

  const imgHtml=img?`<img class="prod-img" src="${img}" alt="${esc(name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'';
  // fix18-10-hotfix22D：canPreorderNextDay（且未預購額滿）時，改為兩個徽章「🔴{狀態}」＋「🟢可預購」，
  // 取代舊版「可預約明日／預約下個營業日」單一徽章；其餘不可預購狀態維持原本單一徽章。
  // hotfix22-F：這些「今日售完／休假中／可預購」屬於狀態標籤，固定顯示在照片下方（status-row），
  // 不參與行銷標籤排序、不佔用照片上的行銷標籤版位。
  let statusRowHtml='';
  if(preorderFullBlocked){
    statusRowHtml=`<span class="badge ${soldCls}">預購已滿</span>`;
  } else if(canPreorderNextDay){
    statusRowHtml=`<span class="badge ${soldCls}">🔴 ${soldLbl}</span><span class="badge badge-green">🟢 可預購</span>`;
  } else if(isSoldOut){
    statusRowHtml=`<span class="badge ${soldCls}">${soldLbl}</span>`;
  } else if(preSaleBadge){
    statusRowHtml=preSaleBadge;
  }

  // hotfix22-F 第九點：行銷標籤（左上主緞帶／右上小膠囊，最多顯示 2 個）。
  // 本版維持預設優先順序：優惠 > 新品 > 店長推薦 > 熱銷；「新品」「店長推薦」需要商品資料表
  // 新欄位才能支援，本輪不修改商品資料表，故暫不提供，僅先支援既有「優惠」「熱銷」欄位。
  // 商家可調整名稱/排序/開關/數量的後台設定延後至下一版。
  const marketingTags=[];
  if(isPromo) marketingTags.push({cls:'tag-ribbon-promo',label:'🎁 優惠'});
  if(isHot)   marketingTags.push({cls:'tag-ribbon-hot',label:'🔥 熱銷'});
  const ribbonHtml  = marketingTags[0] ? `<div class="tag-ribbon ${marketingTags[0].cls}">${marketingTags[0].label}</div>` : '';
  const capsuleHtml = marketingTags[1] ? `<div class="tag-capsule ${marketingTags[1].cls}">${marketingTags[1].label}</div>` : '';

  return `<div class="prod-card" id="pc-${p.id}"><div class="prod-img-wrap${imgDimmed?' img-dimmed':''}">${imgHtml}<div class="prod-ph" ${img?'style="display:none"':''}>🍽️</div>${ribbonHtml}${capsuleHtml}</div><div class="prod-body"><div class="prod-name">${esc(name)}</div>${spec?`<div class="prod-spec">${esc(spec)}</div>`:''}<div class="status-row">${statusRowHtml}</div>${stockBadge}<div class="prod-desc">${esc(desc)}</div><div class="prod-footer"><span class="prod-price">$${price}</span>${footer}</div></div></div>`;
}

// ── 購物車操作 ─────────────────────────────────────────
function addCart(id,evt){
  const p=allProducts.find(x=>x.id==id);if(!p)return;
  const mode=currentMode;
  const soldOutReason=mode==='delivery'?p.delivery_sold_out_reason:p.takeout_sold_out_reason;
  const canNextDay=mode==='delivery'?p.delivery_can_next_day:p.takeout_can_next_day;
  // 完全關閉
  if(soldOutReason==='mode_closed'){alert('此模式已關閉');return;}
  // 任何售完原因：若允許預約則直接加入購物車（不再要求先按預約按鈕）；否則拒絕
  if(soldOutReason){
    if(canNextDay){ addPreorderToCart(id,evt,p); return; }
    const msgs={
      cutoff_sold_out:'已超過今日接單截止時間，無法加入購物車',
      real_sold_out:(p.effective_line_name||p.name)+' LINE 今日份數已售完',
      product_time_ended:(p.effective_line_name||p.name)+' 今日販售時段已結束',
      product_not_started:(p.effective_line_name||p.name)+`尚未開始販售（${p.line_sell_start||''} 開賣）`,
      calendar_closed:'今日休假中，無法加入購物車，請選擇其他營業日期',
      today_closed:'今日臨時休息，無法加入購物車，請選擇其他營業日期',
      weekly_closed:'今日固定公休，無法加入購物車，請選擇其他營業日期',
    };
    alert(msgs[soldOutReason]||'此商品目前無法加入購物車');return;
  }
  if(Number(p.line_sold_out)===1){
    if(canNextDay){ addPreorderToCart(id,evt,p); return; }
    alert((p.effective_line_name||p.name)+' 今日已售完');return;
  }
  // BUG-002 修正：依目前購物車選擇的日期，決定用今日 quota 還是預購 preorder 判斷
  const _selectedDate = document.getElementById('pDate')?.value || '';
  const _todayStr = fmtD(twNow());
  const _isPreorderCart = _selectedDate && _selectedDate > _todayStr;
  if(_isPreorderCart){
    // 預購日期：只用 line_preorder_* 判斷，完全不看 line_quota_*
    const preorderInfo=p.line_preorder||{hasPreorder:false};
    if(preorderInfo.hasPreorder && Number(preorderInfo.remaining??0)<=0){
      alert((p.effective_line_name||p.name)+' 預購已滿');return;
    }
    const inCart=cart[id]?.qty||0;
    if(preorderInfo.hasPreorder && inCart>=(Number(preorderInfo.remaining??0))){
      alert((p.effective_line_name||p.name)+` 預購剩餘份數不足（剩 ${preorderInfo.remaining} 份）`);return;
    }
  } else {
    // 今日訂單：用 line_quota_*
    if(p.line_quota?.hasQuota&&Number(p.line_quota?.remaining)<=0){
      if(canNextDay){ addPreorderToCart(id,evt,p); return; }
      alert((p.effective_line_name||p.name)+' LINE 今日份數已售完');return;
    }
    if(p.line_quota?.hasQuota){
      const inCart=cart[id]?.qty||0;
      if(inCart>=(p.line_quota.remaining||0)){alert((p.effective_line_name||p.name)+` LINE 剩餘份數不足（剩 ${p.line_quota.remaining} 份）`);return;}
    }
  }
  if(!cart[id])cart[id]={product:p,qty:0};
  cart[id].qty++;
  _trackAddToCart(id,1);
  if(evt){const fly=document.createElement('div');fly.className='fly-item';fly.textContent='🛒';fly.style.cssText=`left:${evt.clientX}px;top:${evt.clientY}px`;document.body.appendChild(fly);setTimeout(()=>fly.remove(),700);}
  updateBar();updateProductCard(id);
  persistCart();
}

// ── B: 預約明日 — 完整流程 ────────────────────────────────
// 1. 找下一個可訂日 2. 加商品進購物車 3. 載入明日時段 4. 打開購物車
// hotfix22-B：找出某模式（takeout/delivery）下一個可訂日（排除今日、公休日、非營業日）
// preorderNextDay() 與「今日截止後導向下一可營業日」共用同一套邏輯，避免各自維護不同判斷
function findNextAvailableDate(mode){
  const now=twNow();
  const closedWds=(() => { try { return JSON.parse(shopData.line_closed_weekdays||'[]'); } catch { return []; } })();
  const closedDts=(() => { try { return JSON.parse(shopData.line_closed_dates||'[]'); } catch { return []; } })();
  const bizHoursKey=mode==='takeout'?'takeout_business_hours':'delivery_business_hours';
  const bizHours=(() => { try { return JSON.parse(shopData[bizHoursKey]||'{}'); } catch { return {}; } })();
  const bizHoursEmpty=Object.keys(bizHours).length===0;
  const WD_KEYS_LOCAL=['sun','mon','tue','wed','thu','fri','sat'];
  for(let offset=1;offset<=14;offset++){
    const d=new Date(now); d.setDate(d.getDate()+offset);
    const ds=fmtD(d),wk=WD_KEYS_LOCAL[parseLocalDate(ds).getDay()];
    if(closedWds.includes(wk)||closedDts.includes(ds)) continue;
    if(!bizHoursEmpty){ const dh=bizHours[wk]; if(dh&&!dh.enabled) continue; }
    return ds;
  }
  return null;
}
function addPreorderToCart(id,evt,p){
  // fix18-10-hotfix22D：取代舊版「preorderNextDay()」的按鈕流程——不再另外打開購物車、
  // 不再強制設定日期／時段（改由 openCartSheet()/switchMode()/onModeChange() 在購物車實際
  // 開啟時，依 preorderRequiredIds 統一重新計算下個營業日與時段，避免背景預先寫入之後又被
  // 使用者切換模式或店家異動設定弄成過期資料）。這裡只負責：驗證預購份數 → 加入購物車 → 標記。
  if(evt){evt.stopPropagation();}
  const preorderInfo=p.line_preorder||{hasPreorder:false};
  if(preorderInfo.hasPreorder && Number(preorderInfo.remaining??0)<=0){
    alert((p.effective_line_name||p.name)+' 預購已滿');return;
  }
  const inCart=cart[id]?.qty||0;
  if(preorderInfo.hasPreorder && inCart>=(Number(preorderInfo.remaining??0))){
    alert((p.effective_line_name||p.name)+` 預購剩餘份數不足（剩 ${preorderInfo.remaining} 份）`);return;
  }
  if(!cart[id])cart[id]={product:p,qty:0};
  cart[id].qty++;
  _trackAddToCart(id,1);
  preorderRequiredIds.add(Number(id));
  if(evt){const fly=document.createElement('div');fly.className='fly-item';fly.textContent='🛒';fly.style.cssText=`left:${evt.clientX}px;top:${evt.clientY}px`;document.body.appendChild(fly);setTimeout(()=>fly.remove(),700);}
  updateBar();updateProductCard(id);
  persistCart();
  toast('✅ 已加入購物車，將自動預約下個營業日');
}

// ── 依購物車內容重新計算日期選擇器：若購物車內有任何商品需要自動預約下個營業日，
//    forceNextDay=true（從明天起算），並自動選中下個可訂日；否則維持原本今天起算的選單。
//    hotfix22-B 既有慣例：每次開啟/切換都即時重算，避免使用頁面載入當下的快取狀態。
async function refreshDateSelectorForCart(){
  const mode=currentMode;
  const needsNextDay=Object.keys(cart).some(id=>preorderRequiredIds.has(Number(id)));
  if(needsNextDay){
    buildDateSelector(true); // forceNextDay=true：從明天起算，範圍到 line_preorder_days_limit
    const nextDate=findNextAvailableDate(mode);
    const pDate=document.getElementById('pDate');
    if(pDate&&nextDate){
      const targetOpt=Array.from(pDate.options).find(o=>o.value===nextDate&&!o.disabled);
      if(targetOpt) pDate.value=nextDate;
    }
    await buildTimeSelector(); // forceNextDay=true 時 buildDateSelector 不會自動呼叫，這裡手動載入時段
  } else {
    buildDateSelector();
  }
  persistCart();
}
// fix18-10-hotfix22D：取代舊版 openCartSheetWithDate()——僅用於「送單當下才發現今日已截止」
// 的救援導向（購物車 sheet 此時已經是開啟狀態，只需要把日期/時段改成下一個可營業日）。
function applyDateTimeToCartSheet(dateStr, slots){
  buildDateSelector(true); // forceNextDay=true：從明天起算
  const pDate=document.getElementById('pDate');
  if(pDate){
    const targetOpt=Array.from(pDate.options).find(o=>o.value===dateStr&&!o.disabled);
    pDate.value = targetOpt ? dateStr : (pDate.querySelector('option:not([disabled])')?.value||dateStr);
  }
  const pTime=document.getElementById('pTime');
  if(pTime){
    if(slots&&slots.length>0){
      pTime.innerHTML='';
      slots.forEach(t=>{
        const h=Number(t.split(':')[0]);
        const lbl=h<12?`上午 ${t}`:h===12?`中午 ${t}`:`下午 ${t}`;
        const o=document.createElement('option');o.value=t;o.textContent=lbl;
        pTime.appendChild(o);
      });
      pTime.value=slots[0];
    } else {
      pTime.innerHTML='<option value="" disabled>此日無可選時段，請選其他日期</option>';
    }
  }
  persistCart();
}
function chgQty(id,d){
  if(!cart[id])return;
  if(d>0){
    const p=allProducts.find(x=>x.id==id);
    // fix18-10-hotfix22D：商品已被 addPreorderToCart() 標記為「需自動預約下個營業日」時，
    // 一律用 line_preorder_* 判斷，不再依賴購物車 pDate 目前的值（此時 pDate 可能還沒被
    // refreshDateSelectorForCart() 同步過，例如購物車尚未開啟過）。
    const isPreorderItem=preorderRequiredIds.has(Number(id));
    if(isPreorderItem){
      const preorderInfo=p?.line_preorder||{hasPreorder:false};
      if(preorderInfo.hasPreorder && cart[id].qty>=(Number(preorderInfo.remaining??0))){
        alert('預購剩餘份數不足');return;
      }
    } else {
      // BUG-002 修正：依目前購物車選擇的日期，決定用今日 quota 還是預購 preorder 判斷
      const _selectedDate = document.getElementById('pDate')?.value || '';
      const _todayStr = fmtD(twNow());
      const _isPreorderCart = _selectedDate && _selectedDate > _todayStr;
      if(_isPreorderCart){
        // 預購日期：只用 line_preorder_*，完全不看 line_quota_*
        const preorderInfo=p?.line_preorder||{hasPreorder:false};
        if(preorderInfo.hasPreorder && cart[id].qty>=(Number(preorderInfo.remaining??0))){
          alert('預購剩餘份數不足');return;
        }
      } else {
        // 今日訂單：用 line_quota_*
        if(p&&p.line_quota?.hasQuota&&cart[id].qty>=(p.line_quota.remaining||0)){alert('LINE 份數不足');return;}
      }
    }
  }
  const _qtyBefore=cart[id].qty;
  cart[id].qty+=d;
  if(d>0){ _trackAddToCart(id, d); }
  if(cart[id].qty<=0){
    if(_qtyBefore>0) _trackRemoveFromCart(id, _qtyBefore);
    delete cart[id]; preorderRequiredIds.delete(Number(id));
  }
  updateBar();updateProductCard(id);
  if(document.getElementById('cartSheet').classList.contains('show'))renderCartItems();
  persistCart();
}
function updateProductCard(id){
  const p=allProducts.find(x=>x.id==id);if(!p)return;
  const card=document.getElementById(`pc-${id}`);if(!card)return;
  const mode=currentMode;
  const soldOutReason=mode==='delivery'?p.delivery_sold_out_reason:p.takeout_sold_out_reason;
  const canNextDay=mode==='delivery'?p.delivery_can_next_day:p.takeout_can_next_day;
  const isSoldOutFlag=!!soldOutReason||Number(p.line_sold_out)===1||(p.sale_status||'available')!=='available';
  // fix18-10-hotfix22D：canPreorderNextDay 商品現在footer照樣顯示 [-] qty [+]，
  // 故只有「真的完全不可預購」時才提早 return（維持遮罩，不更新 footer）。
  const canPreorderNextDay=isSoldOutFlag && !!canNextDay && soldOutReason!=='mode_closed';
  const preorderInfo=p.line_preorder||{hasPreorder:false};
  const preorderFullBlocked=canPreorderNextDay && preorderInfo.hasPreorder && Number(preorderInfo.remaining??0)<=0;
  if(isSoldOutFlag && !(canPreorderNextDay && !preorderFullBlocked)) return;
  const qty=cart[id]?.qty||0;
  const footer=card.querySelector('.prod-footer');if(!footer)return;
  const last=footer.lastElementChild;if(!last)return;
  if(qty>0) last.outerHTML=`<div class="qty-ctrl"><button class="minus" onclick="chgQty(${id},-1)">−</button><span class="qnum">${qty}</span><button class="plus" onclick="chgQty(${id},1)">+</button></div>`;
  else last.outerHTML=`<button class="add-btn" id="ab-${id}" onclick="addCart(${id},event)">+</button>`;
}
function updateBar(){
  const subtotal=Object.values(cart).reduce((s,{product:p,qty})=>s+(p.effective_line_price||p.price)*qty,0);
  const cnt=Object.values(cart).reduce((s,{qty})=>s+qty,0);
  document.getElementById('cartCnt').textContent=cnt;
  // fix18-05: 套用優惠折扣
  const discAmt=appliedCoupon?appliedCoupon.discount_amount:0;
  document.getElementById('cartBar').classList.toggle('hidden',cnt===0);
  // 金額明細
  const subtotalEl=document.getElementById('subtotalDisplay');
  const orderTotalEl=document.getElementById('orderTotal');
  const discRowEl=document.getElementById('discountRow');
  const discEl=document.getElementById('discountDisplay');
  if(subtotalEl) subtotalEl.textContent=`$${subtotal}`;
  if(discRowEl) discRowEl.style.display=discAmt>0?'flex':'none';
  if(discEl) discEl.textContent=`-$${discAmt}`;
  // fix18-06: 外送費納入應付金額
  const cartDelivRow=document.getElementById('cartDelivFeeRow');
  const cartDelivEl=document.getElementById('cartDelivFeeDisplay');
  const isDelivMode=currentMode==='delivery';
  const shownDelivFee=isDelivMode&&deliveryFeeCalculated?calcDeliveryFee:0;
  if(cartDelivRow) cartDelivRow.style.display=shownDelivFee>0?'flex':'none';
  if(cartDelivEl) cartDelivEl.textContent=`$${shownDelivFee}`;
  const payable=subtotal-discAmt+shownDelivFee;
  if(orderTotalEl) orderTotalEl.textContent=`$${payable}`;
  document.getElementById('cartBarTotal').textContent=`$${subtotal-discAmt}`; // bar 只顯示商品合計（外送費確認後才納入）
  // 若購物車清空，清除優惠券
  if(cnt===0&&appliedCoupon){ clearCoupon(); }
}
