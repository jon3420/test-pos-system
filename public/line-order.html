<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#06C755">
<title>LINE 點餐</title>
<style>
:root{--g:#06C755;--gd:#00A344;--bg:#f5f5f5;--card:#fff;--text:#222;--sub:#888;--bd:#eee;--shadow:0 2px 10px rgba(0,0,0,.10);--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);font-family:-apple-system,'Noto Sans TC',sans-serif;color:var(--text);min-height:100vh}
button{border:none;cursor:pointer;font-family:inherit}
img{max-width:100%;display:block}
.hdr{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;padding:20px 16px 64px}
.hdr h1{font-size:22px;font-weight:700}
.hdr-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.hdr-btn{background:rgba(255,255,255,.22);color:#fff;border:1.5px solid rgba(255,255,255,.5);padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hdr-btn:active{background:rgba(255,255,255,.35)}
.shop-card{background:#fff;border-radius:var(--r);margin:0 12px;margin-top:-52px;padding:16px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:center}
.shop-logo{width:56px;height:56px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;flex-shrink:0;overflow:hidden}
.shop-logo img{width:100%;height:100%;object-fit:cover}
.shop-info h2{font-size:17px;font-weight:700}
.shop-info p{font-size:12px;color:var(--sub);margin-top:3px}
.announce{background:#fff9e6;border-left:3px solid #f5a623;padding:8px 12px;font-size:13px;color:#7a5c00;border-radius:4px;margin:10px 12px 0;white-space:pre-line;display:none}
/* Hotfix17：商家公告中心（modal / banner 兩種顯示方式）*/
.announce-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;align-items:center;justify-content:center}
.announce-overlay.show{display:flex}
.announce-modal{background:#fff;border-radius:16px;width:80%;max-width:360px;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.announce-modal-close{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.06);color:#666;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1}
.announce-modal-body{padding:24px 20px 20px;text-align:center}
.announce-modal-body img{border-radius:10px;margin-bottom:12px;width:100%;aspect-ratio:1200/630;object-fit:cover;display:block}
.announce-modal-icon{font-size:34px;margin-bottom:8px}
.announce-modal-title{font-size:17px;font-weight:700;margin-bottom:10px;color:#222}
.announce-modal-msg{font-size:14px;color:#555;line-height:1.7;white-space:pre-line;margin-bottom:18px;text-align:left}
.announce-modal-btn{width:100%;padding:12px;background:var(--g);color:#fff;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.announce-banner{margin:10px 12px 0;border-radius:12px;overflow:hidden;position:relative;display:none}
.announce-banner-close{position:absolute;top:8px;right:10px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.08);color:#666;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.announce-banner-body{padding:14px 16px}
.announce-banner-img{width:100%;aspect-ratio:1200/630;object-fit:cover;border-radius:12px;display:block}
.announce-banner-title{font-size:15px;font-weight:700;margin-bottom:4px}
.announce-banner-msg{font-size:13px;line-height:1.6;white-space:pre-line;margin-top:4px}
.announce-banner-btn{margin-top:10px;width:100%;padding:9px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
/* fix18-10-hotfix30-A：今日服務狀態列（純資訊提示，取代舊版可點擊的外帶/外送頁籤，
   不再讓「先選模式」成為瀏覽商品的前提）*/
.service-status-bar{margin:10px 12px 0;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;line-height:1.6;background:#f8fafc;border:1px solid #e2e8f0;color:#334155}
.service-status-bar.both-open{background:#f0faf4;border:1px solid #c8e6c9}
.service-status-bar.only-takeout,.service-status-bar.only-delivery{background:#fff3e0;border:1px solid #ffe0b2}
.service-status-bar.all-closed{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.service-status-bar.cutoff{background:#fff3e0;color:#e65100;border:1px solid #ffe0b2}
.service-status-bar.mixed{background:#fff8e1;border:1px solid #ffecb3}
/* fix18-10-hotfix30-B4 第九、十點：每個模式獨立依 state 上色，不依 mode 寫死顏色。
   淺色/Dark Theme 皆需可讀，顏色本身選用對比度足夠的色階，不倚賴背景色差異。*/
.service-title{font-weight:700;margin-right:6px}
.service-mode{font-weight:700}
.service-separator{margin:0 6px;opacity:.6}
.service-open{color:#15803d}
.service-not-started{color:#d97706}
.service-cutoff{color:#ea580c}
.service-closed,.service-holiday{color:#dc2626}
.service-unavailable{color:#6b7280}
@media (prefers-color-scheme: dark){
  .service-status-bar{background:#1e293b;border-color:#334155;color:#e2e8f0}
  .service-open{color:#4ade80}
  .service-not-started{color:#fbbf24}
  .service-cutoff{color:#fb923c}
  .service-closed,.service-holiday{color:#f87171}
  .service-unavailable{color:#9ca3af}
}
/* fix18-10-hotfix30-A 第二點：購物車取餐方式改為大按鈕（單選），不用 select */
.fulfill-btns{display:flex;flex-direction:column;gap:8px}
.fulfill-btn{width:100%;min-height:48px;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:2px solid var(--bd);background:#fff;font-size:14px;font-weight:600;color:#333;text-align:left;cursor:pointer;transition:.15s}
.fulfill-btn.active{border-color:var(--g);background:#f0faf4;color:var(--gd)}
.fulfill-btn.disabled,.fulfill-btn:disabled{opacity:.5;background:#f5f5f5;color:#999;cursor:not-allowed;border-color:var(--bd)}
.fulfill-radio{font-size:18px;line-height:1;flex-shrink:0}
.fulfill-label{flex:1}
.fulfill-reason{font-size:11px;font-weight:700;color:#e65100;background:#fff3e0;padding:2px 8px;border-radius:10px;flex-shrink:0}
.fulfill-btn.disabled .fulfill-reason{color:#c62828;background:#ffebee}
/* fix18-10-hotfix30-A 第三點：購物車無共同取餐方式時，列出衝突商品清單 */
.conflict-box{display:none;margin:0 0 14px;padding:12px 14px;border-radius:10px;background:#ffebee;border:1px solid #ffcdd2}
.conflict-title{font-size:13px;font-weight:700;color:#c62828;margin-bottom:8px}
.conflict-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px dashed #ffcdd2}
.conflict-row:first-of-type{border-top:none}
.conflict-name{flex:1;font-size:13px;font-weight:600;color:#444}
.conflict-tag{font-size:11px;font-weight:700;color:#fff;background:#e65100;padding:2px 8px;border-radius:10px;flex-shrink:0}
.conflict-remove{flex-shrink:0;font-size:12px;font-weight:700;color:#c62828;background:#fff;border:1px solid #ef9a9a;border-radius:8px;padding:5px 10px;cursor:pointer}
.conflict-hint{font-size:12px;color:#8d6e63;margin-top:8px}
/* fix18-10-hotfix30-B1 第六點：預約資訊獨立區塊（只在 selectedDate 不是今天時顯示）*/
.preorder-info-box{margin:0 0 14px;padding:10px 14px;border-radius:10px;background:#eef2ff;border:1px solid #c7d2fe;font-size:13px;color:#3730a3;line-height:1.7}
.preorder-info-box .pib-title{font-weight:700;margin-bottom:4px}
/* 售完警告橫幅 */
.cutoff-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin:0 12px;font-size:13px;color:#856404;display:none}
.cat-bar{display:flex;overflow-x:auto;padding:10px 8px 4px;gap:8px;scrollbar-width:none;position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid var(--bd)}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;background:var(--bg);color:var(--sub);border:1px solid var(--bd);transition:.15s}
.cat-btn.active{background:var(--g);color:#fff;border-color:var(--g)}
.sec-title{font-size:15px;font-weight:700;padding:14px 12px 6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
.prod-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;position:relative;display:flex;flex-direction:column}
.prod-img{width:100%;height:110px;object-fit:cover;display:block;background:#f0f0f0}
.prod-ph{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#f0faf4,#dff0e7)}
.prod-body{padding:10px;flex:1;display:flex;flex-direction:column}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;color:#fff}
.badge-hot{background:#e53935}.badge-promo{background:#9c27b0}.badge-sold{background:#9e9e9e}.badge-cutoff{background:#757575}.badge-amber{background:#e65100}
/* Hotfix16 BUG-006：商品卡狀態顏色，避免全部灰色造成誤解 */
.badge-holiday{background:#c62828}.badge-soldout-today{background:#c62828}.badge-green{background:#2e7d32}.badge-orange{background:#e65100}.badge-blue{background:#1565c0}
.sold-mask.mask-green span:first-child{color:#2e7d32}.sold-mask.mask-orange span:first-child{color:#e65100}.sold-mask.mask-red span:first-child{color:#c62828}
.prod-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:3px}
.prod-spec{font-size:11px;color:var(--g);font-weight:600;margin-bottom:2px} /* fix18-10-hotfix19 */
.prod-desc{font-size:11px;color:var(--sub);margin-bottom:6px;line-height:1.4;flex:1}
.prod-price{font-size:16px;font-weight:700;color:var(--g)}
.prod-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.add-btn{width:30px;height:30px;border-radius:50%;background:var(--g);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;transition:.1s;-webkit-tap-highlight-color:transparent}
.add-btn:active{transform:scale(.9)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-ctrl button{width:26px;height:26px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
.qty-ctrl .minus{background:#f5f5f5;color:#333}
.qty-ctrl .plus{background:var(--g);color:#fff}
.qty-ctrl .qnum{font-size:14px;font-weight:700;min-width:20px;text-align:center}
.sold-mask{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;border-radius:var(--r);z-index:2}
.sold-mask span{background:#fff;color:#555;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
/* hotfix22-F 第九點：不可購買時只讓「照片」變暗，商品名稱/說明/價格維持正常顯示（不再用整卡 mask） */
.prod-img-wrap{position:relative;width:100%;height:110px;overflow:hidden}
.prod-img-wrap .prod-img,.prod-img-wrap .prod-ph{height:110px}
.prod-img-wrap.img-dimmed .prod-img{filter:brightness(.55) saturate(.7)}
.prod-img-wrap.img-dimmed .prod-ph{filter:brightness(.7) grayscale(.4)}
/* hotfix22-F 第九點：行銷標籤——左上主緞帶／右上小膠囊，最多 2 個，疊在照片上（不佔版面） */
.tag-ribbon{position:absolute;top:0;left:0;font-size:10px;font-weight:700;color:#fff;padding:4px 10px 4px 8px;border-radius:0 0 10px 0;z-index:3;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tag-ribbon-promo{background:#9c27b0}
.tag-ribbon-hot{background:#e53935}
.tag-capsule{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;color:#fff;padding:2px 8px;border-radius:10px;z-index:3;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tag-capsule.tag-ribbon-promo{background:#9c27b0}
.tag-capsule.tag-ribbon-hot{background:#e53935}
/* hotfix22-F 第九點：照片下方固定保留一排狀態標籤（休假中/今日售完/可預購），固定高度避免商品卡錯位 */
.status-row{min-height:20px;display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;margin:2px 0 4px}
/* fix18-10-hotfix19：商品卡狀態徽章固定兩排，避免三排堆疊跑版 */
.badge-row-main{display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:center;max-width:100%}
.badge-row-action{display:flex;justify-content:center;width:100%}
.prod-stock-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:4px}
.stock-zero{background:#fce8e8;color:#c62828}.stock-low{background:#fff3e0;color:#e65100}.stock-ok{background:#e8f5e9;color:#2e7d32}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--g);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;z-index:100;cursor:pointer;box-shadow:0 -2px 12px rgba(0,0,0,.18);-webkit-tap-highlight-color:transparent}
.cart-bar.hidden{display:none}
.cart-cnt{background:rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:13px;font-weight:700;min-width:28px;text-align:center}
.cart-lbl{flex:1;font-size:15px;font-weight:700}
.cart-ttl{font-size:15px;font-weight:700}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;max-height:90vh;overflow-y:auto;z-index:201;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sheet.show{transform:translateY(0)}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:#fff;z-index:1}
.sheet-hd h3{font-size:17px;font-weight:700}
.close-btn{width:30px;height:30px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:18px;color:#555;flex-shrink:0}
.ci{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd)}
.ci-name{flex:1;font-size:14px;font-weight:500}
.ci-price{font-size:13px;color:var(--sub);min-width:50px;text-align:right}
.cart-empty{text-align:center;padding:40px;color:var(--sub);font-size:15px}
.cf{padding:16px;border-top:1px solid var(--bd)}
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:#555;margin-bottom:5px;display:block}
.fl .req{color:#e53935}
.fi{width:100%;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:15px;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--g)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-btns{display:flex;gap:8px;flex-wrap:wrap}
.pay-btn{padding:8px 16px;border-radius:20px;font-size:13px;border:1.5px solid var(--bd);background:#fff;color:#555;transition:.15s;cursor:pointer}
.pay-btn.active{border-color:var(--g);background:#f0faf4;color:var(--g);font-weight:600}
.ot{display:flex;justify-content:space-between;padding:12px 0;font-size:17px;font-weight:700;border-top:1px solid var(--bd);margin-top:8px}
.sub-btn{width:100%;padding:14px;background:var(--g);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;margin-top:12px;transition:.1s;cursor:pointer}
.sub-btn:active{opacity:.88}
.sub-btn:disabled{background:#ccc;cursor:not-allowed}
.pb{padding-bottom:80px}
@keyframes fly{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.4) translate(100px,200px)}}
.fly-item{position:fixed;pointer-events:none;z-index:999;font-size:22px;animation:fly .6s ease forwards}
.loading{text-align:center;padding:60px 20px;color:var(--sub)}
.spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.success-screen{position:fixed;inset:0;background:#fff;z-index:300;display:none;flex-direction:column;align-items:center;overflow-y:auto;padding:24px 20px 40px;text-align:center}
.success-screen.show{display:flex}
.suc-icon{font-size:72px;margin-top:24px}
.suc-title{font-size:24px;font-weight:700;color:var(--g);margin-top:8px}
.suc-no{font-size:20px;font-weight:700;margin-top:4px;color:#333}
.suc-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px;margin-top:20px}
.suc-btn{padding:14px;background:var(--g);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer}
.suc-btn-outline{padding:12px;background:#fff;color:var(--g);border:2px solid var(--g);border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer}
.status-badge{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700}
.s-pending{background:#fff9c4;color:#f57f17}.s-accepted{background:#e3f2fd;color:#1565c0}
.s-preparing{background:#f3e5f5;color:#6a1b9a}.s-ready{background:#e8f5e9;color:#1b5e20}
.s-completed{background:#f5f5f5;color:#555}.s-cancelled{background:#fce8e8;color:#b71c1c}
.order-card{background:#fff;border-radius:var(--r);margin:10px 12px 0;padding:14px 16px;box-shadow:var(--shadow)}
.oc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.oc-no{font-size:13px;font-weight:700;color:#333}
.oc-time{font-size:12px;color:var(--sub);margin-top:2px}
.oc-summary{font-size:13px;color:#555;margin-bottom:10px;line-height:1.5}
.oc-bottom{display:flex;align-items:center;justify-content:space-between}
.oc-amount{font-size:14px;font-weight:700;color:var(--g)}
.oc-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn-detail{padding:6px 14px;border-radius:20px;background:var(--g);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.btn-reorder{padding:6px 12px;border-radius:20px;background:#fff;color:var(--g);border:1.5px solid var(--g);font-size:12px;font-weight:600;cursor:pointer}
.order-detail{padding:16px}
.od-section{background:#f8f8f8;border-radius:var(--r);padding:14px;margin-bottom:14px}
.od-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--bd)}
.od-row:last-child{border-bottom:none}
.od-label{font-size:13px;color:var(--sub);flex-shrink:0;margin-right:8px}
.od-val{font-size:13px;font-weight:600;text-align:right;word-break:break-all}
.od-total{font-size:16px;color:var(--g);font-weight:700}
.od-pickup-hint{background:#fff9e6;border-left:3px solid #f5a623;padding:10px 14px;border-radius:8px;font-size:12px;color:#7a5c00;margin-top:14px;text-align:center}
.qf-hint{font-size:12px;color:var(--sub);margin-bottom:14px;line-height:1.6;background:#f0faf4;padding:10px 12px;border-radius:8px}
.empty-hint{text-align:center;padding:50px 20px;color:var(--sub)}
.empty-hint .ei{font-size:48px;margin-bottom:12px}
.empty-hint p{font-size:14px;line-height:1.7}
.back-btn{display:flex;align-items:center;gap:4px;padding:4px 0;font-size:14px;color:var(--g);font-weight:600;cursor:pointer;background:none;border:none}
.closed-screen{text-align:center;padding:60px 24px;color:#888;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.closed-screen .ei{font-size:64px;margin-bottom:16px}
.closed-screen h2{font-size:20px;color:#444;margin-bottom:12px}

<script src="/js/analytics-attribution.js"></script>

<script>
'use strict';
// ── SaaS store_id 綁定 ──
const LINE_STORE_ID = new URLSearchParams(window.location.search).get('store_id') || 'store_001';
// hotfix22-F：購物車永久保留（不做 24 小時到期判斷）。key 加上 target=line_order，
// 與冷藏宅配（line_shipping_cart_）完全獨立，互不干擾。
const ORDER_CART_KEY = 'line_order_cart_' + LINE_STORE_ID;
// hotfix22-F 第九點：預留 Conversion Analytics 用欄位；hotfix23-A 起正式串接
// analytics_events。key 加上 store_id，避免同一瀏覽器逛多家店時 visitor/session 互相污染。
function _getVisitorId(){
  try{
    const key='line_visitor_id_'+LINE_STORE_ID;
    let v=localStorage.getItem(key);
    if(!v){ v='v_'+Date.now()+'_'+Math.random().toString(36).slice(2,10); localStorage.setItem(key,v); }
    return v;
  }catch(e){ return ''; }
}
function _getSessionId(){
  try{
    const key='line_session_id_'+LINE_STORE_ID;
    let s=sessionStorage.getItem(key);
    if(!s){ s='s_'+Date.now()+'_'+Math.random().toString(36).slice(2,10); sessionStorage.setItem(key,s); }
    return s;
  }catch(e){ return ''; }
}
// ── fix18-10-hotfix23-A：Analytics Foundation ──────────────────────────
// 購物車第一次有商品時建立 cart_id（UUID），購物車永久保留期間不變；
// 訂單成功並清空後，下一次購物車重新建立新的 cart_id。
function _getCartId(createIfMissing){
  try{
    const key='line_cart_id_'+LINE_STORE_ID;
    let c=sessionStorage.getItem(key)||localStorage.getItem(key);
    if(!c && createIfMissing){
      c='c_'+Date.now()+'_'+Math.random().toString(36).slice(2,10);
      localStorage.setItem(key,c);
    }
    return c||'';
  }catch(e){ return ''; }
}
function _resetCartId(){
  try{ localStorage.removeItem('line_cart_id_'+LINE_STORE_ID); }catch(e){}
}
// ── fix18-10-hotfix23-D：來源判斷／first-touch／last-touch 一律由共用模組
// public/js/analytics-attribution.js 負責，這裡只是 delegate，不得再各寫一套規則
// （需求文件二／三）。函式名稱保留，既有呼叫點（_trackEvent('page_view') 等）不必更動。
function _deriveSource(utmSource, referrer){
  return AnalyticsAttribution.normalizeTrafficSource({ get:(k)=> k==='utm_source'?(utmSource||''):'' }, referrer||'');
}
function _getAnalyticsContext(){
  try{ return AnalyticsAttribution.buildAnalyticsEventContext(LINE_STORE_ID); }catch(e){ return {}; }
}
// 前台一般事件追蹤：fire-and-forget，絕不阻塞下單/瀏覽流程；purchase/submit_order
// 由後端於訂單真正成立/付款真正成功時寫入，前端不送出這兩種事件。
// 同時把對應的 Meta Pixel／GA4 事件（purchase 除外）一併送出，兩邊失敗互不影響主要流程。
function _trackEvent(eventName, extra){
  try{
    const fields=_getAnalyticsContext();
    const body={
      visitor_id:_getVisitorId(), session_id:_getSessionId(),
      cart_id:_getCartId(false)||null,
      event_name:eventName,
      order_mode:currentMode,
      source:fields.source, medium:fields.medium, campaign:fields.campaign,
      referrer:fields.referrer, landing_page:fields.landing_page,
      fbclid:fields.fbclid, gclid:fields.gclid,
      metadata:fields.metadata,
      member_session:_currentMemberSession(),
      ...(extra||{}),
    };
    apiFetch('/api/analytics/events',{method:'POST',body:JSON.stringify(body)}).catch(()=>{});
  }catch(e){ /* 追蹤失敗不影響主要功能 */ }
  // purchase 不透過這裡送 Pixel／GA4（必須等後端確認成功才在結果頁單獨觸發，見送單/LINE Pay 成功處）
  if (eventName !== 'purchase') {
    try{
      const pp = (extra && extra.product_id) ? { content_ids:[String(extra.product_id)], content_type:'product' } : {};
      AnalyticsPlatforms.trackPlatformEvent(eventName, pp);
    }catch(e){}
  }
}
function _analyticsPayloadForOrder(){
  const fields=_getAnalyticsContext();
  const orderAttr=(function(){ try{ return AnalyticsAttribution.buildOrderAnalyticsContext(LINE_STORE_ID); }catch(e){ return {first_touch:null,last_touch:null}; } })();
  return {
    visitor_id:_getVisitorId(), session_id:_getSessionId(), cart_id:_getCartId(false)||null,
    source:fields.source, medium:fields.medium, campaign:fields.campaign,
    referrer:fields.referrer, landing_page:fields.landing_page, fbclid:fields.fbclid, gclid:fields.gclid,
    metadata:fields.metadata,
    first_touch:orderAttr.first_touch, last_touch:orderAttr.last_touch,
  };
}
// fix18-10-hotfix23-D：Meta Pixel／GA4 的 Purchase 只能在後端已確認訂單成立／付款成功
// 的結果頁觸發一次，用 order_number 當去重 key（localStorage 記錄「已觸發過」，避免使用者
// 重新整理成功頁或重複進入同一頁面時對同一張訂單重複計算 Purchase）。value 一律用呼叫端
// 傳入的「後端回傳金額」，這個函式本身不重新計算金額。
function _firePurchaseOnce(orderNumber, orderTotal, itemsForPixel){
  try{
    if(!orderNumber) return;
    const dedupKey='analytics_purchase_fired_'+LINE_STORE_ID+'_'+orderNumber;
    if(localStorage.getItem(dedupKey)) return;
    localStorage.setItem(dedupKey,'1');
    const contentIds=(itemsForPixel||[]).map(it=>String(it.product_id||it.id||'')).filter(Boolean);
    const ga4Items=(itemsForPixel||[]).map(it=>({
      item_id:String(it.product_id||it.id||''), item_name:it.name||'', price:Number(it.price||0), quantity:Number(it.qty||1),
    }));
    AnalyticsPlatforms.trackPlatformEvent('purchase', {
      transaction_id: orderNumber,
      eventId: orderNumber,
      value: Number(orderTotal||0),
      currency:'TWD',
      content_ids: contentIds,
      content_type:'product',
      items: ga4Items,
    });
  }catch(e){ /* Pixel/GA4 失敗不影響訂單，訂單本身已經成立 */ }
}
// fix18-10-hotfix23-A：加入購物車時若尚未有 cart_id（購物車原本是空的），先建立一個；
// 移除商品降到 0 時記錄 remove_from_cart。quantity 帶「這次異動」的數量，不是購物車總量。
function _trackAddToCart(id, qtyDelta){
  _getCartId(true); // 確保購物車已有 cart_id
  _trackEvent('add_to_cart',{product_id:Number(id), quantity:Math.max(1,Number(qtyDelta)||1)});
}

function apiFetch(url, options={}) {

// fix18-10-hotfix26-F8-B（需求文件十一）：Messenger →「到 LINE 完成結帳」的
// cart_token query string。獨立於既有 gate_enabled 設定——即使商家沒開 LINE

// fix18-10-hotfix27-CD（需求文件五）：LIFF Checkout 判斷條件明確化——

function _getCheckoutParamsFromUrl(){
  try{

// 舊名稱保留（其他地方可能還在呼叫），內部改呼叫新函式，行為不變但邏輯集中一處。
function _getCartTokenFromUrl(){ return _getCheckoutParamsFromUrl().cartToken || ''; }
async function _initLineMemberGateFromShopData(d){
  _lineMemberGateConfig=_buildLineMemberGateConfig(d);

    // 需求文件七：store_id 不一致（理論上不該發生，因為 LIFF Endpoint 固定
    // 指向這支頁面、store_id 是 Bot 回覆時原樣帶入的），保守起見視同失效連結，

  if(_lineMemberGateConfig.gate_mode==='disabled' && !cartToken) return;
  if(!_lineMemberGateConfig.liff_id){
    if(cartToken) toast('商家尚未完成 LINE 結帳設定，請聯絡店家');

  let gateState=null;
  try{ gateState=await LineMemberGate.initLineMemberGate({ store_id:LINE_STORE_ID, liff_id:_lineMemberGateConfig.liff_id }, _gateIds(), _trackEvent); }catch(e){ return; }
  if(_lineMemberGateConfig.gate_enabled && _lineMemberGateConfig.gate_mode==='entry'){
    LineMemberGate.requireMemberOnEntry(LINE_STORE_ID, _lineMemberGateConfig, _gateIds(), _trackEvent);
  }
  // fix18-10-hotfix25：checkout 模式下，若剛從 LINE 登入導回並自動完成驗證，

  const cbResult=gateState&&gateState.loginCallbackResult;

// fix18-10-hotfix26-F8-B（需求文件十一～十四）：LIFF Restore 流程。
// LIFF init → 取得 UID（透過既有 member_session，見 _currentMemberSession）
// → 呼叫 restore API → 還原購物車 → 重新計算價格（後端已做，見 restore API）
// → 確認好友狀態 → 進入結帳畫面。
async function _restoreCartFromHandoffToken(cartToken){
  document.getElementById('loading').style.display='flex';
  try{
    let memberSession=_currentMemberSession();
    // 剛登入完成時 session 可能要等 initLineMemberGate 內部流程真正落地，
    // 這裡等一輪 microtask 再讀一次，不做無限重試（LIFF 沒登入成功就是沒有）。
    if(!memberSession){ await new Promise(r=>setTimeout(r,300)); memberSession=_currentMemberSession(); }
    if(!memberSession){
      toast('請先完成 LINE 登入後再繼續結帳');
      return;
    }
    // 需求文件十七：LIFF 已成功開啟並取得登入狀態，準備呼叫 restore API。
    _trackEvent('line_checkout_liff_opened');
    const res=await apiFetch('/api/line-checkout-handoff/restore',{
      method:'POST', body:JSON.stringify({ cart_token:cartToken, member_session:memberSession })
    }).then(r=>r.json());

    if(!res.ok){
      const msgMap={
        session_invalid:'尚未登入或登入已過期，請重新透過 LINE 開啟結帳連結。',
        expired:'此結帳連結已失效，請返回點餐頁重新操作。',
        consumed:'此結帳連結已失效，請返回點餐頁重新操作。',
        cancelled:'此結帳連結已失效，請返回點餐頁重新操作。',
        uid_mismatch:'此結帳連結已失效，請返回點餐頁重新操作。',
        not_found:'此結帳連結已失效，請返回點餐頁重新操作。',
      };
      _showCheckoutHandoffFailure(msgMap[res.reason]||res.message||'此結帳連結已失效，請返回點餐頁重新操作。');
      return;
    }

    // 需求文件十三：還原購物車內容——寫回既有 ORDER_CART_KEY 格式，交給既有、
    // 千錘百鍊的 restoreCart()（商品存在性/價格一律用最新 allProducts 重新查找、
    // 日期時段/付款方式/顧客資料還原邏輯全部沿用），不重寫第二套還原邏輯。
    const cartQtyMap={};
    (res.cart.items||[]).forEach(it=>{ cartQtyMap[it.product_id]=it.qty; });
    const cc=res.checkout_context||{};
    let _existingCreatedAt=null;
    try{ const _prev=JSON.parse(localStorage.getItem(ORDER_CART_KEY)||'null'); _existingCreatedAt=_prev?.cart_created_at||null; }catch(e){}
    const cartData={
      version:1, store_id:LINE_STORE_ID,
      session_id:_getSessionId(), visitor_id:_getVisitorId(),
      cart_created_at:_existingCreatedAt||Date.now(), cart_updated_at:Date.now(),
      cart:cartQtyMap,
      order_mode:(cc.order_type==='delivery'?'delivery':'takeout'),
      customer:{
        name:cc.customer_name||'', phone:cc.customer_phone||'',
        delivery_address:cc.delivery_address||'', delivery_address_note:cc.delivery_note||'',
      },
      coupon_code:cc.coupon_code||'',
      pickup_date:cc.pickup_date||'', pickup_time:cc.pickup_time||'',
      payment_method:cc.payment_method||'', order_note:'',
    };
    localStorage.setItem(ORDER_CART_KEY, JSON.stringify(cartData));
    await restoreCart();
    _activeCartHandoffToken=cartToken;

    if(res.has_unavailable_items){
      toast('部分商品資訊已更新，請確認最新內容後再結帳。');
    }

    // 需求文件十四：好友要求流程——getFriendship() → false 時 requestFriendship()
    // → 不支援時 fallback add_friend_url → 重新確認。沿用既有 ensureFriendRequirement，
    // 與一般送單流程用同一套 Gate，不重寫。
    if(_lineMemberGateConfig && (_lineMemberGateConfig.require_friend||_lineMemberGateConfig.require_follow)){
      try{ await LineMemberGate.ensureFriendRequirement(LINE_STORE_ID, _lineMemberGateConfig, _gateIds(), _trackEvent); }catch(e){}
    }

    // 清掉網址上的 cart_token，避免重整頁面重複觸發 restore／被誤分享
    try{
      const cleanUrl=new URL(window.location.href);
      cleanUrl.searchParams.delete('cart_token');
      window.history.replaceState({}, '', cleanUrl.toString());
    }catch(e){}

    openCartSheet();
    toast('購物車已成功還原，請確認內容後完成結帳。');
  } finally {
    document.getElementById('loading').style.display='none';
  }
}

// fix18-10-hotfix30-A：單一商品入口 × 結帳選擇外帶外送
// 商品可購買判斷不得只看 currentMode（否則「今日外帶截止/外送仍開」時，
// 只要 currentMode 停留在外帶，畫面就會誤判全部商品都不可買）。
// 一律同時計算 takeout / delivery 兩種模式的可購買狀態，供商品卡與
// 加入購物車使用「任一模式可買即可買」的規則；currentMode 只用於
// 購物車結帳時「目前選擇要用哪個模式送單」，不再是瀏覽/加入購物車的前提。
// ══════════════════════════════════════════════════════════════════════
function _productModeStatus(p, mode){
  // fix18-10-hotfix30-B3 root cause fix：商品模式交集只能處理「商品是否支援外帶/外送」，
  // 不得把「店家現在不能立即下單，但可預約（今天稍後或明天）」誤判成模式關閉。
  // 這裡改用 .selectable（= canOrderNow || canPreorder），不再只看 .enabled（= canOrderNow）。
  const fs = getFulfillmentStatus(mode);
  const storeSelectable = fs.selectable;
  const soldOutReason = mode==='delivery' ? p.delivery_sold_out_reason : p.takeout_sold_out_reason;
  const canNextDay = mode==='delivery' ? p.delivery_can_next_day : p.takeout_can_next_day;
  const ss=p.sale_status||'available';
  if(!storeSelectable) return {enabled:false, reason:'mode_closed', canNextDay:false};
  if(ss!=='available') return {enabled:false, reason: ss==='paused'?'paused':'sold_out_today', canNextDay:false};
  if(soldOutReason){
    if(canNextDay) return {enabled:true, reason:soldOutReason, canNextDay:true};
    return {enabled:false, reason:soldOutReason, canNextDay:false};
  }
  if(Number(p.line_sold_out)===1){
    if(canNextDay) return {enabled:true, reason:'real_sold_out', canNextDay:true};
    return {enabled:false, reason:'real_sold_out', canNextDay:false};
  }
  // fix18-10-hotfix30-B3：店家現在不能立即下單、只能預約時，商品本身沒有其他售完原因的話
  // 仍視為可加入購物車，並標記 preorderOnly 供商品卡顯示「可預約」而不是「今日不可購買」。
  return {enabled:true, reason:null, canNextDay:false, preorderOnly:!fs.canOrderNow};
}
// getProductAvailableModes(product) → { takeout:{enabled,reason}, delivery:{enabled,reason} }
// fix18-10-hotfix30-B1 第廿四點：安全布林解析（Boolean("0")===true 是陷阱，不得使用）。
function toBooleanFlag(value, defaultValue){
  if(value===true || value===1 || value==='1' || value==='true') return true;
  if(value===false || value===0 || value==='0' || value==='false') return false;
  return defaultValue;
}

// fix18-10-hotfix30-B1 第十三點：後端 reason code → 中文文案，唯一對照表。
// 不得讓「今日服務」「商品卡」「購物車」各自寫一套不同的中文字串。
function getFulfillmentReasonLabel(reason){
  const MAP={
    global_disabled: '今日未開放',
    special_schedule_disabled: '今日未開放',
    calendar_mode_disabled: '今日未開放',
    no_schedule: '今日未開放',
    before_start: '尚未開始',
    after_cutoff: '今日已截止',
    business_calendar_closed: '今日未營業',
    product_mode_disabled: '商品不支援',
    sold_out: '今日售完',
    future_date: '可預約',
  };
  return MAP[reason] || null;
}
// state → 文案（需求文件第四點，唯一對照表；不得在別處另外硬編碼中文字串）
const FULFILLMENT_STATE_LABEL={
  today_not_open: '今日未開放',
  holiday: '今日未營業',
  not_started: '尚未開始',
  cutoff: '今日已截止',
  open: '開放中',
  preorder_available: '可預約',
  sold_out: '今日售完',
  unavailable: '目前不可使用',
};

// fix18-10-hotfix30-B1 第二點：單一狀態解析器（前端版本）。今日服務列／商品卡／購物車
// 取餐方式按鈕全部改用這個函式取得「今天」的狀態文字，不得各自拼狀態或各自算 Date。
// 資料來源是後端 GET /shop 回傳、已由 resolveFulfillmentState() 統一計算好的
// takeout_status/delivery_status（含 Business Calendar／全域開關／排班／截止時間），
// 這裡只是把後端已算好的結果轉成需求文件指定的介面格式，不重新計算時間比較。
function getFulfillmentStatus(mode, options){
  const src = mode==='delivery' ? (shopData.delivery_status||{}) : (shopData.takeout_status||{});
  const state = src.today_state || (toBooleanFlag(src.today_open, !!src.enabled) ? 'open' : 'today_not_open');
  const reason = src.today_reason!==undefined ? src.today_reason : null;
  const canOrderNow = toBooleanFlag(src.today_open, !!src.enabled);
  const label = src.today_label || FULFILLMENT_STATE_LABEL[state] || '目前不可使用';
  const source = src.schedule_source || null; // 'business_calendar' | 'weekly_schedule' | null

  // ══════════════════════════════════════════════════════════════════
  // fix18-10-hotfix30-B3：能力三分——不再只用單一 enabled 布林值判斷「這個模式能不能用」。
  //   canOrderNow          現在能否立即下單（= 舊版 enabled，語意不變，service bar/gate 沿用）
  //   canScheduleToday     今天稍後是否可預約（state==='not_started' 且今天還有剩餘時段；
  //                        不受「允許明日預購」開關影響——這是「今天」本身的排班，見補充修正）
  //   canPreorderFutureDays 明天／未來日期是否可預約（依賴 allow_next_day 且確實有可預約日期）
  //   canPreorder          canScheduleToday || canPreorderFutureDays（綜合旗標，供舊呼叫端相容）
  //   selectable           canOrderNow || canPreorder（購物車取餐方式是否可選的唯一依據）
  // 資料全部沿用既有欄位，不新增後端欄位：
  //   src.earliest_today（今日最早可選時段分鐘數，getEarliestMins() 已算好，今日已無時段時為 null）
  //   src.allow_next_day（既有欄位，「允許明日預購」開關）
  //   shopData.takeout_next_dates / delivery_next_dates（既有欄位，Business-Calendar-aware
  //   的未來可預約日期清單，從明天起算，見 routes/line-orders.js nextAvailableDates()）
  // ══════════════════════════════════════════════════════════════════
  const allowNextDay = !!src.allow_next_day;
  const nextDatesArr = mode==='delivery' ? (shopData.delivery_next_dates||[]) : (shopData.takeout_next_dates||[]);
  const nextAvailableDate = nextDatesArr.length ? nextDatesArr[0] : null;
  const canPreorderFutureDays = allowNextDay && !!nextAvailableDate;
  // 「今天稍後可預約」只在 state==='not_started' 時才有意義（open 代表已經能立即下單，
  // cutoff/holiday/today_not_open 代表今天不會再有時段），且必須今日確實還有剩餘時段
  // （src.earliest_today !== null/undefined，null 代表 getEarliestMins() 判斷今日已無時段）。
  const canScheduleToday = state==='not_started' && src.earliest_today!=null;
  const canPreorder = canScheduleToday || canPreorderFutureDays;
  const selectable = canOrderNow || canPreorder;

  // fix18-10-hotfix30-B3 第五、八點：購物車按鈕文案需要跟「今日服務列」分開——
  // #serviceStatusBar 永遠只顯示 today_label（例如「尚未開始」），不得因為可預約就改寫；
  // 購物車按鈕在可預約時要改顯示「今日可預約」/「可預約」，兩者是不同用途的文字，
  // 所以另開一個 cartLabel 欄位，不覆蓋原本的 label/shortLabel。
  let cartLabel = label;
  if(!canOrderNow && canPreorder){
    cartLabel = canScheduleToday ? '今日可預約' : '可預約';
  }

  const result = {
    mode,
    state,
    reason,
    enabled: canOrderNow, // 保留舊欄位名稱與語意（= canOrderNow），避免影響既有呼叫端
    canOrderNow,
    canScheduleToday,
    canPreorderFutureDays,
    canPreorder,
    selectable,
    nextAvailableDate,
    startTime: src.today_start_time || null,
    cutoffTime: src.today_cutoff_time || null,
    // fix18-10-hotfix30-B5：holidaySource 只在 state==='holiday' 時有意義，供區分
    // 「今日臨時休息」（today_closed）與「今日公休日」（calendar/weekly/specific），
    // 不影響既有狀態判斷本身。
    holidaySource: src.today_holiday_source || null,
    label,
    shortLabel: label,
    cartLabel,
  };
  // debug 只在 window.__FULFILLMENT_DEBUG__===true 時輸出，正式版預設 false，不影響效能。
  if(window.__FULFILLMENT_DEBUG__===true){
    console.debug('[Fulfillment]', {
      mode, state, reason,
      source,
      specialSchedule: source==='business_calendar',
      businessCalendar: source==='business_calendar',
      globalEnabled: !!src.enabled,
      canOrderNow, canScheduleToday, canPreorderFutureDays, canPreorder, selectable,
      nextAvailableDate,
      startTime: result.startTime,
      cutoffTime: result.cutoffTime,
    });
  }
  return result;
}

// fix18-10-hotfix30-B2 第二、四、五點：首頁停業 Gate 單一評估函式。
// 不得只判斷 takeout.enabled||delivery.enabled——not_started 的 enabled 雖然是 false，
// 但代表「今天稍後仍會營業」，不是「今日無服務」，兩者語意不同，必須分開判斷。
// shopRequestSucceeded=false（API 失敗/JSON 解析失敗/缺欄位）時，一律回傳 blockType='api_error'，
// 絕不偽裝成「今日停業」。
function evaluateHomepageFulfillmentGate(shopRequestSucceeded){
  const toStatus = shopRequestSucceeded ? getFulfillmentStatus('takeout')  : null;
  const dlStatus = shopRequestSucceeded ? getFulfillmentStatus('delivery') : null;
  let shouldBlock, reason, blockType;

  if(!shopRequestSucceeded || !shopData || !shopData.takeout_status || !shopData.delivery_status){
    shouldBlock = true; reason = 'api_error'; blockType = 'api_error';
  } else {
    // 需求文件第一項：狀態矩陣，且今天不能立即下單／不能今天稍後預約時，
    // 不得直接整頁擋住——只要還有任何未來可預約日期（canPreorderFutureDays），
    // 就必須讓使用者正常進入商品頁，只在上方提示「今日公休／今日臨時休息，可預約其他
    // 營業日」，改由 buildDateSelector() 既有的 _skipToday 邏輯自動跳到下一個可預約日期
    // （canOrderNow=false 且 canScheduleToday=false 時已經會跳過今天，見 Hotfix30-B3）。
    // 只有在「連未來日期都完全不能預約」時，才允許 showClosed() 整頁擋住。
    const OK_STATES = ['open','not_started'];
    const todayHasService = OK_STATES.includes(toStatus.state) || OK_STATES.includes(dlStatus.state);
    const canPreorderAnyFutureDay = toStatus.canPreorderFutureDays || dlStatus.canPreorderFutureDays;
    if(todayHasService){
      shouldBlock=false; reason='has_service_today'; blockType=null;
    } else if(toStatus.state==='cutoff' && dlStatus.state==='cutoff'){
      shouldBlock=false; reason='cutoff_both'; blockType='cutoff_both';
    } else if(canPreorderAnyFutureDay){
      // 今天完全不能下單（holiday／today_not_open／混合），但明天以後仍可預約——
      // 不得 showClosed()，正常進入商品頁，只顯示提示 banner。
      shouldBlock=false;
      reason='no_service_today_but_preorderable';
      const bothHoliday = toStatus.state==='holiday' && dlStatus.state==='holiday';
      blockType = bothHoliday ? 'holiday_preorder' : 'today_not_open_preorder';
    } else if(toStatus.state==='holiday' && dlStatus.state==='holiday'){
      shouldBlock=true; reason='holiday_both_no_preorder'; blockType='holiday';
    } else {
      // today_not_open + today_not_open，或其他「兩者皆非 open/not_started」的混合組合
      // （例如 cutoff+holiday、cutoff+today_not_open），且完全沒有可預約的未來日期，
      // 才視為「今日暫停接單」整頁擋住。
      shouldBlock=true; reason='no_service_today_no_preorder'; blockType='today_not_open';
    }
  }

  const result = {
    shouldBlock, reason, blockType,
    takeout: toStatus, delivery: dlStatus,
    storeId: LINE_STORE_ID,
    apiStoreId: (shopData && shopData.store_id) || null,
    buildVersion: (shopData && shopData.build_version) || null,
    shopRequestSucceeded,
  };
  if(window.__FULFILLMENT_DEBUG__===true){
    console.debug('[Homepage Gate]', {
      storeId: LINE_STORE_ID,
      buildVersion: (shopData && shopData.build_version) || null,
      shopRequestSucceeded,
      takeoutStatusRaw: shopData && shopData.takeout_status,
      deliveryStatusRaw: shopData && shopData.delivery_status,
      takeoutResolved: toStatus,
      deliveryResolved: dlStatus,
      shouldBlock, reason,
    });
  }
  return result;
}

// fix18-10-hotfix30-B5 第二、三項：今天完全不能下單、但仍可預約未來日期時的提示文案。
// 依 holidaySource 區分「今日臨時休息」（today_closed）與「今日公休日」（calendar/weekly/
// specific），today_not_open 則顯示「今日暫停接單」但可預約的說法。與 #serviceStatusBar
// （永遠只描述今天真實狀態，不得因可預約而改寫）完全分開，不混用同一個元素。
function renderHolidayPreorderBanner(gate){
  const el=document.getElementById('holidayPreorderBanner');
  if(!el) return;
  if(!gate || (gate.blockType!=='holiday_preorder' && gate.blockType!=='today_not_open_preorder')){
    el.style.display='none'; el.innerHTML=''; return;
  }
  let title;
  if(gate.blockType==='holiday_preorder'){
    const src = (gate.takeout && gate.takeout.holidaySource) || (gate.delivery && gate.delivery.holidaySource);
    title = src==='today_closed' ? '📅 今日臨時休息' : '📅 今日公休日';
  } else {
    title = '📢 今日暫停接單';
  }
  el.style.display='block';
  el.innerHTML = `${esc(title)}<br><span style="font-weight:400;font-size:12px">今天無法下單，可預約其他營業日，商品可正常瀏覽與加入購物車。</span>`;
}

function getProductAvailableModes(p){
  return { takeout:_productModeStatus(p,'takeout'), delivery:_productModeStatus(p,'delivery') };
}
// 挑一個「用來顯示狀態文字」的代表模式：currentMode 若可買就用它，否則用另一個可買的模式，
// 兩者都不可買時，仍用 currentMode 的原因文字（兩模式都不可買時文案會統一改成「今日不可購買」）。
function _representativeMode(avail){
  if(avail[currentMode]?.enabled) return currentMode;
  const other = currentMode==='delivery' ? 'takeout' : 'delivery';
  if(avail[other]?.enabled) return other;
  return currentMode;
}
// getCartAvailableModes() → 購物車內所有商品可用模式的交集
function getCartAvailableModes(){
  const items=Object.values(cart);
  const result={ takeout:true, delivery:true, reasons:{ takeout:[], delivery:[] } };
  items.forEach(({product:p})=>{
    const avail=getProductAvailableModes(p);
    ['takeout','delivery'].forEach(m=>{
      if(!avail[m].enabled){
        result[m]=false;
        result.reasons[m].push({ product_id:p.id, product_name:p.effective_line_name||p.name, reason:avail[m].reason });
      }
    });
  });
  return result;
}
// fix18-10-hotfix30-A 第三點：購物車內商品沒有共同取餐方式時，明確列出「哪些商品造成
// 衝突、各自僅支援哪個模式」，不是只禁止送單。兩種模式都不可用時（含店家整店關閉）
// 也走這裡，統一用「該商品在兩個模式各自的可購買狀態」判斷要不要出現在清單。
function renderModeConflict(show){
  const box=document.getElementById('modeConflictBox');
  if(!box) return;
  if(!show){ box.style.display='none'; box.innerHTML=''; return; }
  const rows=Object.values(cart).map(({product:p})=>{
    const avail=getProductAvailableModes(p);
    const onlyTakeout = avail.takeout.enabled && !avail.delivery.enabled;
    const onlyDelivery = avail.delivery.enabled && !avail.takeout.enabled;
    const bothBlocked = !avail.takeout.enabled && !avail.delivery.enabled;
    let tag=null;
    if(onlyTakeout) tag='僅外帶';
    else if(onlyDelivery) tag='僅外送';
    else if(bothBlocked) tag='今日不可購買';
    if(!tag) return null;
    return { id:p.id, name:p.effective_line_name||p.name, tag };
  }).filter(Boolean);
  if(!rows.length){ box.style.display='none'; box.innerHTML=''; return; }
  box.style.display='block';
  box.innerHTML = `<div class="conflict-title">⚠️ 購物車內商品沒有共同的取餐方式</div>`
    + rows.map(r=>`<div class="conflict-row"><span class="conflict-name">${esc(r.name)}</span><span class="conflict-tag">${esc(r.tag)}</span><button type="button" class="conflict-remove" onclick="removeCartItem(${r.id})">移除</button></div>`).join('')
    + `<div class="conflict-hint">請移除其中一項商品，購物車才能選擇取餐方式並送出訂單。</div>`;
}
// fix18-10-hotfix30-A 第五點：Analytics — mode_conflict（供 Dashboard 分析購物車衝突原因），
// 同一衝突組合（同一批受影響商品 + 原因）只送一次，避免每次開購物車都重複觸發。
let _lastModeConflictKey='';
function _trackModeConflict(cartModes){
  try{
    const affected=Object.values(cart).map(({product:p})=>{
      const avail=getProductAvailableModes(p);
      return { product_id:p.id, product_name:p.effective_line_name||p.name, takeout:avail.takeout.enabled, delivery:avail.delivery.enabled };
    });
    const bothStoreClosed = !takeoutEnabled && !deliveryEnabled;
    const reason = bothStoreClosed ? 'store_closed_both' : 'product_incompatible';
    const key = reason+'|'+_getCartId(false)+'|'+JSON.stringify(affected.map(a=>a.product_id).sort());
    if(key===_lastModeConflictKey) return;
    _lastModeConflictKey=key;
    _trackEvent('mode_conflict',{ cart_id:_getCartId(false), reason, affected_products:affected });
  }catch(e){ /* 追蹤失敗不影響購物車功能 */ }
}
// fix18-10-hotfix30-A 第三點：從衝突清單直接移除該商品
function removeCartItem(id){
  if(!cart[id]) return;
  const qty=cart[id].qty;
  _trackRemoveFromCart(id, qty);
  delete cart[id]; preorderRequiredIds.delete(Number(id));
  updateBar(); updateProductCard(id);
  reconcileFulfillmentMode();
  if(document.getElementById('cartSheet')?.classList.contains('show')) renderCartItems();
  persistCart();
}
// fix18-10-hotfix30-A：購物車開啟／內容變動時呼叫，依「店家模式開關 × 購物車商品相容性」
// 交集後的結果，決定是否需要提示或自動切換 currentMode。
// 規則（需求文件第七、九點）：
//   - 只剩一種模式可用 → 自動切換並明確提示（不靜默切換）
//   - 兩種都可用 → 尊重使用者已選（或保留的）模式，不主動變更
//   - 兩種都不可用 → 停用送出訂單，列出衝突商品清單（不是只禁止送單）
function reconcileFulfillmentMode(opts){
  const silent = !!(opts && opts.silent);
  const cartModes=getCartAvailableModes();
  // fix18-10-hotfix30-B1 第八點：不要自己重新判斷 today_open，統一呼叫 getFulfillmentStatus()。
  // 演算法本身（combined = 店家今天是否開放 AND 購物車商品是否相容）完全不變。
  const toStatus=getFulfillmentStatus('takeout');
  const dlStatus=getFulfillmentStatus('delivery');
  // fix18-10-hotfix30-B3 root cause fix：combined 的店家層級判斷改用 .selectable
  // （= canOrderNow || canPreorder），不再只看 .enabled（= canOrderNow）。not_started 但
  // 可預約時，.enabled 是 false，若沿用舊版會被誤判成「無法使用」，購物車模式交集演算法
  // 本身（下面的 cartModes 計算、自動切換提示邏輯）完全不變。
  const combined={
    takeout: toStatus.selectable && cartModes.takeout,
    delivery: dlStatus.selectable && cartModes.delivery
  };
  const banner=document.getElementById('modeUnavailableBanner');
  const subBtn=document.getElementById('subBtn');
  if(!combined.takeout && !combined.delivery){
    renderModeConflict(true);
    if(banner){ banner.style.display='block'; banner.textContent='🔴 目前沒有可使用的取餐方式，請參考下方衝突商品清單調整購物車。'; }
    if(subBtn){ subBtn.disabled=true; subBtn.textContent='目前無法送出訂單'; }
    _trackEvent('fulfillment_method_unavailable',{ cart_id:_getCartId(false) });
    _trackModeConflict(cartModes);
    buildFulfillmentOptions();
    return;
  }
  renderModeConflict(false);
  if(!combined[currentMode]){
    const toMode = combined.takeout ? 'takeout' : 'delivery';
    const fromMode = currentMode;
    // fix18-10-hotfix30-B4 第四點：不得在這裡各自零散修改地址/日期/時段，改用
    // applyFulfillmentMode() 的安全子流程（save→switch→restore），確保這條「自動切換」
    // 路徑與使用者手動切換（selectFulfillmentMode()）共用同一套表單狀態隔離機制。
    saveCurrentModeFormState(fromMode);
    currentMode = toMode;
    restoreModeFormState(toMode);
    const oType=document.getElementById('oType'); if(oType) oType.value=toMode;
    if(!silent){
      const reasonIsStoreClosed = fromMode==='takeout' ? !toStatus.selectable : !dlStatus.selectable;
      const msg = reasonIsStoreClosed
        ? `今日${fromMode==='takeout'?'外帶':'外送'}未開放，已為您改為${toMode==='takeout'?'外帶':'外送'}。`
        : `購物車內部分商品不支援${fromMode==='takeout'?'外帶':'外送'}，已為您改為${toMode==='takeout'?'外帶':'外送'}。`;
      toast(msg);
    }
    _trackEvent('fulfillment_method_auto_switched',{ from_mode:fromMode, to_mode:toMode, reason: !toStatus.selectable||!dlStatus.selectable?'mode_closed':'product_incompatible', cart_id:_getCartId(false) });
    renderFulfillmentMode(toMode);
    if(typeof refreshDateSelectorForCart==='function') refreshDateSelectorForCart();
    persistCart();
  }
  if(banner) banner.style.display='none';
  if(subBtn && subBtn.textContent==='目前無法送出訂單'){ subBtn.disabled=false; subBtn.textContent='確認送出訂單'; }
  buildFulfillmentOptions();
}

// fix18-06: 外送地址與費用狀態
let mapsAutocomplete = null;
let deliveryLatLng = { lat: null, lng: null };
let calcDeliveryFee = 0;  // 後端核准的外送費
let deliveryFeeCalculated = false;  // 是否已成功取得外送費
// fix18-10-hotfix30-B4 第九、十點：免運提示需要「原因」，不是只顯示「免運 🎉」。
// 沿用既有後端 /api/delivery/calculate-fee 回傳的 raw_fee/message（已包含「滿額免運」
// 等文字），不新增外送費公式，只是把這兩個既有欄位保存下來供 UI／Context 顯示。
let _lastDeliveryRawFee = null;
let _lastFreeShippingReason = null;

// fix18-10-hotfix30-B4 第三點：外帶／外送表單狀態必須獨立保存，不得共用同一份日期/時段/
// 地址狀態。沿用既有變數（deliveryLatLng/calcDeliveryFee/deliveryFeeCalculated/
// deliveryDistKm）作為「目前正在編輯中」的即時狀態，這個物件是「切換模式時的快照」，
// 不平行新增第二套即時狀態——見 saveCurrentModeFormState()/restoreModeFormState()。
let fulfillmentFormState = {
  takeout:  { date:'', time:'' },
  delivery: { date:'', time:'', address:'', addressNote:'', lat:null, lng:null, distanceKm:null, deliveryFee:null },
};

// fix18-10-hotfix30-B4（Context 隔離補強）：單一狀態來源。fulfillmentFormState 已被多處
// 使用，這裡不平行維護第二套會失去同步的資料——.form 直接是同一個物件參照（不是複製），
// 寫入 fulfillmentContext.takeout.form.date 等同寫入 fulfillmentFormState.takeout.date。
// .availability／.ui 是本輪新增的部分，只透過 syncFulfillmentContext(mode) 寫入，
// 且該函式對每個 mode 只讀取「該 mode 自己的」getFulfillmentStatus() 與 shopData 欄位，
// 結構上就不可能讀到另一個模式的資料（沒有共用的中介變數可以誤用）。
const fulfillmentContext = {
  takeout:  { form: fulfillmentFormState.takeout,  availability: { timeslots: [] }, ui: { storeAddress:'', mapsUrl:'' } },
  delivery: { form: fulfillmentFormState.delivery, availability: { timeslots: [] }, ui: { distanceKm:null, deliveryFee:null, rawDeliveryFee:null, freeShippingReason:null, mapsUrl:'' } },
};
// fix18-10-hotfix30-B4：模式切換 race condition 防護——快速連點外帶/外送時，較慢的前一次
// timeslots 請求完成時，不得覆蓋使用者已經切到的最新模式畫面（Case AN）。
let fulfillmentRenderToken = 0;

// fix18-10-hotfix30-B4 第二點：單一模式 Context 更新入口，只從既有真實資料源讀取，
// 不得讓外帶 Context 讀到 delivery_status，反之亦然；不得共用單一 earliestToday/
// nextDates 全域值——這裡每次都是「用 mode 這個參數去查對應欄位」，沒有中間共用變數。
function syncFulfillmentContext(mode){
  const ctx = fulfillmentContext[mode]; if(!ctx) return;
  const fs = getFulfillmentStatus(mode); // 內部已經是 mode-scoped（讀 shopData.takeout_status 或 delivery_status）
  const src = mode==='delivery' ? (shopData.delivery_status||{}) : (shopData.takeout_status||{});
  const nextDatesArr = mode==='delivery' ? (shopData.delivery_next_dates||[]) : (shopData.takeout_next_dates||[]);
  // fix18-10-hotfix30-B4-RC 第十四點：timeslots 由 buildTimeSelector() 獨立寫入
  // ctx.availability.timeslots，這裡重建 availability 時必須保留，不得整個物件覆蓋掉。
  const _prevTimeslots = ctx.availability && Array.isArray(ctx.availability.timeslots) ? ctx.availability.timeslots : [];
  ctx.availability = {
    state: fs.state, reason: fs.reason, label: fs.label,
    canOrderNow: fs.canOrderNow, canScheduleToday: fs.canScheduleToday,
    canPreorderFutureDays: fs.canPreorderFutureDays, selectable: fs.selectable,
    earliestToday: src.earliest_today ?? null,
    nextDates: nextDatesArr,
    timeslots: _prevTimeslots,
  };
  if(mode==='takeout'){
    ctx.ui.storeAddress = resolvePickupAddressText();
    ctx.ui.mapsUrl = buildPickupMapsUrl();
  } else {
    ctx.ui.distanceKm = deliveryFeeCalculated ? deliveryDistKm : null;
    ctx.ui.deliveryFee = deliveryFeeCalculated ? calcDeliveryFee : null;
    ctx.ui.rawDeliveryFee = deliveryFeeCalculated ? _lastDeliveryRawFee : null;
    ctx.ui.freeShippingReason = deliveryFeeCalculated ? _lastFreeShippingReason : null;
  }
}

// 安全解析日期：避免 JS UTC midnight 時區偏移導致 getDay() 算出前一天
function parseLocalDate(ds){ const[y,m,d]=ds.split('-').map(Number); return new Date(y,m-1,d); }

function fmtD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
// YYYY-MM-DD → M/D（供營業行事曆文案顯示，如「7/5～7/8」）
function fmtMD(s){ if(!s) return ''; const p=s.split('-'); return `${Number(p[1])}/${Number(p[2])}`; }
// ── 營業行事曆：查某日是否命中（用於日期選單提示，UI 用途；實際下單仍以後端 /validate-cart 為準）──
function findBizCalEntry(ds){
  return bizCalendarList.find(e=>e.start_date<=ds && ds<=e.end_date) || null;
}
// 判斷 ds 是否為「恢復營業日」：某段 Business Calendar 店休（mode=closed）結束隔天，且 ds 本身未被其他行事曆命中
function isResumeDate(ds){
  return bizCalendarList.some(e=>{
    if(e.mode!=='closed') return false;
    const d=parseLocalDate(e.end_date); d.setDate(d.getDate()+1);
    return fmtD(d)===ds;
  });
}
// 產生日期選單的「狀態後綴」文字（含顏色 emoji），並回傳是否應停用該日期
// isWeeklyClosed：命中 line_closed_weekdays（固定公休）；isSpecificClosed：命中舊版 line_closed_dates（指定店休日）
function bizCalOptionSuffix(ds, isWeeklyClosed, isSpecificClosed, notBizDayWeekly){
  const e=findBizCalEntry(ds);
  if(e){
    if(e.mode==='closed'){
      const reasonTxt=(e.show_reason && e.reason) ? `（${e.reason}）` : '';
      return { suffix:` 🔴休假${reasonTxt}`, disabled:true };
    }
    if(e.mode==='custom_hours') return { suffix:' 🟡特殊營業', disabled:false };
    if(e.mode==='open_all_day') return { suffix:' 🟢全天營業', disabled:false };
  }
  // 沒有命中行事曆 → 完全走舊的每週公休/指定店休日/非營業日判斷
  if(isWeeklyClosed)   return { suffix:' 🔴固定公休', disabled:true };
  if(isSpecificClosed) return { suffix:' 🔴店休',     disabled:true };
  if(notBizDayWeekly)  return { suffix:' — 非營業',    disabled:true };
  if(isResumeDate(ds)) return { suffix:' 🟢恢復營業', disabled:false };
  return { suffix:'', disabled:false };
}
// 掃描一段可見日期範圍，若有連續休假（mode=closed）區間與此範圍重疊，回傳提醒文字
function bizCalRangeWarning(dateList){
  const seen=new Set();
  for(const ds of dateList){
    const e=findBizCalEntry(ds);
    if(e && e.mode==='closed' && !seen.has(e.id)){
      seen.add(e.id);
      const range=e.start_date===e.end_date ? fmtMD(e.start_date) : `${fmtMD(e.start_date)}～${fmtMD(e.end_date)}`;
      const reasonTxt=(e.show_reason && e.reason) ? e.reason : '';
      return `⚠️ ${range}${reasonTxt?(' '+reasonTxt+'休假中'):' 休假中'}`;
    }
  }
  return '';
}
function twNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function timeToMins(hhmm){const[h,m]=String(hhmm||'00:00').split(':').map(Number);return (h||0)*60+(m||0);}

// ── 初始化 ──────────────────────────────────────────────
async function init(){
  // ── LINE Pay redirect 結果處理 ──────────────────────
  const _lpP=new URLSearchParams(window.location.search);
  if(_lpP.get('linepay')==='success'){
    // hotfix22-F：LINE Pay 付款成功才是唯一清空購物車的時機之一，這裡才真正清除 localStorage
    clearCartStorage();
    document.getElementById('loading').style.display='none';
    const _lpOrderNo=_lpP.get('order')||'';
    document.getElementById('sucNo').textContent='訂單編號：'+_lpOrderNo;
    document.getElementById('sucDetail').innerHTML='<div style="color:#06C755;font-weight:700;font-size:16px;text-align:center;padding:20px">💚 LINE Pay 付款成功！訂單已建立。</div>';
    document.getElementById('successScreen').classList.add('show');
    // fix18-10-hotfix23-D：LINE Pay callback URL 只有訂單編號，沒有金額——不能用 URL
    // 上的任何數字當 Purchase value（那可以被竄改）。改用既有的 /api/line-orders/query
    // （只用 order_number 查詢，後端回傳的是訂單當下真正的 total）取得後端權威金額，
    // 才觸發 Purchase，並且用 order_number 去重，重整這個成功頁不會重複計算。
    if(_lpOrderNo){
      apiFetch('/api/line-orders/query',{method:'POST',body:JSON.stringify({order_number:_lpOrderNo})})
        .then(r=>r.json())
        .then(qr=>{
          const o=(qr&&qr.success&&qr.orders&&qr.orders[0])?qr.orders[0]:null;
          if(o) _firePurchaseOnce(_lpOrderNo, o.total, o.items||[]);
        })
        .catch(()=>{});
    }
    return;
  }
  if(_lpP.get('linepay')==='cancel'){
    // hotfix22-F：LINE Pay 取消付款，購物車必須仍保留 —— 繼續正常初始化流程，
    // 稍後 restoreCart() 會把 localStorage 內容還原回來，不做任何清除。
    setTimeout(()=>toast('LINE Pay 付款已取消，請重新選擇付款方式'),600);
  }
  if(_lpP.get('linepay')==='fail'||_lpP.get('linepay')==='error'){
    // hotfix22-F：付款失敗同樣不得清空購物車
    setTimeout(()=>toast('LINE Pay 付款失敗，請重新嘗試或選擇其他付款方式'),600);
  }
  let _shopRequestSucceeded=false;
  try{
    // fix18-10-hotfix30-B2 第七點：營業狀態不得被瀏覽器快取（避免舊的 today_open/today_state
    // 快取結果被誤用），只對這一支 API 加 cache:'no-store'，不影響商品圖片等靜態資源快取。
    const[sr,mr,bcr]=await Promise.all([
      apiFetch('/api/line-shop',{cache:'no-store'}).then(r=>r.json()),
      apiFetch('/api/line-menu').then(r=>r.json()),
      apiFetch('/api/settings/business-calendar').then(r=>r.json()).catch(()=>({success:false}))
    ]);
    bizCalendarList = (bcr && bcr.success && Array.isArray(bcr.data)) ? bcr.data : [];
    _shopRequestSucceeded = !!(sr && sr.success && sr.data);
    if(sr.success){
      shopData=sr.data;
      // fix18-10-hotfix30-B2 第一點：非敏感版本診斷欄位，供確認正式環境實際載入的版本，
      // 不得在一般畫面長期顯示，只寫入 dataset 並在 debug 模式下印出。
      try{
        document.documentElement.dataset.buildVersion = shopData.build_version || 'unknown';
        if(window.__FULFILLMENT_DEBUG__===true) console.debug('[Build Version]', shopData.build_version || 'unknown');
      }catch(e){}
      // fix18-10-hotfix30-B2 第六點：確認前台 URL 使用的 store_id 與 API 實際解析出的
      // store_id 一致；不一致時不得顯示「今日暫停接單」（那會誤導成「店家真的休息」），
      // 改顯示「店家資料載入異常」。
      if(shopData.store_id && LINE_STORE_ID && shopData.store_id!==LINE_STORE_ID){
        showSystemError('店家資料載入異常','目前頁面使用的店家資訊與伺服器回傳的不一致，請重新整理後再試。');
        return;
      }
      // fix18-10-hotfix23-D：依店家設定初始化 Meta Pixel／GA4（沒啟用或沒有 ID 時
      // AnalyticsPlatforms.init() 內部什麼都不會載入）
      try{ AnalyticsPlatforms.init(shopData); }catch(e){}
      // fix18-10-hotfix23-E：LINE 會員入口 —— 初始化 LIFF；disabled 模式下
      // liff_id 通常也未設定，initLineMemberGate 內部會安全略過，完全不影響既有流程。
      try{ _initLineMemberGateFromShopData(shopData); }catch(e){}
      // fix18-05: 依 coupon_feature_enabled 顯示/隱藏優惠券區塊
      couponFeatureEnabled = shopData.coupon_feature_enabled === true;
      const couponAreaEl = document.getElementById('couponArea');
      if(couponAreaEl) couponAreaEl.style.display = couponFeatureEnabled ? '' : 'none';
      const d=sr.data;
      document.getElementById('shopName').textContent=d.shop_name||'點餐';
      document.getElementById('shopName2').textContent=d.shop_name||'點餐';
      document.getElementById('shopAddr').textContent=d.shop_address||'';
      document.getElementById('shopHours').textContent=d.shop_hours||'';
      if(d.shop_logo)document.getElementById('logoWrap').innerHTML=`<img src="${d.shop_logo}" alt="logo">`;
      const ann=document.getElementById('announce');
      if(d.shop_announcement){ann.textContent=d.shop_announcement;ann.style.display='block';}

      // 全域 LINE 開關
      if(d.line_ordering_enabled==='0'||d.line_ordering_enabled===0){
        showClosed('🔴 LINE 點餐暫停','目前 LINE 點餐暫停營業，請稍後再試。');return;
      }

      // Hotfix16 BUG-003/004：今日休假狀態單一資料來源 = shopData.holiday_banner
      // （後端已依優先序 Business Calendar ＞ 今日臨時休息 ＞ 固定公休算好，前台不再重複判斷）
      // 不整頁擋住、不用 Modal / 遮罩 → 改為頁面內固定 Banner，客人可直接看商品/加購物車/選日期。
      const now=twNow(), todayStr=fmtD(now);
      const calToday=d.business_calendar_today||{matched:false};
      const holidayBanner=d.holiday_banner||{active:false};

      todayClosed = !!holidayBanner.active;
      // Hotfix17：商家公告中心（manual > auto_holiday > none）。
      // 若自動休假公告已產生（涵蓋 Business Calendar 休假訊息），舊版 holidayBanner 不再重複顯示。
      const announcement=d.announcement||{enabled:false,active:false,source:'none'};
      renderAnnouncement(announcement);
      if(shouldSkipHolidayBannerForAnnouncement(announcement)) hideHolidayBanner();
      else renderHolidayBanner(holidayBanner);

      // 營業行事曆：特殊營業／全天營業（不阻擋下單，僅顯示提示 banner）
      const bizBanner=document.getElementById('bizCalBanner');
      if(calToday.matched && calToday.mode==='custom_hours'){
        const parts=[];
        if(calToday.takeout_enabled && calToday.takeout_start_time) parts.push(`外帶：${calToday.takeout_start_time}～${calToday.takeout_end_time}`);
        if(calToday.delivery_enabled && calToday.delivery_start_time) parts.push(`外送：${calToday.delivery_start_time}～${calToday.delivery_end_time}`);
        bizBanner.textContent = `🟡 今日特殊營業${parts.length?('\n'+parts.join('\n')):''}`;
        bizBanner.style.display='block';
      } else if(calToday.matched && calToday.mode==='open_all_day'){
        bizBanner.textContent = '🟢 今日全天營業';
        bizBanner.style.display='block';
      } else if(bizBanner){
        bizBanner.style.display='none';
      }

      // 外帶/外送狀態
      const ts=d.takeout_status||{};
      const ds2=d.delivery_status||{};
      shopData=d; // fix18-10-hotfix30-B1：getFulfillmentStatus() 讀 shopData.takeout_status/delivery_status，
                  // 提前在這裡指定，讓下面就能直接呼叫 getFulfillmentStatus() 作為唯一入口。
      takeoutCutoffPassed  = !!ts.cutoff_passed;
      deliveryCutoffPassed = !!ds2.cutoff_passed;
      const _toStatusInit=getFulfillmentStatus('takeout');
      const _dlStatusInit=getFulfillmentStatus('delivery');
      takeoutEnabled  = _toStatusInit.enabled;
      deliveryEnabled = _dlStatusInit.enabled;

      // fix18-10-hotfix30-B2 第二、四、五點：首頁停業 Gate 改用單一評估函式，
      // not_started/cutoff 不再被誤判成「今日暫停接單」（Zeabur 正式環境回報的 bug：
      // 外帶／外送皆為「接單中」，卻仍顯示今日暫停接單——若真的重現，代表 shouldBlock
      // 判斷本身或其輸入資料有問題，這裡的 debug log 可用來現場診斷，而不是只能臆測）。
      const _gate = evaluateHomepageFulfillmentGate(_shopRequestSucceeded);
      if(_gate.shouldBlock){
        if(_gate.blockType==='holiday'){
          showClosed('🏖️ 今日未營業','店家今日公休，請至其他日期再來，或稍後查看是否恢復營業。');
        } else if(_gate.blockType==='api_error'){
          showSystemError('系統暫時無法取得營業狀態','請重新整理後再試。');
        } else {
          showClosed('⏰ 今日暫停接單','外帶與外送目前皆已關閉，請稍後再試。');
        }
        return;
      }
      // fix18-10-hotfix30-B5 第一～三項：今天完全不能下單，但至少一種模式仍可預約未來
      // 日期時，不得 showClosed()，正常進入商品頁，只在上方顯示提示 banner。
      renderHolidayPreorderBanner(_gate);

      // 決定預設模式
      // hotfix22-F 補正：若 localStorage 有保存過 order_mode，一律優先沿用該模式——
      // 即使該模式目前被店家關閉，也不得自動切回另一個開放中的模式。只有使用者自己
      // 在畫面上手動切換頁籤／下拉選單，才會更新並保存新的 order_mode（見 switchMode()/onModeChange()）。
      const _savedMode=_peekSavedOrderMode();
      if(_savedMode==='takeout' || _savedMode==='delivery'){
        currentMode=_savedMode;
        if((_savedMode==='takeout' && !takeoutEnabled) || (_savedMode==='delivery' && !deliveryEnabled)){
          modeForcedVisible=true; // 該模式目前未開放，頁籤仍需保持可見，讓使用者能看到狀態並自行切換
        }
      } else if(takeoutEnabled) currentMode='takeout';
      else if(deliveryEnabled) currentMode='delivery';
      else currentMode=_toStatusInit.enabled?'takeout':'delivery';
      // hotfix22-B：currentMode 決定後立即同步 oType（購物車表單的 select），
      // 避免任何尚未更新的程式碼路徑誤讀到 <select> 的 HTML 預設值。
      const _oTypeInit=document.getElementById('oType');
      if(_oTypeInit) _oTypeInit.value=currentMode;

      buildServiceStatusBar();
      buildPaymentButtons(d);
      buildDateSelector();
      // fix18-08: 初始化時同步外送地址顯示狀態
      updateDeliveryAddressVisibility();
  updatePickupAddressVisibility();
      updateModeAvailabilityUI();
    } else {
      // fix18-10-hotfix30-B2 第三點：GET /shop 回傳 success:false 時，先前完全沒有處理，
      // 會靜默帶著空的 shopData 繼續往下跑，畫面看起來像壞掉但沒有明確訊息。
      // 絕不能因此顯示「今日暫停接單」（那代表營業狀態確定不可用，不是資料根本沒讀到）。
      showSystemError('系統暫時無法取得營業狀態','請重新整理後再試。');
      return;
    }
    if(mr.success){categories=mr.data.categories||[];allProducts=mr.data.products||[];}
    buildCats();renderMenu();
    // hotfix22-F：還原永久保留的購物車（不設 24hr 到期），需在 allProducts/日期時段/付款方式
    // 都已建立好之後執行，才能正確重新驗證商品是否仍存在、日期時段是否仍合法。
    await restoreCart();
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    renderLastOrderCard();
    updateCutoffBanner();
    // fix18-10-hotfix23-A：page_view — 頁面初始化成功後記錄一次，同一 session 不重複
    try{
      const pvKey='line_pv_sent_'+LINE_STORE_ID;
      if(!sessionStorage.getItem(pvKey)){
        _trackEvent('page_view');
        sessionStorage.setItem(pvKey,'1');
      }
    }catch(e){}
    // 定時重新整理（每60秒）
    setInterval(refreshShopStatus, 60000);
  }catch(e){
    // fix18-10-hotfix30-B2 第三點：網路失敗／JSON 解析失敗等真正的系統錯誤，一律走
    // showSystemError()（附「重新整理」按鈕），絕不能被誤會成「今日暫停接單」。
    try{ showSystemError('系統暫時無法取得營業狀態','請重新整理後再試。'); }
    catch(e2){ document.getElementById('loading').innerHTML=`<p style="color:#e53935">載入失敗：${esc(e.message)}</p>`; }
  }
}

// ── 店休頁面（僅用於「總開關關閉」「兩模式皆關閉」等真正需要整頁擋住的情境；
//    Hotfix16 起，休假類情境一律改用頁面內 Banner（renderHolidayBanner），不再整頁擋住）──
function showClosed(title,msg){
  document.getElementById('loading').style.display='none';
  const el=document.getElementById('content');el.style.display='block';
  el.innerHTML=`<div class="closed-screen"><div class="ei">${title.split(' ')[0]}</div><h2>${title.split(' ').slice(1).join(' ')}</h2><p>${msg.replace(/\n/g,'<br>')}</p></div>`;
}
// fix18-10-hotfix30-B2 第三點：系統讀取失敗，絕對不能偽裝成「今日停業」——
// API 失敗／JSON 解析失敗／缺欄位／store_id 不一致，一律走這裡，附「重新整理」按鈕。
function showSystemError(title,msg){
  document.getElementById('loading').style.display='none';
  const el=document.getElementById('content');el.style.display='block';
  el.innerHTML=`<div class="closed-screen"><div class="ei">⚠️</div><h2>${esc(title)}</h2><p>${esc(msg).replace(/\n/g,'<br>')}</p>`
    +`<button type="button" onclick="location.reload()" style="margin-top:16px;padding:10px 24px;border-radius:10px;border:none;background:#6366f1;color:#fff;font-weight:600;font-size:14px;cursor:pointer">🔄 重新整理</button></div>`;
}

// ── 🏖️ 休假公告 Banner（Hotfix16）──────────────────────
// Hotfix16 BUG-004：不整頁擋住、不用 Modal / 遮罩 → 改為頁面內固定公告 Banner。
// 客人可直接看商品、加入購物車、選日期，完全不受阻擋；休假日期本身不可送單，由後端二次驗證把關。
// 資料來源單一：shopData.holiday_banner（/api/line-shop 已依 Business Calendar > 今日臨時休息 > 固定公休 算好）
function renderHolidayBanner(banner){
  const el=document.getElementById('holidayBanner');
  if(!el) return;
  if(!banner || !banner.active){ hideHolidayBanner(); return; }

  let bodyHtml='';
  if(banner.type==='calendar'){
    const rangeTxt = banner.start_date===banner.end_date
      ? fmtMD(banner.start_date)
      : `${fmtMD(banner.start_date)}～${fmtMD(banner.end_date)}`;
    const reasonLine = (banner.show_reason && banner.reason) ? `<div style="margin-top:2px">${esc(banner.reason)}</div>` : '';
    const resumeLine = banner.resume_within_limit
      ? `<div style="margin-top:10px;color:#2e7d32;font-weight:700">🟢 ${fmtMD(banner.resume_date)} 恢復營業</div>`
      : `<div style="margin-top:10px;color:#c62828;font-weight:700">恢復營業日超出目前可預訂範圍</div>`;
    const actionBtn = banner.resume_within_limit
      ? `<button type="button" style="margin-top:10px;width:100%;padding:10px;background:#e65100;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer" onclick="selectResumeDate('${banner.resume_date}')">立即預訂</button>`
      : '';
    bodyHtml = `
      <div style="padding:12px 14px">
        <div style="font-size:15px;font-weight:700;color:#7a3b00">🏖️ 目前休假中</div>
        <div style="margin-top:4px;color:#7a5c00">${esc(rangeTxt)}</div>
        ${reasonLine}
        <div style="margin-top:8px;font-size:13px;color:#2e7d32">✅ 可以預訂</div>
        ${resumeLine}
        ${actionBtn}
      </div>`;
  } else if(banner.type==='today_closed'){
    bodyHtml = `<div style="padding:12px 14px">
      <div style="font-size:15px;font-weight:700;color:#7a3b00">🌙 今日臨時休息</div>
      <div style="margin-top:4px;color:#7a5c00">可預訂其他營業日期</div>
    </div>`;
  } else if(banner.type==='weekly'){
    bodyHtml = `<div style="padding:12px 14px">
      <div style="font-size:15px;font-weight:700;color:#7a3b00">🌙 今日固定公休</div>
      <div style="margin-top:4px;color:#7a5c00">可預訂其他營業日期</div>
    </div>`;
  } else {
    hideHolidayBanner(); return;
  }
  el.innerHTML = bodyHtml;
  el.style.display = 'block';
}

// 「立即預訂」：捲動到商品區 → 開啟購物車 → 日期預設選到 resume_date → 載入該日可用時段
async function selectResumeDate(dateStr){
  if(!dateStr) return;
  const limit=getPreorderDaysLimit();
  const todayStr=fmtD(twNow());
  const daysAhead=Math.round((parseLocalDate(dateStr)-parseLocalDate(todayStr))/86400000);
  if(daysAhead>limit){ toast('恢復營業日超出可預約天數'); return; }

  scrollToProducts();
  openSheet('cartSheet');
  buildDateSelector(daysAhead>0); // 若 resume_date 不是今天，走 forceNextDay 範圍（明天起）
  const pDate=document.getElementById('pDate');
  if(pDate){
    const targetOpt=Array.from(pDate.options).find(o=>o.value===dateStr&&!o.disabled);
    if(targetOpt) pDate.value=dateStr;
  }
  await buildTimeSelector();
}

let currentAnnouncement=null;

function runAnnouncementAction(a){
  // 自動休假公告：直接沿用 Hotfix16 已測試過的「立即預訂」流程（含可預訂範圍檢查）

// fix18-10-hotfix22D：localStorage key 加上 target=line_order，避免未來與冷藏宅配公告（target=shipping）
// 共用同一把 key；新關閉動作一律寫新版 key，但讀取時仍相容舊版 key（避免已關閉過公告的老客人重新看到）。
function _announceDismissKey(suffix){ return `line_announcement_dismissed_${LINE_STORE_ID}_line_order_${suffix}`; }
function _announceDismissKeyLegacy(suffix){ return `line_announcement_dismissed_${LINE_STORE_ID}_${suffix}`; }
function isAnnouncementDismissed(a){
  const freq=a.frequency||'version';
  try{
    if(freq==='always') return false; // 每次都顯示，不記錄
    if(freq==='once')  return localStorage.getItem(_announceDismissKey('once'))==='1' || localStorage.getItem(_announceDismissKeyLegacy('once'))==='1';
    if(freq==='daily'){ const today=fmtD(twNow()); return localStorage.getItem(_announceDismissKey('daily'))===today || localStorage.getItem(_announceDismissKeyLegacy('daily'))===today; }
    const v=String(a.version||'1');
    return localStorage.getItem(_announceDismissKey(v))==='1' || localStorage.getItem(_announceDismissKeyLegacy(v))==='1'; // version（預設）
  }catch{ return false; }
}
function recordAnnouncementDismiss(a){
  const freq=a.frequency||'version';
  try{
    if(freq==='always') return;
    if(freq==='once'){ localStorage.setItem(_announceDismissKey('once'),'1'); return; }
    if(freq==='daily'){ localStorage.setItem(_announceDismissKey('daily'),fmtD(twNow())); return; }
    localStorage.setItem(_announceDismissKey(String(a.version||'1')),'1');
  }catch{}
}

// ── fix18-10-hotfix30-A：今日服務狀態（純資訊提示）──────────
// 不再是「必須先選才能瀏覽商品」的頁籤，只負責告知客人今日狀態；
// 只有一種模式開放時，仍先幫忙把 currentMode 設成該模式（作為購物車的預設值），
// 但不會因此隱藏或阻擋任何商品瀏覽（buildCard/addCart 已改用任一模式可買即可買）。
// fix18-10-hotfix30-B4 第九、十點：state → CSS class 對照表（不得依 mode 寫死顏色，
// 一律依 state 決定，一個模式一個 span，Dark Theme／淺色背景皆需可讀）。
function _serviceStateClass(state){
  const MAP={
    open:'service-open',
    not_started:'service-not-started',
    cutoff:'service-cutoff',
    holiday:'service-holiday',
    today_not_open:'service-closed',
    unavailable:'service-unavailable',
  };
  return MAP[state]||'service-unavailable';
}
function buildServiceStatusBar(){
  const bar=document.getElementById('serviceStatusBar');
  if(!bar) return;
  // fix18-10-hotfix30-B1 第五點：#serviceStatusBar 永遠只描述「今天」，不得依 selectedDate
  // 改變；文案一律來自 getFulfillmentStatus()，不再自行拼字串（modeLabelSuffix 不再用於此處）。
  const toStatus=getFulfillmentStatus('takeout');
  const dlStatus=getFulfillmentStatus('delivery');
  // fix18-10-hotfix30-B2 第四、五點 root cause fix：先前這裡只判斷 `!enabled`，沒有分辨
  // state，導致 not_started（今天稍後會開始營業）被誤判成跟 today_not_open/holiday 一樣的
  // 「今日暫停接單」文案（this bar 與首頁 Gate 用同一份 evaluateHomepageFulfillmentGate() 矩陣
  // 邏輯，避免兩處各自判斷又對不上；本輪只調整渲染方式為逐模式上色，判斷邏輯本身未變動）。
  bar.style.display='block';
  if(toStatus.state==='holiday' && dlStatus.state==='holiday'){
    bar.className='service-status-bar all-closed';
    bar.innerHTML=`<span class="service-title">📢 今日未營業</span>`;
    return;
  }
  const OK_STATES=['open','not_started'];
  const todayHasService = OK_STATES.includes(toStatus.state) || OK_STATES.includes(dlStatus.state);
  if(!todayHasService){
    if(toStatus.state==='cutoff' && dlStatus.state==='cutoff'){
      bar.className='service-status-bar cutoff';
      bar.innerHTML=`<span class="service-title">⏰ 今日接單已截止</span>`;
    } else {
      bar.className='service-status-bar all-closed';
      bar.innerHTML=`<span class="service-title">📢 今日暫停接單（外帶／外送皆已關閉）</span>`;
    }
    return;
  }
  // fix18-10-hotfix30-B5-R4 root cause fix：先前這裡會在「只有一種模式現在能立即下單」時
  // 主動把 currentMode 改成那個模式——但 buildServiceStatusBar() 是純顯示函式，會在每次
  // applyFulfillmentMode() 切換模式後、由 refreshModeCutoffUI() 呼叫，導致使用者才剛切到
  // 「不能立即下單、但可預約」的模式（例如外帶被特殊營業關閉，可預約明天），這裡又立刻把
  // currentMode 改回目前唯一「能立即下單」的模式（外送），使用者的明確選擇被無聲蓋掉，
  // 購物車卻仍顯示 oType.value=使用者選的模式，造成「畫面顯示外帶，但日期/時段/資料其實是
  // 外送的」表單錯位（即 Mode Isolation 的 Bug-1）。
  // 「只有一種模式開放時，預設選哪個模式」這件事，只在頁面初次載入時（init()，尚未有任何
  // 使用者操作）才需要決定一次，該邏輯已經獨立存在於 init() 自己的流程裡；「使用者操作後
  // 模式是否需要改變」則完全交給 reconcileFulfillmentMode()（有正確的 Analytics 記錄、
  // toast 提示、且只在購物車商品衝突或店家狀態改變時才動作），不得由這個純顯示函式重複、
  // 甚至互相打架地再改一次 currentMode。
  // 需求文件第五、九、十八～廿二點：一律同時顯示兩個模式各自的今日狀態文字，不得用
  // 「僅提供 X 服務」的簡化句子蓋掉另一個模式「為什麼不能用」的具體原因；
  // fix18-10-hotfix30-B4 第九、十點：每個模式獨立包 span、依 state 決定顏色 class，
  // 不是整條 bar 只有單一顏色。
  const bothNotStarted = toStatus.state==='not_started' && dlStatus.state==='not_started';
  const prefix = bothNotStarted ? '<span class="service-title">⏰ 尚未開始接單</span> ' : '';
  bar.className = 'service-status-bar ' + ((toStatus.enabled && dlStatus.enabled) ? 'both-open' : 'mixed');
  bar.innerHTML = `${prefix}<span class="service-title">今日服務</span>`
    + `<span class="service-mode ${_serviceStateClass(toStatus.state)}">🛍️ 外帶（${esc(toStatus.label)}）</span>`
    + `<span class="service-separator">・</span>`
    + `<span class="service-mode ${_serviceStateClass(dlStatus.state)}">🛵 外送（${esc(dlStatus.label)}）</span>`;
}

// ── fix18-10-hotfix26-F3/F5：外帶取餐地址（純新增，additive）─────────────
// fix18-10-hotfix26-F5：地址/座標來源改用「取餐地點與店家地址相同」優先序，
// 與後端 utils/pickupLocation.js 的 resolvePickupSettings() 同一套規則：
//   same_as_store=true  → store_address / store_lat,lng
//   same_as_store=false → pickup_address → store_address（座標同理 pickup_lat/lng → store_lat/lng）
// GET /shop 一定會回傳 boolean 的 pickup_address_same_as_store（見 routes/line-orders.js
// resolveSameAsStoreFlag()），這裡仍保留舊版 fallback 分支以防萬一 shopData 尚未載入。
function resolvePickupAddressText(){
  if(shopData && typeof shopData.pickup_address_same_as_store === 'boolean'){
    if(shopData.pickup_address_same_as_store){
      return (shopData.store_address ? String(shopData.store_address).trim() : '');
    }
    const pickupAddr=shopData.pickup_address?String(shopData.pickup_address).trim():'';
    if(pickupAddr) return pickupAddr;
    return (shopData.store_address ? String(shopData.store_address).trim() : '');
  }
  // Fallback（理論上不會發生：GET /shop 一定帶 same_as_store；保留舊版邏輯保守處理）
  const storeAddr=(shopData&&shopData.store_address)?String(shopData.store_address).trim():'';
  if(storeAddr) return storeAddr;
  const pickupAddr=(shopData&&shopData.pickup_address)?String(shopData.pickup_address).trim():'';
  if(pickupAddr) return pickupAddr;
  return '';
}
// fix18-10-hotfix26-F5：取餐說明——只有「獨立取餐地址」時才有意義，跟店家地址相同時不顯示。
function resolvePickupAddressNote(){
  if(shopData && shopData.pickup_address_same_as_store === false){
    return shopData.pickup_address_note ? String(shopData.pickup_address_note).trim() : '';
  }
  return '';
}
// 有座標優先用座標產生 Google Maps 連結（較精準）；沒有座標才 fallback 用地址搜尋。
function buildPickupMapsUrl(){
  let lat, lng;
  if(shopData && shopData.pickup_address_same_as_store === false){
    lat=parseFloat(shopData.pickup_lat); lng=parseFloat(shopData.pickup_lng);
    if(!(Number.isFinite(lat)&&Number.isFinite(lng))){
      lat=parseFloat(shopData.store_lat); lng=parseFloat(shopData.store_lng);
    }
  } else {
    lat=parseFloat(shopData&&shopData.store_lat); lng=parseFloat(shopData&&shopData.store_lng);
  }
  if(Number.isFinite(lat)&&Number.isFinite(lng)) return `https://www.google.com/maps?q=${lat},${lng}`;
  const addr=resolvePickupAddressText();
  if(!addr) return '';
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}`;
}
// 只有外帶才顯示；外送一律隱藏（需求文件 Fix1「UI 規則」）。
function updatePickupAddressVisibility(){
  const wrap=document.getElementById('pickupAddrWrap');
  const textEl=document.getElementById('pickupAddrText');
  const mapsBtn=document.getElementById('pickupMapsBtn');
  const copyBtn=document.getElementById('pickupCopyBtn');
  if(!wrap) return;
  if(currentMode!=='takeout'){
    wrap.style.display='none';
    wrap.classList.remove('visible');
    return;
  }
  wrap.style.display='';
  wrap.classList.add('visible');
  const addr=resolvePickupAddressText();
  if(textEl) textEl.textContent = addr || '請洽店家確認取餐地點';
  const mapsUrl = addr ? buildPickupMapsUrl() : '';
  if(mapsBtn){ mapsBtn.disabled=!mapsUrl; mapsBtn.style.opacity = mapsUrl ? '1' : '.5'; }
  if(copyBtn){ copyBtn.disabled=!addr; copyBtn.style.opacity = addr ? '1' : '.5'; }
}
function openPickupAddressMaps(){
  const url=buildPickupMapsUrl();
  if(!url){ toast('尚未設定取餐地址'); return; }
  window.open(url,'_blank');
}
async function copyPickupAddress(){
  const addr=resolvePickupAddressText();
  if(!addr){ toast('尚未設定取餐地址'); return; }
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      await navigator.clipboard.writeText(addr);
    }else{
      const ta=document.createElement('textarea');
      ta.value=addr; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    toast('已複製取餐地址');
  }catch(e){
    toast('複製失敗，請手動複製：'+addr);
  }
}
// fix18-10-hotfix30-B4 第三點：切換模式前，把「目前模式」的日期/時段（及外送模式的
// 地址/座標/運費）存進 fulfillmentFormState，離開外送模式時不得清空即時狀態
// （deliveryLatLng/calcDeliveryFee/deliveryFeeCalculated 只是「目前顯示中」的值，
// 真正的持久保存靠這裡）。
function saveCurrentModeFormState(mode){
  const s=fulfillmentFormState[mode]; if(!s) return;
  s.date = document.getElementById('pDate')?.value || '';
  s.time = document.getElementById('pTime')?.value || '';
  if(mode==='delivery'){

    s.addressNote = document.getElementById('deliveryAddressNote')?.value || '';
    s.lat = deliveryLatLng.lat;
    s.lng = deliveryLatLng.lng;
    s.distanceKm = deliveryFeeCalculated ? deliveryDistKm : null;
    s.deliveryFee = deliveryFeeCalculated ? calcDeliveryFee : null;
  }
}
// fix18-10-hotfix30-B4 第三、六點：切換到目標模式後，還原該模式保存的表單狀態。
// 外送地址「重新計算」距離/運費（不沿用可能過期的快取金額——購物車內容在切換模式期間
// 可能已經改變，免運門檻/運費需要重算才準確），但地址文字本身完整保留、不清空、不需要
// 使用者重新輸入。外帶不需要還原地址（取餐地址是唯讀的店家地址，見
// updatePickupAddressVisibility()），只保留日期/時段的還原交給 buildDateSelector()。
function restoreModeFormState(mode){
  if(mode==='delivery'){
    const s=fulfillmentFormState.delivery;
    const addrEl=document.getElementById('deliveryAddress');
    if(addrEl) addrEl.value = s.address || '';
    const noteEl=document.getElementById('deliveryAddressNote');
    if(noteEl) noteEl.value = s.addressNote || '';
    deliveryLatLng = { lat: s.lat||null, lng: s.lng||null };
    if(s.lat && s.lng){
      fetchDeliveryFee();
    } else {
      deliveryDistKm = 0; calcDeliveryFee = 0; deliveryFeeCalculated = false;
      const feeRow=document.getElementById('deliveryFeeRow'); if(feeRow) feeRow.style.display='none';
    }
  }
}
// fix18-10-hotfix30-B4 第二、三點：外帶／外送欄位互斥顯示＋Context 同步，統一由這裡
// 處理一次，不得讓其他函式各自判斷 currentMode 來顯示/隱藏地址相關欄位或重算 Context。

  updatePickupAddressVisibility();
}
// fix18-10-hotfix30-B4（Context 隔離補強）第三點：統一渲染入口，集中處理日期/時段以外
// 「同一組 UI」該做的事——地址區塊、Google Maps、距離、外送費、免運提示、付款方式、
// 送單可用狀態。updateDeliveryAddressVisibility()/updateModeAvailabilityUI() 等既有函式
// 保留，但只做各自單一明確子工作，最終都由這裡統一調度。
function renderFulfillmentMode(mode){
  syncFulfillmentContext(mode);
  renderModeSpecificFields();
  updateCartTotals();
  buildPaymentButtons(shopData);

function updateSubmitAvailability(){
