// ── fix18-05：優惠券相關函式 ──────────────────────────────
async function applyCoupon(){
  const code=(document.getElementById('couponInput')?.value||'').trim().toUpperCase();
  const msgEl=document.getElementById('couponMsg');
  if(!code){if(msgEl)msgEl.innerHTML='<span style="color:#e53935">請輸入優惠券代碼</span>';return;}
  // 計算目前小計
  const subtotal=Object.values(cart).reduce((s,{product:p,qty})=>s+(p.effective_line_price||p.price)*qty,0);
  if(!subtotal){if(msgEl)msgEl.innerHTML='<span style="color:#e53935">購物車是空的，無法套用優惠券</span>';return;}
  // 取得目前電話（可能尚未填寫，validate 後端允許空值但受 max_usage_per_phone 限制）
  const phone=(document.getElementById('cPhone')?.value||'').trim();
  const btn=document.getElementById('couponApplyBtn');
  if(btn){btn.disabled=true;btn.textContent='驗證中…';}
  try{
    const res=await apiFetch('/api/coupons/validate',{
      method:'POST',
      body:JSON.stringify({code,subtotal,customer_phone:phone})
    }).then(r=>r.json());
    if(res.success){
      appliedCoupon={code:res.coupon.code,discount_amount:res.discount_amount,final_total:res.final_total,coupon:res.coupon};
      if(msgEl)msgEl.innerHTML=`<span style="color:#06C755">✅ ${res.coupon.name}：折扣 -$${res.discount_amount}</span>`;
      updateBar();
      persistCart();
    }else{
      appliedCoupon=null;
      // fix18-05: 若優惠券功能被停用，隱藏整個輸入區
      if(res.error==='COUPON_FEATURE_DISABLED'){
        const area=document.getElementById('couponArea');
        if(area) area.style.display='none';
      }
      if(msgEl)msgEl.innerHTML=`<span style="color:#e53935">❌ ${res.message||'優惠券無效'}</span>`;
      updateBar();
    }
  }catch(e){
    if(msgEl)msgEl.innerHTML='<span style="color:#e53935">❌ 網路錯誤，請稍後再試</span>';
  }finally{
    if(btn){btn.disabled=false;btn.textContent='套用';}
  }
}
function clearCoupon(){
  appliedCoupon=null;
  const inp=document.getElementById('couponInput');if(inp)inp.value='';
  const msg=document.getElementById('couponMsg');if(msg)msg.innerHTML='';
  const dr=document.getElementById('discountRow');if(dr)dr.style.display='none';
  persistCart();
}

// ── hotfix22-F：購物車 localStorage 永久保留（不設 expires_at / 24hr 判斷，
//    與冷藏宅配 line-shipping.html 使用統一資料格式，但各用獨立 key）────────
// 清空條件只有：①訂單成立 ②LINE Pay 付款成功 ③使用者按「清空購物車」
//              ④商品已下架（只移除該商品）⑤商家手動清除
function persistCart(){
  try{
    const cartQtyMap={};
    Object.entries(cart).forEach(([pid,c])=>{ cartQtyMap[pid]=c.qty; });
    let _existingCreatedAt=null;
    try{ const _prev=JSON.parse(localStorage.getItem(ORDER_CART_KEY)||'null'); _existingCreatedAt=_prev?.cart_created_at||null; }catch(e){}
    const data={
      version:1,
      store_id:LINE_STORE_ID,
      // 預留：未來 Conversion Analytics（AddToCart/BeginCheckout/Purchase）用，目前只存不分析
      session_id:_getSessionId(),
      visitor_id:_getVisitorId(),
      cart_created_at:_existingCreatedAt||Date.now(),
      cart_updated_at:Date.now(),
      cart:cartQtyMap,
      order_mode:currentMode, // 'takeout' | 'delivery'
      customer:{
        name:document.getElementById('cName')?.value||'',
        phone:document.getElementById('cPhone')?.value||'',
        delivery_address:document.getElementById('deliveryAddress')?.value||'',
        delivery_address_note:document.getElementById('deliveryAddressNote')?.value||'',
      },
      coupon_code:appliedCoupon?.code||'', // 只存 code，還原時一律重新驗證
      pickup_date:document.getElementById('pDate')?.value||'',
      pickup_time:document.getElementById('pTime')?.value||'',
      payment_method:selectedPay||'',
      order_note:document.getElementById('oNote')?.value||'',
    };
    localStorage.setItem(ORDER_CART_KEY,JSON.stringify(data));
  }catch(e){ /* localStorage 不可用時安靜略過，不影響下單流程 */ }
}
function _debounce(fn,ms){ let t=null; return function(...args){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args),ms); }; }
// 文字輸入框（姓名/電話/地址/備註）用 debounce，避免每個按鍵都寫入 localStorage；
// 其餘互動（加減商品、切換模式、選日期/時段、套用優惠券…）一律立即呼叫 persistCart()。
const debouncedPersistCart=_debounce(persistCart,400);
function clearCartStorage(){
  try{ localStorage.removeItem(ORDER_CART_KEY); }catch(e){}
  _resetCartId(); // fix18-10-hotfix23-A：訂單成立/清空後，下一個購物車要用新的 cart_id
}
// 使用者主動按「清空購物車」──────────────────────────────
function clearCartByUser(){
  if(!Object.keys(cart).length && !appliedCoupon){ closeSheet('cartSheet'); return; }
  if(!confirm('確定要清空購物車嗎？')) return;
  // fix18-10-hotfix23-A：使用者主動清空購物車 → 記一筆 remove_from_cart（metadata.reason=
  // clear_cart），而不是逐項送出，避免事件洪水；不得與「下單成功」混淆（那邊不觸發此事件）
  try{
    const items=Object.entries(cart).map(([pid,c])=>({product_id:Number(pid),qty:c.qty}));
    if(items.length){
      _trackEvent('remove_from_cart',{
        quantity: items.reduce((s,i)=>s+i.qty,0),
        metadata:{reason:'clear_cart', items},
      });
    }
  }catch(e){}
  cart={};preorderRequiredIds.clear();
  clearCoupon();
  clearCartStorage();
  updateBar();renderMenu();renderCartItems();
  closeSheet('cartSheet');
  toast('🗑️ 已清空購物車');
}
// 頁面載入時還原購物車（不設任何到期時間；商品不存在/已下架時只跳過該項，
// 不清空整台購物車；日期/時段失效時自動落回目前模式下一個可預約日期/時段，
// 沿用既有 buildDateSelector()/buildTimeSelector() 的營業規則判斷，不另寫新規則）───
async function restoreCart(){
  let data;
  try{
    const raw=localStorage.getItem(ORDER_CART_KEY);
    if(!raw) return;
    data=JSON.parse(raw);
  }catch(e){ clearCartStorage(); return; }
  if(!data) return;

  // 還原購物車商品：一律先用「最新一次 API 回來的 allProducts」查找 —— 名稱/價格/圖片/
  // 描述全部採最新資料，localStorage 只提供「id → 數量」，絕不信任舊的價格與總額。
  // 商品不存在／已下架／已停用／LINE 未上架時，allProducts 裡就已經沒有這個 id，
  // 直接跳過該項即可，其餘商品全部保留（不清空整台購物車）。
  cart={};
  const savedCartMap=data.cart||{};
  Object.entries(savedCartMap).forEach(([pid,qty])=>{
    const p=allProducts.find(x=>String(x.id)===String(pid));
    const q=Number(qty);
    if(p && q>0) cart[pid]={product:p,qty:q};
  });
  const _droppedCount=Object.keys(savedCartMap).length-Object.keys(cart).length;
  if(_droppedCount>0) toast(`⚠️ 有 ${_droppedCount} 件商品已下架，已自動從購物車移除`);

  // 還原外帶/外送模式：一律沿用 order_mode（即使目前該模式被關閉，也不得自動切回另一個
  // 開放中的模式——已在 init() 內的 _peekSavedOrderMode() 提前套用並設定 modeForcedVisible，
  // 這裡只是保險再套用一次，確保 restoreCart() 單獨被呼叫時行為一致）。
  const savedMode=data.order_mode;
  if(savedMode==='takeout' || savedMode==='delivery') currentMode=savedMode;
  updateModeTabActive();
  const oTypeSel=document.getElementById('oType');
  if(oTypeSel) oTypeSel.value=currentMode;
  updateDeliveryAddressVisibility();
  buildPaymentButtons(shopData);
  updateModeAvailabilityUI();

  // 還原顧客資料/備註/外送地址
  const ci=data.customer||{};
  const setV=(id,v)=>{ const el=document.getElementById(id); if(el && v!=null) el.value=v; };
  setV('cName',ci.name);
  setV('cPhone',ci.phone);
  setV('oNote',data.order_note);
  setV('deliveryAddress',ci.delivery_address);
  setV('deliveryAddressNote',ci.delivery_address_note);

  // 還原取餐日期/時間：先依「今天」重新產生整份日期選單（沿用既有今日臨時休息／
  // 今日最後接單／Business Calendar／每週營業時間判斷，不另寫規則）。
  // 若舊日期仍是選單中未 disabled 的選項才套用；否則自動落在目前模式下一個可預約日期，
  // 不清空購物車商品，只提示已自動更新。
  let _dateChanged=false, _timeChanged=false;
  buildDateSelector();
  const pDateSel=document.getElementById('pDate');
  if(pDateSel && data.pickup_date){
    const opt=Array.from(pDateSel.options).find(o=>o.value===data.pickup_date && !o.disabled);
    if(opt) pDateSel.value=data.pickup_date;
    else if(Object.keys(cart).length) _dateChanged=true;
  }
  await buildTimeSelector();
  const pTimeSel=document.getElementById('pTime');
  if(pTimeSel && data.pickup_time){
    const topt=Array.from(pTimeSel.options).find(o=>o.value===data.pickup_time && !o.disabled);
    if(topt) pTimeSel.value=data.pickup_time;
    else if(Object.keys(cart).length) _timeChanged=true;
  }
  if((_dateChanged||_timeChanged) && isCurrentModeAvailable()) toast('⏰ 原預約日期或時段已失效，已更新為下一個可用時段');

  // 還原付款方式（若還原代碼目前仍在開放清單內）
  const savedPayMethod=data.payment_method;
  if(savedPayMethod){
    let matched=false;
    document.querySelectorAll('#payBtns .pay-btn').forEach(b=>{
      const isMatch=b.dataset.code===savedPayMethod;
      b.classList.toggle('active',isMatch);
      if(isMatch) matched=true;
    });
    if(matched) selectedPay=savedPayMethod;
  }

  // 還原優惠券：只保存過 code，一律重新呼叫 /api/coupons/validate 驗證，絕不直接信任
  // localStorage 存的折扣金額；優惠券已失效/停用/不再達門檻時只清除優惠券，購物車商品保留。
  appliedCoupon=null;
  const restoredCode=data.coupon_code?String(data.coupon_code).trim().toUpperCase():'';
  if(restoredCode && Object.keys(cart).length){
    try{
      const subtotal=Object.values(cart).reduce((s,{product:p,qty})=>s+(p.effective_line_price||p.price)*qty,0);
      const phone=document.getElementById('cPhone')?.value||'';
      const res=await apiFetch('/api/coupons/validate',{
        method:'POST',
        body:JSON.stringify({code:restoredCode,subtotal,customer_phone:phone})
      }).then(r=>r.json());
      if(res.success){
        appliedCoupon={code:res.coupon.code,discount_amount:res.discount_amount,final_total:res.final_total,coupon:res.coupon};
        const inp=document.getElementById('couponInput'); if(inp) inp.value=res.coupon.code;
        const msgEl=document.getElementById('couponMsg');
        if(msgEl) msgEl.innerHTML=`<span style="color:#06C755">✅ ${res.coupon.name}：折扣 -$${res.discount_amount}</span>`;
      }else{
        toast('原優惠券目前已失效，購物車商品已保留');
      }
    }catch(e){ /* 網路錯誤：安全起見不恢復優惠券顯示，客人可自行重新套用 */ }
  }

  updateBar();renderMenu();
  if(document.getElementById('cartSheet')?.classList.contains('show')) renderCartItems();
  // 還原過程中可能捨棄了失效優惠券/下架商品，寫回一份乾淨的狀態，避免下次整頁重整又嘗試恢復同一批失效資料
  persistCart();
}

// ── 送單（結帳前再次驗證）────────────────────────────────
async function submitOrder(){
  const name=document.getElementById('cName').value.trim();
  const phone=document.getElementById('cPhone').value.trim();
  const note=document.getElementById('oNote').value.trim();
  const time=document.getElementById('pTime').value.trim();
  const type=document.getElementById('oType').value;
  const pickupDate=document.getElementById('pDate')?.value;

  if(!name){toast('請填寫姓名');return;}
  if(!phone){toast('請填寫電話');return;}
  if(!Object.keys(cart).length){toast('購物車是空的');return;}
  if(!type){toast('請選擇取餐方式');return;}
  // hotfix22-F 補正：目前模式被店家關閉時一律擋下送單（不清空購物車），
  // 与 updateModeAvailabilityUI()/buildDateSelector() 的 UI 層限制互為保險。
  if((type==='takeout' && !takeoutEnabled) || (type==='delivery' && !deliveryEnabled)){
    toast((type==='delivery'?'外送':'外帶')+'目前未開放，請切換模式或稍後再試');return;
  }
  if(!selectedPay){toast('請選擇付款方式');return;}
  if(!pickupDate){toast('請選擇日期');return;}
  if(!time){toast('請選擇時間');return;}

  // fix18-06: 外送模式驗證地址與費用
  const isDelivery = type === 'delivery';
  if(isDelivery){
    const addrVal=(document.getElementById('deliveryAddress')?.value||'').trim();
    if(!addrVal){toast('外送訂單請填寫外送地址');return;}
    if(!deliveryLatLng.lat||!deliveryLatLng.lng){toast('請重新選擇外送地址（需取得座標）');return;}
    if(!deliveryFeeCalculated){toast('請稍候，外送費計算中…');return;}
  }

  // 送單前雙重驗證：呼叫後端重新確認
  const now=twNow(),nowStr=fmtD(now);
  const isNextDayOrder = pickupDate > nowStr;
  if(!isNextDayOrder){
    if(type==='takeout'&&takeoutCutoffPassed){toast('外帶今日接單已截止');return;}
    if(type==='delivery'&&deliveryCutoffPassed){toast('外送今日接單已截止');return;}
  }

  const items=Object.values(cart).map(({product:p,qty})=>({
    product_id:p.id, name:p.effective_line_name||p.name, qty,
    price:p.effective_line_price||p.price, subtotal:(p.effective_line_price||p.price)*qty
  }));
  const subtotal=items.reduce((s,i)=>s+i.subtotal,0);
  const couponCode=appliedCoupon?appliedCoupon.code:'';

  // fix18-06: 組裝外送欄位（後端不信任 delivery_fee，但 preview 值供後端 log 比對）
  const delivPayload = isDelivery ? {
    delivery_address:      (document.getElementById('deliveryAddress')?.value||'').trim(),
    delivery_address_note: (document.getElementById('deliveryAddressNote')?.value||'').trim(),
    delivery_lat:          deliveryLatLng.lat,
    delivery_lng:          deliveryLatLng.lng,
    delivery_fee_preview:      calcDeliveryFee,       // 前端預估，後端重算為準
    delivery_distance_km_preview: deliveryDistKm,     // 前端預估，後端重算為準
  } : {};

  const btn=document.getElementById('subBtn');btn.disabled=true;btn.textContent='送出中…';
  // fix18-10-hotfix23-E：checkout 模式在送單前要求登入（entry 模式已經在進站時擋過）
  if(_lineMemberGateConfig && _lineMemberGateConfig.gate_enabled && _lineMemberGateConfig.gate_mode==='checkout'){
    const gateResult=await LineMemberGate.requireMemberBeforeCheckout(LINE_STORE_ID,_lineMemberGateConfig,_gateIds(),_trackEvent);
    if(!gateResult.ok){ btn.disabled=false;btn.textContent='送出訂單'; return; }
  }
  // fix18-10-hotfix23-A：payment_started — 非 LINE Pay（無跳轉）選擇付款方式並送出時記錄；
  // LINE Pay 改在跳轉前記錄（見下方 lpRes.payment_url 導轉處）
  if(selectedPay!=='linepay'){ _trackEvent('payment_started'); }
  try{
    const orderRes=await apiFetch('/api/line-orders',{
      method:'POST',
      body:JSON.stringify({
        customer_name:name, customer_phone:phone, order_type:type,
        pickup_date:pickupDate, pickup_time:time,
        payment_method:selectedPay, note, items, subtotal,
        coupon_code:couponCode,
        total:subtotal,
        ...delivPayload,
        analytics:_analyticsPayloadForOrder(),
        member_session:_currentMemberSession(),
      })
    }).then(r=>r.json());
    if(!orderRes.success){
      toast(orderRes.message||'送出失敗');
      // hotfix22-B：外帶/外送「今日最後接單時間」在送單當下才過期（例如顧客瀏覽期間店家臨時調整截止時間），
      // 後端已擋下（見 routes/line-orders.js validateOrderConditions）。前台若該模式允許預約明日，
      // 直接帶去下一個可營業日，而不是單純重整頁面讓顧客自己重新摸索。
      if(orderRes.reason==='cutoff_sold_out'){
        const allowNext = currentMode==='takeout'
          ? (shopData.takeout_status?.allow_next_day)
          : (shopData.delivery_status?.allow_next_day);
        if(allowNext){
          const nextDate=findNextAvailableDate(currentMode);
          if(nextDate){
            try{
              const tsRes=await apiFetch(`/api/line-orders/timeslots?mode=${currentMode}&date=${nextDate}`).then(r=>r.json());
              const slots=(tsRes.success&&tsRes.slots)?tsRes.slots:[];
              toast(`⏰ 今日已截止，已為您帶到下一個可營業日（${nextDate}）`);
              applyDateTimeToCartSheet(nextDate, slots);
              btn.disabled=false;btn.textContent='送出訂單';
              return;
            }catch(e){ console.warn('cutoff next-day redirect failed',e); }
          }
        }
        setTimeout(()=>location.reload(),2000);
      }
      if(orderRes.reason==='real_sold_out') setTimeout(()=>location.reload(),2000);
      if(orderRes.reason==='maps_unavailable'||orderRes.reason==='out_of_range'){
        resetDeliveryFee();
      }
      return;
    }
    const orderData=orderRes.data;
    localStorage.setItem('last_line_order_number',orderData.order_number);
    localStorage.setItem('last_line_order_phone',phone);

    // ── LINE Pay 付款流程 ──────────────────────────────
    if(selectedPay==='linepay'){
      btn.textContent='前往 LINE Pay…';
      try{
        const baseUrl=`${location.protocol}//${location.host}`;
        const lpRes=await apiFetch('/api/linepay/request',{
          method:'POST',
          body:JSON.stringify({
            order_uuid:orderData.uuid||orderData.order_number,
            order_number:orderData.order_number,
            total:orderData.total||subtotal,
            items, customer_name:name,
            redirect_url:`${baseUrl}/api/linepay/confirm?store_id=${LINE_STORE_ID}`,
            cancel_url:`${baseUrl}/line-order.html?store_id=${LINE_STORE_ID}&linepay=cancel`,
          })
        }).then(r=>r.json());
        if(lpRes.success&&lpRes.payment_url){
          _trackEvent('payment_started');
          // hotfix22-F：LINE Pay 導轉付款前不得清空購物車／優惠券 —— 只有「付款成功」導回時
          // （linepay=success，見 init()）才真正 clearCartStorage()。若使用者取消或付款失敗，
          // 購物車（含 localStorage）維持原樣，讓顧客回來後仍能繼續結帳。
          persistCart();
          window.location.href=lpRes.payment_url;
          return;
        }else{
          toast((lpRes.message)||'LINE Pay 建立付款失敗，請改選其他付款方式');
        }
      }catch(lpErr){
        toast('LINE Pay 連線失敗：'+lpErr.message);
      }
      return;
    }

    // ── 現金 / 其他付款 → 直接顯示成功頁 ─────────────
    const finalDiscAmt=appliedCoupon?appliedCoupon.discount_amount:0;
    const finalDelivFee=orderData.delivery_fee||0;
    clearCoupon();
    resetDeliveryFee();
    closeSheet('cartSheet');cart={};preorderRequiredIds.clear();updateBar();renderMenu();
    // hotfix22-F：訂單成功建立才清空購物車（含 localStorage）
    clearCartStorage();
    document.getElementById('sucNo').textContent=`訂單編號：${orderData.order_number}`;
    document.getElementById('sucDetail').innerHTML=buildDetailRows({
      status:'pending',status_label:'待確認',
      customer_name:name, phone_last3:phone.slice(-3),
      order_type_label:type==='delivery'?'🛵 外送':'🛍️ 外帶',
      pickup_time:`${pickupDate} ${time}`, items, subtotal,
      discount_amount:finalDiscAmt,
      delivery_fee:finalDelivFee,
      delivery_address:delivPayload.delivery_address||'',
      distance_km:orderData.distance_km||0,
      total:orderData.total,
      payment_label:PLABELS[selectedPay]||selectedPay, note
    });
    document.getElementById('successScreen').classList.add('show');
    // fix18-10-hotfix23-D：非 LINE Pay 訂單在這裡就是後端已確認成立的成交（與後端
    // routes/line-orders.js 的 purchase 事件寫入時機一致），value 用 orderData.total
    // （後端回傳金額，不是前端 subtotal 自算值）。
    _firePurchaseOnce(orderData.order_number, orderData.total, items);
  }catch{toast('網路錯誤，請重試');}
  finally{btn.disabled=false;btn.textContent='確認送出訂單';}
}

// ── 定時刷新店家狀態 ──────────────────────────────────
async function refreshShopStatus(){
  try{
    const res=await apiFetch('/api/line-shop').then(r=>r.json());
    if(!res.success)return;
    shopData=res.data;
    const ts=res.data.takeout_status||{};
    const ds2=res.data.delivery_status||{};
    const prevToCP=takeoutCutoffPassed, prevDlCP=deliveryCutoffPassed;
    const prevToEn=takeoutEnabled, prevDlEn=deliveryEnabled;
    takeoutCutoffPassed=!!ts.cutoff_passed;
    deliveryCutoffPassed=!!ds2.cutoff_passed;
    takeoutEnabled=!!ts.enabled;
    deliveryEnabled=!!ds2.enabled;
    // Hotfix16 BUG-004：休假 Banner 隨定時刷新自動更新／消失（恢復營業日到達後自動不再顯示）
    const prevTodayClosed=todayClosed;
    const holidayBanner=res.data.holiday_banner||{active:false};
    todayClosed=!!holidayBanner.active;
    // Hotfix17：商家公告中心跟著定時刷新更新（例如公告有效期間結束、或後台更新了公告內容）
    const announcement=res.data.announcement||{enabled:false,active:false,source:'none'};
    renderAnnouncement(announcement);
    if(shouldSkipHolidayBannerForAnnouncement(announcement)) hideHolidayBanner();
    else renderHolidayBanner(holidayBanner);
    if(prevToCP!==takeoutCutoffPassed||prevDlCP!==deliveryCutoffPassed||prevTodayClosed!==todayClosed||prevToEn!==takeoutEnabled||prevDlEn!==deliveryEnabled){
      // 重新載入菜單（休假狀態改變會影響商品卡的售完原因/預約明日等顯示）
      try{
        const mr=await apiFetch('/api/line-menu').then(r=>r.json());
        if(mr.success){categories=mr.data.categories||[];allProducts=mr.data.products||[];buildCats();}
      }catch{}
      // hotfix22-F 補正：enabled 狀態改變時，若目前選擇的模式（currentMode）變成關閉，
      // 一律維持在原模式並顯示「未開放」，不自動切換；只重建頁籤/日期時段/送單按鈕的顯示狀態。
      if(prevToEn!==takeoutEnabled||prevDlEn!==deliveryEnabled){
        if((currentMode==='takeout'&&!takeoutEnabled)||(currentMode==='delivery'&&!deliveryEnabled)) modeForcedVisible=true;
        buildModeTabsUI();
        buildDateSelector();
      }
      renderMenu();updateCutoffBanner();updateModeAvailabilityUI();
    }
  }catch{}
}

    : '';

function reorder(o){
  const items=o.items||[];
  if(!items.length){toast('此訂單沒有商品紀錄');return;}
  let added=0,skipped=0;
  items.forEach(item=>{
    const pid=item.product_id||item.id;
    const p=allProducts.find(x=>x.id==pid||(x.name===(item.name||'')&&!pid));
    if(!p||!p.show_on_line||(p.sale_status||'available')!=='available'||Number(p.line_sold_out)===1){skipped++;return;}
    if(!cart[p.id])cart[p.id]={product:p,qty:0};
    cart[p.id].qty+=(item.qty||1);added++;
  });
  if(added===0){toast('此訂單商品目前皆無法再次購買');return;}
  updateBar();renderMenu();closeTopSheet();
  toast(skipped>0?`已加入購物車，${skipped} 項停售商品已略過`:`${added} 項商品已加入購物車`);
  setTimeout(()=>openCartSheet(),400);
}

// fix18-06: Google Maps + 外送費計算

let deliveryDistKm = 0;  // 最近一次計算距離（供 submitOrder 帶出）
let _calcFeeTimer = null;

// 重置外送費狀態（模式切換或清空地址時）
function resetDeliveryFee(){
  calcDeliveryFee = 0;
  deliveryDistKm  = 0;
  deliveryFeeCalculated = false;
  deliveryLatLng = { lat: null, lng: null };
  const addrEl = document.getElementById('deliveryAddress');
  if(addrEl) addrEl.value = '';
  const feeRow = document.getElementById('deliveryFeeRow');
  if(feeRow) feeRow.style.display='none';
  const feeMsg = document.getElementById('deliveryFeeMsg');
  if(feeMsg) feeMsg.textContent='';
  updateCartTotals();
}

// 呼叫後端計算外送費
async function fetchDeliveryFee(){
  if(!deliveryLatLng.lat||!deliveryLatLng.lng) return;
  const subtotal=Object.values(cart).reduce((s,{product:p,qty})=>s+(p.effective_line_price||p.price)*qty,0);
  const feeMsg=document.getElementById('deliveryFeeMsg');
  const feeRow=document.getElementById('deliveryFeeRow');
  const distBadge=document.getElementById('deliveryDistBadge');
  const feeDisplay=document.getElementById('deliveryFeeDisplay');
  if(feeMsg) feeMsg.textContent='計算外送費中…';
  deliveryFeeCalculated=false;
  try{
    const res=await apiFetch('/api/delivery/calculate-fee',{
      method:'POST',
      body:JSON.stringify({
        order_mode:'delivery',
        subtotal,
        delivery_lat: deliveryLatLng.lat,
        delivery_lng: deliveryLatLng.lng,
      })
    }).then(r=>r.json());
    if(res.success){
      calcDeliveryFee = res.delivery_fee||0;
      deliveryDistKm  = res.distance_km||0;
      deliveryFeeCalculated = true;
      if(feeRow) feeRow.style.display='flex';
      if(distBadge) distBadge.textContent=`${res.distance_km}km`;
      if(feeDisplay) feeDisplay.textContent= res.is_free_delivery ? '免運 🎉' : `NT$${res.delivery_fee}`;
      if(feeMsg) feeMsg.textContent=res.message||'';
    } else {
      calcDeliveryFee=0;
      deliveryFeeCalculated=false;
      if(feeRow) feeRow.style.display='none';
      if(feeMsg) feeMsg.innerHTML=`<span style="color:#e53935">⚠️ ${res.message||'無法計算外送費'}</span>`;
    }
  } catch(e){
    calcDeliveryFee=0;
    deliveryFeeCalculated=false;
    if(feeRow) feeRow.style.display='none';
    if(feeMsg) feeMsg.innerHTML=`<span style="color:#e53935">⚠️ 外送費計算失敗，請重試</span>`;
  }
  updateCartTotals();
}

// 使用目前位置（GPS → reverse-geocode）
async function useCurrentLocation(){
  if(!navigator.geolocation){
    toast('您的瀏覽器不支援定位功能');
    return;
  }
  const btn=document.querySelector('.delivery-gps-btn');
  if(btn){btn.disabled=true;btn.textContent='定位中…';}
  navigator.geolocation.getCurrentPosition(
    async (pos)=>{
      const lat=pos.coords.latitude, lng=pos.coords.longitude;
      try{
        const res=await apiFetch('/api/maps/reverse-geocode',{
          method:'POST',
          body:JSON.stringify({lat,lng})
        }).then(r=>r.json());
        if(res.success){
          const addrEl=document.getElementById('deliveryAddress');
          if(addrEl){ addrEl.value=res.formatted_address; }
          deliveryLatLng={lat,lng};
          await fetchDeliveryFee();
        } else {
          toast(res.message||'無法取得地址，請手動輸入');
        }
      } catch(e){
        toast('定位失敗，請手動輸入地址');
      } finally {
        if(btn){btn.disabled=false;btn.textContent='📍 使用目前位置';}
      }
    },
    (err)=>{
      if(btn){btn.disabled=false;btn.textContent='📍 使用目前位置';}
      toast('無法取得定位：'+( err.code===1?'請允許定位權限':err.message));
    },
    {timeout:10000, maximumAge:60000}
  );
}

// 初始化 Google Places Autocomplete
function initGoogleMaps(){
  const addrEl=document.getElementById('deliveryAddress');
  if(!addrEl||!window.google?.maps?.places) return;
  const ac = new google.maps.places.Autocomplete(addrEl, {
    componentRestrictions: { country: 'tw' },
    fields: ['formatted_address','geometry'],
    types: ['address'],
  });
  ac.addListener('place_changed', ()=>{
    const place=ac.getPlace();
    if(!place.geometry){
      toast('請從下拉選單選擇地址');
      deliveryLatLng={lat:null,lng:null};
      deliveryFeeCalculated=false;
      return;
    }
    deliveryLatLng={
      lat: place.geometry.location.lat(),
      lng: place.geometry.location.lng(),
    };
    if(place.formatted_address) addrEl.value=place.formatted_address;
    // 節流：地址確認後才呼叫
    if(_calcFeeTimer) clearTimeout(_calcFeeTimer);
    _calcFeeTimer=setTimeout(fetchDeliveryFee, 300);
  });
  // 手動輸入時，若已失去座標則清除計算結果
  addrEl.addEventListener('input', ()=>{
    deliveryLatLng={lat:null,lng:null};
    deliveryFeeCalculated=false;
    calcDeliveryFee=0;
    const feeRow=document.getElementById('deliveryFeeRow');
    if(feeRow) feeRow.style.display='none';
    updateCartTotals();
  });
  mapsAutocomplete=ac;
}

// 動態載入 Google Maps JS API（從後端拿 browser key）
async function loadGoogleMapsScript(){
  try{
    const res=await apiFetch('/api/config/maps-browser-key').then(r=>r.json());
    if(!res.success||!res.key) return; // 沒有 key 就跳過，不影響自取流程
    // 避免重複載入
    if(window.google?.maps) { initGoogleMaps(); return; }
    window._initGoogleMapsCallback=initGoogleMaps;
    const s=document.createElement('script');
    s.src=`https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(res.key)}&libraries=places&language=zh-TW&callback=_initGoogleMapsCallback`;
    s.async=true; s.defer=true;
    s.onerror=()=>console.warn('[Maps] Google Maps 載入失敗，外送仍可輸入地址但無自動完成');
    document.head.appendChild(s);
  } catch(e){
    console.warn('[Maps] 無法取得 Maps browser key:', e.message);
  }
}

init();
loadGoogleMapsScript();
</script>

<script>
// WSS + Polling
(function initLineOrderPolling(){
  let _pollTimer=null;
  window._startStatusPolling=function(orderNo){
    if(_pollTimer)clearInterval(_pollTimer);
    _pollTimer=setInterval(async()=>{
      if(!orderNo)return;
      try{
        const r=await apiFetch('/api/line-orders/status/'+encodeURIComponent(orderNo)).then(x=>x.json());
        if(!r.success||!r.data)return;
        const newStatus=r.data.order_status||'';
        const si=(window.SICON||{})[newStatus]||'📦';
        const sl=(window.SLABEL||{})[newStatus]||newStatus;
        const sc=(window.SCLASS||{})[newStatus]||'';
        const sucDetail=document.getElementById('sucDetail');
        if(sucDetail&&sucDetail.getAttribute('data-order-no')===orderNo){
          const badge=sucDetail.querySelector('.status-badge[data-status]');
          if(badge){badge.className='status-badge '+sc;badge.textContent=si+' '+sl;badge.setAttribute('data-status',newStatus);}
        }
        const card=document.querySelector('[data-order-no="'+orderNo+'"]');
        if(card){const b=card.querySelector('.status-badge');if(b){b.className='status-badge '+sc;b.textContent=si+' '+sl;}}
      }catch{}
    },10000);
  };
  window._stopStatusPolling=function(){if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}};
})();

(function initLineOrderWss(){
  let _retry=0;
  function connect(){
    const proto=location.protocol==='https:'?'wss:':'ws:';
    let ws;
    try{ws=new WebSocket(proto+'//'+location.host+'/orders');}catch{return;}
    ws.onopen=()=>{_retry=0;};
    ws.onmessage=(evt)=>{
      let msg;try{msg=JSON.parse(evt.data);}catch{return;}
      if(msg.type!=='order_status_changed')return;
      const o=msg.order;if(!o)return;
      const newStatus=o.order_status||'';
      const si=(window.SICON||{})[newStatus]||'📦';
      const sl=(window.SLABEL||{})[newStatus]||newStatus;
      const sc=(window.SCLASS||{})[newStatus]||'';
      const sucDetail=document.getElementById('sucDetail');
      const shownOrderNo=sucDetail?sucDetail.getAttribute('data-order-no'):'';
      if(shownOrderNo&&shownOrderNo===o.order_number){
        const badge=sucDetail.querySelector('.status-badge[data-status]');
        if(badge){badge.className='status-badge '+sc;badge.textContent=si+' '+sl;badge.setAttribute('data-status',newStatus);}
      }
      const card=document.querySelector('[data-order-no="'+o.order_number+'"]');
      if(card){const b=card.querySelector('.status-badge');if(b){b.className='status-badge '+sc;b.textContent=si+' '+sl;}}
    };
    ws.onclose=()=>{const d=Math.min(1000*Math.pow(2,_retry++),30000);setTimeout(connect,d);};
    ws.onerror=()=>ws.close();
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',connect);
  else connect();
})();
</script>
