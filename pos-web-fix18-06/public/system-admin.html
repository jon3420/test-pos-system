<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin 總控台 — POS SaaS</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
    --accent: #6366f1; --accent2: #8b5cf6;
    --success: #10b981; --danger: #ef4444; --warn: #f59e0b;
    --text: #e2e8f0; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #1e1b4b 0%, var(--bg) 70%);
  }
  .login-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px; width: 360px; text-align: center;
  }
  .login-box h1 { font-size: 1.5rem; margin-bottom: 8px; background: linear-gradient(135deg,#818cf8,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-box p.sub { color: var(--muted); font-size: .875rem; margin-bottom: 28px; }
  .field { text-align: left; margin-bottom: 16px; }
  .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
  .field input {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .95rem;
    outline: none; transition: border .2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer;
    background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff;
    font-size: 1rem; font-weight: 600; margin-top: 8px; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .9; }
  .err-msg { color: var(--danger); font-size: .85rem; margin-top: 12px; }

  /* MAIN */
  #main-screen { display: none; }
  .topbar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 16px;
  }
  .topbar .logo { font-weight: 700; font-size: 1.1rem; background: linear-gradient(135deg,#818cf8,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .topbar .badge { background: #312e81; color: #a5b4fc; font-size: .7rem; padding: 2px 8px; border-radius: 99px; }
  .topbar .spacer { flex: 1; }
  .topbar .user-info { color: var(--muted); font-size: .85rem; }
  .topbar .logout-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: .85rem; transition: all .2s; }
  .topbar .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  .layout { display: flex; height: calc(100vh - 60px); }
  .sidebar {
    width: 220px; background: var(--card); border-right: 1px solid var(--border);
    padding: 16px 12px; flex-shrink: 0;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
    cursor: pointer; color: var(--muted); font-size: .9rem; transition: all .2s; margin-bottom: 4px;
  }
  .nav-item:hover { background: rgba(99,102,241,.1); color: var(--text); }
  .nav-item.active { background: rgba(99,102,241,.2); color: #818cf8; font-weight: 600; }
  .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }

  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .page { display: none; }
  .page.active { display: block; }

  .page-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
  }
  .stat-card .label { font-size: .8rem; color: var(--muted); margin-bottom: 8px; }
  .stat-card .value { font-size: 2rem; font-weight: 700; }
  .stat-card.success .value { color: var(--success); }
  .stat-card.danger .value { color: var(--danger); }
  .stat-card.warn .value { color: var(--warn); }
  .stat-card.accent .value { color: #818cf8; }

  /* TABLE */
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 12px 16px; font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  td { padding: 14px 16px; font-size: .9rem; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  /* BADGES */
  .badge-status { padding: 3px 10px; border-radius: 99px; font-size: .75rem; font-weight: 600; }
  .badge-active { background: rgba(16,185,129,.15); color: var(--success); }
  .badge-inactive { background: rgba(239,68,68,.15); color: var(--danger); }
  .badge-plan { padding: 3px 10px; border-radius: 99px; font-size: .75rem; font-weight: 600; }
  .badge-pro { background: rgba(139,92,246,.2); color: #a78bfa; }
  .badge-basic { background: rgba(99,102,241,.15); color: #818cf8; }

  /* ACTIONS */
  .action-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: .875rem; font-weight: 500; transition: all .2s; }
  .btn-add { background: var(--accent); color: #fff; }
  .btn-add:hover { background: var(--accent2); }
  .btn-sm { padding: 5px 12px; font-size: .8rem; border-radius: 6px; }
  .btn-edit { background: rgba(99,102,241,.2); color: #818cf8; border: 1px solid rgba(99,102,241,.3); }
  .btn-edit:hover { background: rgba(99,102,241,.35); }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.3); }
  .btn-success { background: rgba(16,185,129,.15); color: var(--success); border: 1px solid rgba(16,185,129,.3); }
  .btn-success:hover { background: rgba(16,185,129,.3); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
  .modal .field { margin-bottom: 14px; }
  .modal .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 5px; }
  .modal .field input, .modal .field select {
    width: 100%; padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .9rem; outline: none;
  }
  .modal .field input:focus, .modal .field select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* LICENSE */
  .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .feature-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: var(--bg); border-radius: 8px; border: 1px solid var(--border); cursor: pointer;
  }
  .feature-item.on { border-color: var(--success); background: rgba(16,185,129,.08); }
  .feature-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .feature-item.on .dot { background: var(--success); }
  .feature-item .name { font-size: .85rem; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    padding: 12px 20px; border-radius: 10px; font-size: .9rem; font-weight: 500;
    background: var(--success); color: #fff; opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
  #toast.error { background: var(--danger); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Super Admin</h1>
    <p class="sub">POS SaaS 總控台</p>
    <div class="field">
      <label>帳號</label>
      <input type="text" id="login-user" value="superadmin" placeholder="superadmin">
    </div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="login-pass" placeholder="admin1234" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()">登入</button>
    <p class="err-msg" id="login-err"></p>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div class="topbar">
    <span class="logo">POS SaaS</span>
    <span class="badge">Super Admin 總控台</span>
    <div class="spacer"></div>
    <span class="user-info" id="user-label"></span>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="nav-item active" onclick="showPage('dashboard',this)">
        <span class="icon">📊</span> 儀表板
      </div>
      <div class="nav-item" onclick="showPage('stores',this)">
        <span class="icon">🏪</span> 店家管理
      </div>
      <div class="nav-item" onclick="showPage('licenses',this)">
        <span class="icon">🔑</span> 授權管理
      </div>
      <div class="nav-item" onclick="showPage('password',this)">
        <span class="icon">⚙️</span> 修改密碼
      </div>
    </div>
    <div class="content">
      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div class="page-title">總覽</div>
        <div class="stats-grid" id="stats-grid">
          <div class="loading">載入中...</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>最近新增店家</th><th>方案</th><th>狀態</th><th>建立時間</th></tr></thead>
            <tbody id="recent-stores"></tbody>
          </table>
        </div>
      </div>

      <!-- STORES -->
      <div class="page" id="page-stores">
        <div class="page-title">店家管理</div>
        <div class="action-bar">
          <button class="btn btn-add" onclick="openAddStore()">+ 新增店家</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Store ID</th><th>店家名稱</th><th>聯絡人</th><th>電話</th>
                <th>方案</th><th>狀態</th><th>建立時間</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="stores-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- LICENSES -->
      <div class="page" id="page-licenses">
        <div class="page-title">授權管理</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Store ID</th><th>店家名稱</th><th>方案</th><th>狀態</th>
                <th>功能清單</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="licenses-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="page" id="page-password">
        <div class="page-title">修改密碼</div>
        <div class="table-wrap" style="max-width:420px">
          <div style="padding:24px">
            <div class="field"><label>舊密碼</label><input type="password" id="pw-old"></div>
            <div class="field"><label>新密碼</label><input type="password" id="pw-new"></div>
            <div class="field"><label>確認新密碼</label><input type="password" id="pw-confirm"></div>
            <button class="btn btn-add" onclick="changePassword()">更新密碼</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD/EDIT STORE MODAL -->
<div class="modal-overlay" id="store-modal">
  <div class="modal">
    <h2 id="modal-title">新增店家</h2>
    <div class="field">
      <label>Store ID（英文/數字/底線，建立後不可更改）</label>
      <input type="text" id="f-store-id" placeholder="store_002">
    </div>
    <div class="field"><label>店家名稱</label><input type="text" id="f-store-name" placeholder="例：A 店"></div>
    <div class="field"><label>聯絡人</label><input type="text" id="f-contact-name"></div>
    <div class="field"><label>電話</label><input type="text" id="f-phone"></div>
    <div class="field">
      <label>方案</label>
      <select id="f-plan">
        <option value="basic">Basic（基礎版）</option>
        <option value="pro">Pro（進階版）</option>
      </select>
    </div>
    <div class="field">
      <label>狀態</label>
      <select id="f-active">
        <option value="1">啟用</option>
        <option value="0">停用</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()" style="background:var(--border);color:var(--text)">取消</button>
      <button class="btn btn-add" id="modal-save-btn" onclick="saveStore()">儲存</button>
    </div>
  </div>
</div>

<!-- LICENSE MODAL -->
<div class="modal-overlay" id="license-modal">
  <div class="modal">
    <h2>授權設定 — <span id="lic-store-name"></span></h2>
    <div class="field">
      <label>方案</label>
      <select id="lic-plan" onchange="onPlanChange()">
        <option value="basic">Basic</option>
        <option value="pro">Pro</option>
      </select>
    </div>
    <div class="field">
      <label>狀態</label>
      <select id="lic-active">
        <option value="1">啟用</option>
        <option value="0">停用</option>
      </select>
    </div>
    <div class="field">
      <label>功能開關（點擊切換）</label>
      <div class="feature-grid" id="feature-grid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeLicModal()" style="background:var(--border);color:var(--text)">取消</button>
      <button class="btn btn-add" onclick="saveLicense()">儲存授權</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api/super-admin';
let token = localStorage.getItem('sa_token') || '';
let currentStoreEdit = null;
let currentLicStore = null;
let currentFeatures = {};

const PLAN_DEFAULTS = {
  basic: { order:true,orders:true,products:true,reports:true,print:true,inventory:false,line_order:false,delivery:false,marketing:false,member:false,coupon:false,label_print:false,payment_api:false,payment_methods:true },
  pro:   { order:true,orders:true,products:true,reports:true,print:true,inventory:true,line_order:true,delivery:true,marketing:false,member:false,coupon:false,label_print:true,payment_api:true,payment_methods:true },
};

const FEATURE_LABELS = {
  order:'收銀點餐', orders:'訂單管理', products:'商品管理', reports:'報表分析',
  print:'列印功能', inventory:'庫存管理', line_order:'LINE 點餐', delivery:'外送功能',
  marketing:'行銷活動', member:'會員系統', coupon:'優惠券', label_print:'標籤列印',
  payment_api:'💳 金流 API',
  payment_methods:'💳 付款方式',
};

async function api(path, opt={}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    ...opt,
  });
  return res.json();
}

// ── AUTH ──────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.success) {
      token = data.token;
      localStorage.setItem('sa_token', token);
      showMain(data.username);
    } else {
      err.textContent = data.message || '登入失敗';
    }
  } catch(e) {
    err.textContent = '連線失敗：' + e.message;
  }
}

function doLogout() {
  token = '';
  localStorage.removeItem('sa_token');
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showMain(username) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('user-label').textContent = username || '';
  loadDashboard();
}

// ── NAV ──────────────────────────────────────────────────
function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'stores') loadStores();
  if (name === 'licenses') loadLicenses();
}

// ── DASHBOARD ─────────────────────────────────────────────
async function loadDashboard() {
  const data = await api('/dashboard');
  if (!data.success) return;
  const d = data.data;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="label">總店家數</div><div class="value">${d.total_stores}</div></div>
    <div class="stat-card success"><div class="label">啟用店家</div><div class="value">${d.active_stores}</div></div>
    <div class="stat-card danger"><div class="label">停用店家</div><div class="value">${d.inactive_stores}</div></div>
    <div class="stat-card accent"><div class="label">Basic 方案</div><div class="value">${d.basic_plans}</div></div>
    <div class="stat-card warn"><div class="label">Pro 方案</div><div class="value">${d.pro_plans}</div></div>
  `;
  const tbody = document.getElementById('recent-stores');
  tbody.innerHTML = d.recent_stores.map(s => `
    <tr>
      <td>${s.store_id}</td>
      <td>${s.store_name}</td>
      <td><span class="badge-plan ${s.plan==='pro'?'badge-pro':'badge-basic'}">${s.plan.toUpperCase()}</span></td>
      <td><span class="badge-status ${s.active?'badge-active':'badge-inactive'}">${s.active?'啟用':'停用'}</span></td>
      <td style="color:var(--muted);font-size:.8rem">${s.created_at||''}</td>
    </tr>
  `).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--muted)">尚無店家</td></tr>';
}

// ── STORES ────────────────────────────────────────────────
let storesCache = [];
async function loadStores() {
  const data = await api('/stores');
  if (!data.success) return;
  storesCache = data.data;
  renderStores(storesCache);
}

function renderStores(stores) {
  const tbody = document.getElementById('stores-tbody');
  if (!stores.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:40px">尚無店家</td></tr>';
    return;
  }
  tbody.innerHTML = stores.map(s => `
    <tr>
      <td><code style="background:var(--bg);padding:2px 8px;border-radius:4px;font-size:.8rem">${s.store_id}</code></td>
      <td>${s.store_name}</td>
      <td>${s.contact_name||'-'}</td>
      <td>${s.phone||'-'}</td>
      <td><span class="badge-plan ${s.plan==='pro'?'badge-pro':'badge-basic'}">${s.plan.toUpperCase()}</span></td>
      <td><span class="badge-status ${s.active?'badge-active':'badge-inactive'}">${s.active?'啟用':'停用'}</span></td>
      <td style="color:var(--muted);font-size:.8rem">${(s.created_at||'').slice(0,10)}</td>
      <td>
        <button class="btn btn-sm btn-edit" onclick="openEditStore('${s.store_id}')">編輯</button>
        ${s.store_id!=='store_001'?`<button class="btn btn-sm btn-danger" onclick="deleteStore('${s.store_id}','${s.store_name}')">刪除</button>`:''}
      </td>
    </tr>
  `).join('');
}

function openAddStore() {
  currentStoreEdit = null;
  document.getElementById('modal-title').textContent = '新增店家';
  document.getElementById('f-store-id').value = '';
  document.getElementById('f-store-id').disabled = false;
  document.getElementById('f-store-name').value = '';
  document.getElementById('f-contact-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-plan').value = 'basic';
  document.getElementById('f-active').value = '1';
  document.getElementById('store-modal').classList.add('open');
}

function openEditStore(storeId) {
  const s = storesCache.find(x => x.store_id === storeId);
  if (!s) return;
  currentStoreEdit = storeId;
  document.getElementById('modal-title').textContent = '編輯店家';
  document.getElementById('f-store-id').value = s.store_id;
  document.getElementById('f-store-id').disabled = true;
  document.getElementById('f-store-name').value = s.store_name;
  document.getElementById('f-contact-name').value = s.contact_name||'';
  document.getElementById('f-phone').value = s.phone||'';
  document.getElementById('f-plan').value = s.plan;
  document.getElementById('f-active').value = s.active ? '1' : '0';
  document.getElementById('store-modal').classList.add('open');
}

function closeModal() { document.getElementById('store-modal').classList.remove('open'); }

async function saveStore() {
  const body = {
    store_id:     document.getElementById('f-store-id').value.trim(),
    store_name:   document.getElementById('f-store-name').value.trim(),
    contact_name: document.getElementById('f-contact-name').value.trim(),
    phone:        document.getElementById('f-phone').value.trim(),
    plan:         document.getElementById('f-plan').value,
    active:       document.getElementById('f-active').value === '1',
  };
  if (!body.store_name) { showToast('請填寫店家名稱', true); return; }
  let res;
  if (currentStoreEdit) {
    res = await api('/stores/' + currentStoreEdit, { method: 'PUT', body: JSON.stringify(body) });
  } else {
    if (!body.store_id) { showToast('請填寫 Store ID', true); return; }
    res = await api('/stores', { method: 'POST', body: JSON.stringify(body) });
  }
  if (res.success) {
    closeModal(); showToast('儲存成功'); loadStores();
  } else {
    showToast(res.message||'儲存失敗', true);
  }
}

async function deleteStore(storeId, name) {
  if (!confirm(`確定要刪除「${name}」？此動作無法復原。`)) return;
  const res = await api('/stores/' + storeId, { method: 'DELETE' });
  if (res.success) { showToast('已刪除'); loadStores(); }
  else showToast(res.message||'刪除失敗', true);
}

// ── LICENSES ─────────────────────────────────────────────
async function loadLicenses() {
  const data = await api('/stores');
  if (!data.success) return;
  const tbody = document.getElementById('licenses-tbody');
  tbody.innerHTML = data.data.map(s => {
    const lic = s.license;
    const featureCount = lic ? Object.values(lic.features).filter(Boolean).length : 0;
    const total = lic ? Object.keys(lic.features).length : 0;
    return `
      <tr>
        <td><code style="background:var(--bg);padding:2px 8px;border-radius:4px;font-size:.8rem">${s.store_id}</code></td>
        <td>${s.store_name}</td>
        <td><span class="badge-plan ${s.plan==='pro'?'badge-pro':'badge-basic'}">${s.plan.toUpperCase()}</span></td>
        <td><span class="badge-status ${s.active?'badge-active':'badge-inactive'}">${s.active?'啟用':'停用'}</span></td>
        <td style="color:var(--muted);font-size:.85rem">${featureCount}/${total} 項功能開啟</td>
        <td><button class="btn btn-sm btn-edit" onclick="openLicense('${s.store_id}','${s.store_name}')">設定授權</button></td>
      </tr>
    `;
  }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px">尚無店家</td></tr>';
}

async function openLicense(storeId, storeName) {
  currentLicStore = storeId;
  document.getElementById('lic-store-name').textContent = storeName;
  const data = await api('/stores/' + storeId + '/license');
  if (!data.success) { showToast('載入授權失敗', true); return; }
  const lic = data.data;
  document.getElementById('lic-plan').value = lic.plan;
  document.getElementById('lic-active').value = lic.active ? '1' : '0';
  currentFeatures = { ...lic.features };
  renderFeatureGrid();
  document.getElementById('license-modal').classList.add('open');
}

function renderFeatureGrid() {
  document.getElementById('feature-grid').innerHTML = Object.entries(FEATURE_LABELS).map(([k, label]) => `
    <div class="feature-item ${currentFeatures[k]?'on':''}" onclick="toggleFeature('${k}')">
      <div class="dot"></div>
      <span class="name">${label}</span>
    </div>
  `).join('');
}

function toggleFeature(k) {
  currentFeatures[k] = !currentFeatures[k];
  renderFeatureGrid();
}

function onPlanChange() {
  const plan = document.getElementById('lic-plan').value;
  currentFeatures = { ...PLAN_DEFAULTS[plan] };
  renderFeatureGrid();
}

function closeLicModal() { document.getElementById('license-modal').classList.remove('open'); }

async function saveLicense() {
  const body = {
    plan:     document.getElementById('lic-plan').value,
    active:   document.getElementById('lic-active').value === '1',
    features: currentFeatures,
  };
  const res = await api('/stores/' + currentLicStore + '/license', { method: 'PUT', body: JSON.stringify(body) });
  if (res.success) { closeLicModal(); showToast('授權已更新'); loadLicenses(); }
  else showToast(res.message||'更新失敗', true);
}

// ── PASSWORD ──────────────────────────────────────────────
async function changePassword() {
  const old_password = document.getElementById('pw-old').value;
  const new_password = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  if (!old_password || !new_password) { showToast('請填寫完整', true); return; }
  if (new_password !== confirm) { showToast('新密碼不一致', true); return; }
  const res = await api('/change-password', { method: 'PUT', body: JSON.stringify({ old_password, new_password }) });
  if (res.success) { showToast('密碼已更新'); document.getElementById('pw-old').value = document.getElementById('pw-new').value = document.getElementById('pw-confirm').value = ''; }
  else showToast(res.message||'更新失敗', true);
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isErr ? 'show error' : 'show';
  setTimeout(() => { t.className = ''; }, 3000);
}

// ── INIT ──────────────────────────────────────────────────
if (token) {
  // 嘗試用已存在的 token 直接進入
  fetch(API + '/dashboard', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => r.json())
    .then(d => {
      if (d.success) showMain(JSON.parse(atob(token.split('.')[1])).username);
      else { token = ''; localStorage.removeItem('sa_token'); }
    })
    .catch(() => { token = ''; localStorage.removeItem('sa_token'); });
}
</script>
